<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>전화번호와 인터넷 주소 - 네트워크 통신의 기본</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; }
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      font-size: 1rem;
      line-height: 1.5;
    }
    p { margin-bottom: .5rem; }
    p:last-child { margin-bottom: 0; }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    @keyframes signalFlow {
      0%   { opacity: 0; transform: scale(0.5); }
      50%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(1);   }
    }
    @keyframes lineFlash {
      0%, 100% { stroke: #10b981; stroke-opacity: 0.4; stroke-width: 3; }
      50%       { stroke: #3b82f6; stroke-opacity: 1;   stroke-width: 6; }
    }
    @keyframes dashMove {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: 10; }
    }
    @keyframes bounceOnce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50%       { transform: translateY(-10px) translateX(-50%); }
    }
    .animate-pulse-custom { animation: pulse 2s ease-in-out infinite; }
    .animate-slide-in     { animation: slideIn 0.5s ease-out; }
    .signal-dot           { animation: signalFlow 1.5s ease-in-out forwards; }
    .line-flash           { animation: lineFlash 1s ease-in-out infinite; }
    .dash-move            { animation: dashMove 1s linear infinite; }

    /* ── Layout ── */
    .container  { max-width: 1280px; margin: 0 auto; background: #fff; border-radius: 1rem; box-shadow: 0 25px 50px rgba(0,0,0,.25); overflow: hidden; }
    .header     { background: linear-gradient(to right, #4f46e5, #9333ea); padding: 1.5rem 2rem; color: #fff; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
    .header-sub { font-size: .875rem; color: #c7d2fe; }
    .btn-home   { background: #fff; color: #4f46e5; padding: .5rem 1rem; border-radius: .5rem; font-weight: 700; font-size: .875rem; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.15); transition: background .2s; display: flex; align-items: center; gap: .5rem; }
    .btn-home:hover { background: #e0e7ff; }
    .header h1  { font-size: 1.75rem; font-weight: 700; margin-bottom: .25rem; }
    .header p   { color: #c7d2fe; }
    .content    { padding: 2rem; }

    /* ── Cards & Boxes ── */
    .card           { background: #fff; border-radius: .75rem; box-shadow: 0 4px 16px rgba(0,0,0,.08); border: 2px solid #e5e7eb; padding: 2rem; margin-bottom: 1.5rem; }
    .box            { border-radius: .5rem; padding: 1.25rem; margin-bottom: 1rem; }
    .box-yellow     { background: #fefce8; border: 1px solid #fde047; }
    .box-blue       { background: #eff6ff; border: 1px solid #bfdbfe; }
    .box-green      { background: #dcfce7; border: 2px solid #4ade80; }
    .box-red        { background: #fef2f2; border: 1px solid #fecaca; }
    .box-indigo     { background: linear-gradient(to right, #eef2ff, #f5f3ff); border: 2px solid #a5b4fc; border-radius: .75rem; padding: 1.25rem; }
    .box-orange     { background: linear-gradient(to right, #fff7ed, #fefce8); border: 1px solid #fed7aa; border-radius: .5rem; padding: 1.25rem; }
    .box-gradient-blue  { background: linear-gradient(135deg, #eff6ff, #eef2ff); border: 2px solid #bfdbfe; border-radius: .75rem; padding: 1.5rem; }
    .box-gradient-green { background: linear-gradient(135deg, #f0fdf4, #ecfdf5); border: 2px solid #bbf7d0; border-radius: .75rem; padding: 1.5rem; }
    .inner-white    { background: #fff; border-radius: .5rem; padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 1rem; }

    /* ── Typography ── */
    .title-lg   { font-size: 1.25rem; font-weight: 700; margin-bottom: .75rem; }
    .title-md   { font-size: 1.125rem; font-weight: 700; margin-bottom: .5rem; }
    .title-sm   { font-size: 1rem;    font-weight: 700; margin-bottom: .5rem; }
    .text-lg    { font-size: 1.125rem; line-height: 1.5; }
    .text-base  { font-size: 1rem; line-height: 1.5; }
    .text-sm    { font-size: .875rem; line-height: 1.5; }
    .text-xs    { font-size: .75rem; line-height: 1.5; }
    .text-mono  { font-family: monospace; }
    .bold       { font-weight: 700; }
    .text-center { text-align: center; }
    .text-blue   { color: #2563eb; }
    .text-green  { color: #059669; }
    .text-red    { color: #dc2626; }
    .text-purple { color: #7c3aed; }
    .text-orange { color: #ea580c; }
    .text-gray   { color: #6b7280; }
    .text-indigo { color: #4f46e5; }

    /* ── Buttons ── */
    .btn        { border: none; cursor: pointer; font-family: inherit; font-weight: 700; border-radius: .5rem; padding: 1rem 2rem; font-size: 1.125rem; transition: transform .15s, box-shadow .15s; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .btn:hover  { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0,0,0,.2); }
    .btn-primary { background: linear-gradient(to right, #4f46e5, #9333ea); color: #fff; }
    .btn-primary:hover { background: linear-gradient(to right, #4338ca, #7e22ce); }
    .btn-gray   { background: #e5e7eb; color: #374151; }
    .btn-gray:hover { background: #d1d5db; }
    .btn-blue   { background: #3b82f6; color: #fff; }
    .btn-blue:hover  { background: #2563eb; }
    .btn-green  { background: #22c55e; color: #fff; }
    .btn-green:hover { background: #16a34a; }
    .btn-purple { background: #a855f7; color: #fff; }
    .btn-purple:hover { background: #9333ea; }
    .btn-row    { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }

    /* ── Choice Grid (step 0) ── */
    .choice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    @media(max-width: 600px) { .choice-grid { grid-template-columns: 1fr; } }
    .choice-btn  { background: none; border: 2px solid; border-radius: .75rem; padding: 1.5rem; cursor: pointer; font-family: inherit; transition: transform .15s, box-shadow .15s; }
    .choice-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
    .choice-btn .emoji { font-size: 2.25rem; display: block; margin-bottom: .5rem; }
    .choice-blue   { background: linear-gradient(135deg,#dbeafe,#bfdbfe); border-color: #93c5fd; }
    .choice-green  { background: linear-gradient(135deg,#dcfce7,#bbf7d0); border-color: #86efac; }
    .choice-purple { background: linear-gradient(135deg,#f3e8ff,#e9d5ff); border-color: #c084fc; }

    /* ── Feedback ── */
    .feedback-ok  { background: #f0fdf4; border: 2px solid #4ade80; border-radius: .5rem; padding: 1rem; margin-top: 1.5rem; display: flex; align-items: center; gap: .75rem; }
    .feedback-no  { background: #fff7ed; border: 2px solid #fb923c; border-radius: .5rem; padding: 1rem; margin-top: 1.5rem; display: flex; align-items: center; gap: .75rem; }

    /* ── Two phones (step 1) ── */
    .phones-row  { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .phone-item  { text-align: center; }
    .phone-item .big { font-size: 4.5rem; display: block; margin-bottom: 0.125rem; }
    .cable       { flex: 1; max-width: 220px; }
    .cable-line  { height: 8px; background: linear-gradient(to right, #3b82f6, #22c55e); border-radius: 4px; }
    .cable-label { text-align: center; font-size: 1rem; color: #6b7280; margin-top: .5rem; }

    /* ── Network call buttons (step 2) ── */
    .call-grid   { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
    @media(max-width:600px){ .call-grid { grid-template-columns: 1fr; } }
    .call-btn    { border: none; cursor: pointer; font-family: inherit; font-weight: 700; border-radius: .5rem; padding: 1rem; font-size: .95rem; color: #fff; transition: transform .15s, box-shadow .15s; }
    .call-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,0,0,.2); }

    /* ── IP device buttons (step 3) ── */
    .device-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1rem; }
    @media(max-width:600px){ .device-grid { grid-template-columns: 1fr; } }
    .device-btn  { background: #fff; border: 2px solid #d1d5db; border-radius: .5rem; padding: .75rem; cursor: pointer; font-family: inherit; transition: transform .15s, border-color .15s; }
    .device-btn:hover  { border-color: #4ade80; transform: scale(1.05); }
    .device-btn.selected { background: #f0fdf4; border-color: #22c55e; transform: scale(1.05); }
    .device-btn .d-emoji { font-size: 2rem; display: block; margin-bottom: .25rem; }
    .device-btn .d-name  { font-size: .75rem; font-weight: 700; color: #1f2937; }
    .device-btn .d-ip    { font-size: .7rem; font-family: monospace; color: #059669; }
    .device-btn .d-tag   { font-size: .7rem; font-weight: 700; color: #15803d; margin-top: .25rem; }

    /* ── Comparison table ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .75rem; text-align: left; border-bottom: 1px solid #e5e7eb; font-size: .875rem; }
    thead tr { background: linear-gradient(to right, #e0e7ff, #f3e8ff); }

    /* ── Observation list ── */
    .obs-list    { list-style: none; }
    .obs-list li { font-size: .875rem; color: #374151; margin-bottom: .25rem; }

    /* ── Connection status banner ── */
    .status-banner { border: 2px solid; border-radius: .5rem; padding: 1rem; margin-top: 1rem; display: flex; align-items: center; gap: .75rem; }
    .banner-blue   { background: #dbeafe; border-color: #60a5fa; }
    .banner-green  { background: #dcfce7; border-color: #4ade80; }

    /* ── Misc ── */
    .badge       { display: inline-block; border-radius: .375rem; padding: .125rem .5rem; font-size: .75rem; font-weight: 700; color: #fff; }
    .hidden      { display: none; }
    .mt1 { margin-top: .25rem; }
    .mt2 { margin-top: .5rem; }
    .mt4 { margin-top: 1rem; }
    .mt6 { margin-top: 1.5rem; }
    .mb2 { margin-bottom: .5rem; }
    .mb4 { margin-bottom: 1rem; }
    .mb6 { margin-bottom: 1.5rem; }
    .flex-center { display: flex; align-items: center; gap: .5rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media(max-width:640px){ .grid-2 { grid-template-columns: 1fr; } }
    .tooltip-wrap { position: relative; display: inline-block; cursor: pointer; }
    .tooltip-box  { position: absolute; left: 50%; top: -3.5rem; transform: translateX(-50%);
                    background: #fbcfe8; color: #1f2937; padding: .25rem .75rem; border-radius: .75rem;
                    font-size: .875rem; font-weight: 700; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2);
                    animation: bounceOnce .5s ease-in-out; }
    .svg-wrap     { background: #fff; border-radius: .5rem; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); border: 2px solid; margin-bottom: 1rem; }

    /* ── Step Nav ── */
    .step-nav     { padding: 1.5rem 2rem .5rem; }
    .step-track   { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: .25rem; }
    .step-item    { display: flex; flex-direction: column; align-items: center; flex: 1; cursor: pointer; }
    .step-circle  { width: 2.25rem; height: 2.25rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;
                    font-weight: 700; font-size: .875rem; border: 2px solid; transition: all .2s; }
    .step-circle.done    { background: #22c55e; color: #fff; border-color: #22c55e; }
    .step-circle.active  { background: #4f46e5; color: #fff; border-color: #4f46e5; transform: scale(1.1); box-shadow: 0 4px 12px rgba(79,70,229,.4); }
    .step-circle.pending { background: #fff; color: #9ca3af; border-color: #d1d5db; }
    .step-label   { font-size: .75rem; margin-top: .25rem; text-align: center; display: none; }
    @media(min-width:480px){ .step-label { display: block; } }
    .step-label.done    { color: #16a34a; }
    .step-label.active  { color: #4f46e5; font-weight: 700; }
    .step-label.pending { color: #9ca3af; }
    .progress-bar { position: relative; height: .5rem; background: #e5e7eb; border-radius: 9999px; margin-top: .25rem; }
    .progress-fill{ position: absolute; left: 0; top: 0; height: .5rem; background: linear-gradient(to right,#4f46e5,#9333ea); border-radius: 9999px; transition: width .5s; }
    .step-count   { text-align: right; font-size: .75rem; color: #9ca3af; margin-top: .25rem; }
  </style>
</head>
<body>
<div class="container">
  <!-- ── Header ── -->
  <div class="header">
    <div class="header-top">
      <span class="header-sub">고등학교 정보 학습자료</span>
      <button class="btn-home" onclick="location.href='index.html'">🏠 홈으로</button>
    </div>
    <h1>📞 인터넷 주소가 왜 필요하지?</h1>
    <p>인터넷을 하려면 IP 주소가 필요해요! 어떻게 서로를 찾을까요?</p>
  </div>

  <!-- ── Step Nav ── -->
  <div class="step-nav" id="step-nav"></div>

  <!-- ── Content ── -->
  <div class="content" id="content"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  step: 0,
  answer: '',
  showFeedback: false,
  callingFrom: '', callingTo: '',
  showPhoneConn: false,
  signalPath: [],
  activeNodes: [],
  showTooltip: false,
};

let signalTimer = null;

/* ── 퀴즈 state & 데이터 ── */
const quizState = { answers: {}, showResult: false };

const quizData = [
  {
    id: 0,
    question: '전화기 2대를 선으로 연결하면, 전화번호 없이도 서로 통화할 수 있다.',
    options: ['O (맞다)', 'X (틀리다)'],
    correct: 0,
    explanation: '맞아요! 전화기가 딱 2대뿐이라면 상대방이 이미 정해져 있기 때문에 전화번호 없이도 연결할 수 있어요. 주소(번호)가 필요해지는 건 3대 이상일 때부터입니다!'
  },
  {
    id: -1,
    question: '인터넷에 연결된 모든 기기는 같은 IP 주소를 사용해도 된다.',
    options: ['O (맞다)', 'X (틀리다)'],
    correct: 1,
    explanation: '틀렸어요! 각 기기는 반드시 서로 다른(고유한) IP 주소를 가져야 해요. 만약 같은 IP 주소를 쓴다면 라우터가 어느 기기에 데이터를 보낼지 알 수 없게 됩니다!'
  },
  {
    id: 1,
    question: '2개의 기기(전화기/컴퓨터)를 연결할 때 주소(번호)가 필요한가요?',
    options: [
      '필요하다. 항상 주소가 있어야 연결된다.',
      '필요 없다. 선으로 직접 연결하면 상대가 정해진다.',
      '필요하다. 이진수 주소를 써야 한다.',
      '필요 없다. 무선으로만 연결하면 된다.'
    ],
    correct: 1,
    explanation: '2개만 연결할 때는 선으로 이으면 상대방이 자동으로 정해지기 때문에 별도의 주소(번호)가 필요 없어요. 주소가 필요해지는 건 3개 이상부터입니다!'
  },
  {
    id: 2,
    question: '전화번호(또는 IP 주소)가 반드시 필요해지는 시점은 언제인가요?',
    options: [
      '기기가 1대일 때',
      '기기가 2대일 때',
      '기기가 3대 이상일 때',
      '기기가 100대 이상일 때'
    ],
    correct: 2,
    explanation: '3대 이상이 되면 "누구에게 연결할지" 구별해야 해요. 그래서 각 기기에 고유한 주소(전화번호/IP 주소)를 부여해서 원하는 대상에게 정확히 연결합니다!'
  },
  {
    id: 3,
    question: '전화망의 교환기와 인터넷의 라우터(Router)는 어떤 공통 역할을 하나요?',
    options: [
      '데이터를 저장하는 역할',
      '주소를 확인하고 올바른 대상에게 연결해주는 역할',
      '전기 신호를 이진수로 변환하는 역할',
      '화면에 문자를 출력하는 역할'
    ],
    correct: 1,
    explanation: '교환기(전화망)와 라우터(인터넷) 모두 "주소를 보고 올바른 대상에게 연결"해주는 역할을 해요. 전화번호를 보고 연결하면 교환기, IP 주소를 보고 연결하면 라우터입니다!'
  },
  {
    id: 4,
    question: "IP 주소 '192.168.1.10'에서 숫자들은 어떤 범위로 구성되나요?",
    options: [
      '0 ~ 99 사이의 숫자 4개',
      '0 ~ 255 사이의 숫자 4개',
      '0 ~ 999 사이의 숫자 3개',
      '0 ~ 127 사이의 숫자 8개'
    ],
    correct: 1,
    explanation: 'IPv4 주소는 0~255 사이의 숫자 4개를 점(.)으로 구분해서 표현해요. 각 숫자는 8비트(2⁸=256가지)로 표현되기 때문에 최대 255까지 가능합니다!'
  },
  {
    id: 5,
    question: 'IPv4 주소가 부족해서 나온 새로운 주소 체계는 무엇인가요?',
    options: ['IPv5', 'IPv6', 'IPmax', 'SuperIP'],
    correct: 1,
    explanation: 'IPv4는 약 43억 개의 주소만 만들 수 있어요. 인터넷 기기가 폭발적으로 늘어나면서 주소가 부족해졌고, IPv6가 등장했어요. IPv6는 340조×1조×1조 개의 주소를 만들 수 있답니다!'
  }
];

function handleQuizAnswer(questionId, selectedOption) {
  if (quizState.answers[questionId] !== undefined) return;
  quizState.answers[questionId] = selectedOption;
  renderQuiz();
  if (Object.keys(quizState.answers).length === quizData.length) {
    document.getElementById('quiz-submit-btn').style.display = 'block';
  }
}

function showQuizResult() {
  quizState.showResult = true;
  renderQuiz();
}

function resetQuiz() {
  quizState.answers = {};
  quizState.showResult = false;
  renderQuiz();
}

function calcScore() {
  return quizData.filter(q => quizState.answers[q.id] === q.correct).length;
}

function renderQuiz() {
  const el = document.getElementById('quiz-section');
  if (!el) return;

  if (quizState.showResult) {
    const score = calcScore();
    const total = quizData.length;
    const msg = score === total
      ? '완벽해요! 모든 문제를 맞히셨네요! 🎊'
      : score >= total * 0.7
      ? '잘하셨어요! 조금만 더 복습하면 완벽할 거예요! 👍'
      : '다시 한 번 복습해보세요! 💪';

    const wrongItems = quizData.filter(q => quizState.answers[q.id] !== q.correct).map(q => `
      <div style="background:#fef2f2;padding:1rem;border-radius:.5rem;border:1px solid #fca5a5;margin-bottom:.75rem">
        <p style="font-weight:bold;color:#b91c1c;font-size:.875rem;margin-bottom:.25rem">❌ 틀린 문제: ${q.question}</p>

        <p style="font-size:1rem;color:#6b7280;margin-top:.25rem">${q.explanation}</p>
      </div>`).join('');

    el.innerHTML = `

  const questionsHtml = quizData.map((quiz, qIdx) => {
    const answered = quizState.answers[quiz.id] !== undefined;

        onclick="handleQuizAnswer(${quiz.id}, ${oIdx})"
        ${answered ? 'disabled' : ''}
        style="width:100%;text-align:left;padding:.75rem;border-radius:.5rem;${bg}cursor:${answered?'not-allowed':'pointer'};margin-bottom:.5rem;font-size:1rem;font-family:inherit">
        ${oIdx+1}. ${opt}${badge}

    }).join('');

    const explanation = answered ? `

        ${explanation}

  }).join('');

  const submitBtn = Object.keys(quizState.answers).length === quizData.length

    : `<button id="quiz-submit-btn" style="display:none"></button>`;

  el.innerHTML = questionsHtml + submitBtn;
}

/* ═══════════════════════════════════════════════
   PHONE EXCHANGE STATE & LOGIC
═══════════════════════════════════════════════ */
const PE_USERS = [
  { id:'minsu',   name:'민수',   emoji:'👦',  number:'010-1234-5678', color:'#3B82F6' },
  { id:'jieun',   name:'지은',   emoji:'👧',  number:'010-9876-5432', color:'#10B981' },
  { id:'teacher', name:'선생님', emoji:'👨‍🏫', number:'010-1004-1004', color:'#A855F7' },
  { id:'junho',   name:'준호',   emoji:'🧑',  number:'010-5555-7777', color:'#F59E0B' },
];
const PE_KEYS = ['1','2','3','4','5','6','7','8','9','*','0','#'];

const pe = {
  caller:     'minsu',
  dialInput:  '',
  phase:      'idle',
  errorMsg:   '',
  waitSec:    0,
  highlight:  '',
  processing: null,
  queue:      [],
  callHistory:[],
};
let peWaitTimer = null;

function peRender() {
  const el = document.getElementById('pe-root');
  if (!el) return;
  el.innerHTML = renderPhoneExchangeInner();
}

function peFmt(raw) {
  const d = raw.replace(/\D/g,'').slice(0,11);
  if (d.length<=3) return d;
  if (d.length<=7) return d.slice(0,3)+'-'+d.slice(3);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
}

function peKey(k) {
  if (pe.phase !== 'idle') return;
  if (k === '#') { peCall(); return; }
  if (k === '*') { pe.dialInput = ''; peRender(); return; }
  const digits = pe.dialInput.replace(/\D/g,'');
  if (digits.length >= 11) return;
  pe.dialInput = peFmt(digits + k);
  peRender();
}

function peSelectCaller(id) {
  if (pe.phase !== 'idle') return;
  pe.caller = id;
  peRender();
}

function peSetDial(num) {
  if (pe.phase !== 'idle') return;
  pe.dialInput = num;
  peRender();
}

function peCall() {
  if (pe.phase !== 'idle' || !pe.dialInput) return;
  const callerUser = PE_USERS.find(u => u.id === pe.caller);
  const target     = PE_USERS.find(u => u.number === pe.dialInput);
  const correct    = !!target && target.id !== callerUser.id;
  const targetUser = correct ? target : PE_USERS.find(u => u.id !== callerUser.id);
  pe.phase = 'dialing';
  peRender();
  setTimeout(() => peSimulate(callerUser, targetUser, correct), 800);
}

function peSimulate(callerUser, targetUser, correct) {
  const busyChance = pe.queue.length > 0 ? 0.5 : 0.15;
  const isBusy = Math.random() < busyChance;
  if (isBusy) {
    const waitId = Date.now();
    pe.queue.push({ id:waitId, caller:callerUser, target:targetUser, correct });
    pe.phase   = 'queued';
    let sec    = 3 + pe.queue.length * 2;
    pe.waitSec = sec;
    peRender();
    peWaitTimer = setInterval(() => {
      sec--; pe.waitSec = sec; peRender();
      if (sec <= 0) {
        clearInterval(peWaitTimer);
        pe.queue = pe.queue.filter(q => q.id !== waitId);
        peRoute(callerUser, targetUser, correct);
      }
    }, 1000);
    return;
  }
  peRoute(callerUser, targetUser, correct);
}

function peRoute(callerUser, targetUser, correct) {
  pe.phase = 'routing'; pe.processing = { caller:callerUser, target:targetUser };
  pe.highlight = 'exchange'; peRender();
  setTimeout(() => {
    pe.highlight = 'target'; peRender();
    setTimeout(() => {
      if (!correct) {
        const others = PE_USERS.filter(u => u.id!==callerUser.id && u.id!==targetUser.id);
        const wrong  = others[Math.floor(Math.random()*others.length)];
        pe.phase    = 'error';
        pe.errorMsg = `전자 교환기: 📋 번호 ${pe.dialInput} 찾는 중... ❌ 등록된 번호가 없어요! 가장 가까운 번호(${wrong.number})로 잘못 연결됩니다!`;
        pe.callHistory.unshift({ type:'error', from:callerUser, to:wrong, number:pe.dialInput, time:new Date().toLocaleTimeString() });
      } else {
        pe.phase = 'connected';
        pe.callHistory.unshift({ type:'success', from:callerUser, to:targetUser, number:pe.dialInput, time:new Date().toLocaleTimeString() });
      }
      if (pe.callHistory.length > 6) pe.callHistory.pop();
      pe.processing = null; pe.highlight = ''; peRender();
      setTimeout(() => peReset(), 4000);
    }, 1200);
  }, 1500);
}

function peReset() {
  pe.phase='idle'; pe.dialInput=''; pe.errorMsg=''; pe.highlight='';
  peRender();
}

/* ═══════════════════════════════════════════════
   STEP NAV
═══════════════════════════════════════════════ */
const stepLabels = ['물리적 연결', '전화번호의 필요성', '인터넷 IP 주소', '정리 & 퀴즈'];

function renderStepNav() {
  const el = document.getElementById('step-nav');
  if (!el) return;
  const n = state.step;
  const items = stepLabels.map((label, idx) => {
    const cls = idx < n ? 'done' : idx === n ? 'active' : 'pending';
    const txt = idx < n ? '✓' : String(idx + 1);
    return `<div class="step-item" onclick="goStep(${idx})">
      <div class="step-circle ${cls}">${txt}</div>
      <span class="step-label ${cls}">${label}</span>
    </div>`;
  }).join('');
  const pct = (n / (stepLabels.length - 1)) * 100;
  el.innerHTML = `
    <div class="step-track">${items}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <p class="step-count">${n + 1} / ${stepLabels.length} 단계</p>`;
}

/* ═══════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════ */
function render() {
  renderStepNav();
  const el = document.getElementById('content');
  if      (state.step===0) el.innerHTML = renderStep0();
  else if (state.step===1) el.innerHTML = renderStep1();
  else if (state.step===2) el.innerHTML = renderStep2();
  else if (state.step===3) { el.innerHTML = renderStep3(); renderQuiz(); pgRender(); }
}

/* ═══════════════════════════════════════════════
   EVENT HANDLERS (global, called from onclick)
═══════════════════════════════════════════════ */
function goStep(n) {
  state.step = n;
  // reset connection state when navigating
  state.showPhoneConn = false; state.callingFrom=''; state.callingTo='';
  state.signalPath=[]; state.activeNodes=[];
  if (signalTimer) { clearTimeout(signalTimer); signalTimer=null; }
  // PhoneExchange 상태 초기화
  if (peWaitTimer) { clearInterval(peWaitTimer); peWaitTimer=null; }
  pe.phase='idle'; pe.dialInput=''; pe.errorMsg=''; pe.highlight='';
  pe.processing=null; pe.queue=[];
  // 패킷 게임 상태 초기화
  if (pg.animTimer) { clearInterval(pg.animTimer); pg.animTimer=null; }
  pg.phase='idle'; pg.msg=''; pg.target=null; pg.packetPos=0;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function handleAnswer(ans) {
  state.answer = ans;
  state.showFeedback = true;
  render();
  if (ans==='선') {
    setTimeout(() => { state.step=1; state.showFeedback=false; render(); }, 1000);
  }
}

function showTooltip() {
  const el = document.getElementById('tooltip');
  if (!el) return;
  el.classList.remove('hidden');
  setTimeout(() => { el.classList.add('hidden'); }, 400);
}

function handlePhoneCall(fromId, toId) {
  if (signalTimer) clearTimeout(signalTimer);
  state.callingFrom=fromId; state.callingTo=toId;
  state.showPhoneConn=true;
  state.activeNodes=[fromId,toId];
  setTimeout(() => { state.signalPath=[fromId,toId]; render(); }, 300);
  signalTimer = setTimeout(() => {
    state.showPhoneConn=false; state.callingFrom=''; state.callingTo='';
    state.signalPath=[]; state.activeNodes=[];
    render();
  }, 3000);
  render();
}

/* ═══════════════════════════════════════════════
   PACKET GAME STATE & LOGIC
═══════════════════════════════════════════════ */
const PG_DEVICES = [
  { id:'pc',     name:'학교 컴퓨터', emoji:'💻', ip:[192,168,1,10], color:'#3B82F6' },
  { id:'phone',  name:'스마트폰',    emoji:'📱', ip:[192,168,1,25], color:'#10B981' },
  { id:'tablet', name:'태블릿',      emoji:'📲', ip:[192,168,1,30], color:'#F59E0B' },
  { id:'tv',     name:'스마트TV',    emoji:'📺', ip:[192,168,1,50], color:'#EF4444' },
];
const PG_ROUTER = { x:300, y:210 };
const PG_POS    = { pc:{x:90,y:80}, phone:{x:510,y:80}, tablet:{x:90,y:340}, tv:{x:510,y:340} };

function pgIpStr(arr) { return arr.join('.'); }

const pg = {
  sender:      'pc',
  octets:      ['','','',''],
  phase:       'idle',   // idle | routing | travelling | arrived | lost
  target:      null,
  packetPos:   0,
  msg:         '',
  log:         [],
  animTimer:   null,
};

function pgRender() {
  const el = document.getElementById('packet-game-root');
  if (!el) return;
  el.innerHTML = renderPacketGame();
}

function pgSetSender(id) {
  if (pg.phase !== 'idle') return;
  pg.sender = id;
  pgRender();
}

function pgSetOctet(idx, val) {
  const clean = val.replace(/\D/g,'').slice(0,3);
  const num   = Math.min(255, Number(clean)||0);
  pg.octets[idx] = clean==='' ? '' : String(num);
  pgRender();
}

function pgSetIP(ip) {
  if (pg.phase !== 'idle') return;
  pg.octets = ip.map(String);
  pgRender();
}

function pgSend() {
  if (pg.phase !== 'idle') return;
  const octets  = pg.octets.map(v => Number(v)||0);
  const typed   = pgIpStr(octets);
  const senderDev = PG_DEVICES.find(d => d.id === pg.sender);
  const found     = PG_DEVICES.find(d => pgIpStr(d.ip) === typed && d.id !== pg.sender);

  if (typed === pgIpStr(senderDev.ip)) {
    pg.msg = '⚠️ 자기 자신의 IP로는 보낼 수 없어요!';
    pgRender(); return;
  }

  pg.phase = 'routing';
  pg.msg   = '🔀 라우터: IP 주소 조회 중...';
  pg.packetPos = 0;
  pgRender();

  setTimeout(() => {
    if (found) {
      pg.target = found;
      pg.phase  = 'travelling';
      pg.msg    = `📦 패킷이 ${found.name}(${typed})으로 이동 중!`;
      pgRender();
      let p = 0;
      pg.animTimer = setInterval(() => {
        p += 0.05; pg.packetPos = p; pgRender();
        if (p >= 1) {
          clearInterval(pg.animTimer);
          pg.phase = 'arrived';
          pg.msg   = `✅ 도착! ${found.emoji} ${found.name}이 패킷을 받았어요!`;
          pg.log.unshift({ type:'ok', from:senderDev.name, to:found.name, ip:typed, time:new Date().toLocaleTimeString() });
          if (pg.log.length > 5) pg.log.pop();
          pgRender();
          setTimeout(() => { pg.phase='idle'; pg.msg=''; pg.target=null; pg.packetPos=0; pgRender(); }, 2500);
        }
      }, 80);
    } else {
      pg.phase = 'lost';
      pg.msg   = `❌ IP ${typed}를 찾을 수 없어요! 패킷이 길을 잃었습니다.`;
      pg.log.unshift({ type:'err', from:senderDev.name, to:'???', ip:typed, time:new Date().toLocaleTimeString() });
      if (pg.log.length > 5) pg.log.pop();
      pgRender();
      setTimeout(() => { pg.phase='idle'; pg.msg=''; pg.packetPos=0; pgRender(); }, 2500);
    }
  }, 1200);
}

function renderPacketGame() {
  const senderDev = PG_DEVICES.find(d => d.id === pg.sender);

  /* ── 기기 목록 카드 ── */
  const deviceCards = PG_DEVICES.map(d => `

  /* ── 발신 기기 선택 버튼 ── */
  const senderBtns = PG_DEVICES.map(d => `
    <button onclick="pgSetSender('${d.id}')" ${pg.phase!=='idle'?'disabled':''}

             opacity:${pg.phase!=='idle'?'0.5':'1'};font-family:inherit;text-align:center;transition:all .2s">

      <div style="font-size:.75rem;font-weight:700;color:${pg.sender===d.id?d.color:'#374151'}">${d.name}</div>
      <div style="font-size:.65rem;font-family:monospace;color:#6b7280">${pgIpStr(d.ip)}</div>
    </button>`).join('');

  /* ── IP 입력 힌트 버튼 ── */
  const hintBtns = PG_DEVICES.filter(d => d.id !== pg.sender).map(d => `
    <button onclick="pgSetIP([${d.ip}])" ${pg.phase!=='idle'?'disabled':''}
      style="display:flex;align-items:center;gap:.5rem;border:1px solid ${d.color}66;border-radius:.5rem;
             padding:.5rem;background:white;cursor:${pg.phase!=='idle'?'not-allowed':'pointer'};
             opacity:${pg.phase!=='idle'?'0.4':'1'};font-family:inherit;text-align:left;width:100%">
      <span style="font-size:1.25rem">${d.emoji}</span>
      <div>
        <div style="font-size:.875rem;font-weight:700;color:${d.color}">${d.name}</div>
        <div style="font-size:.75rem;font-family:monospace;color:#6b7280">${pgIpStr(d.ip)}</div>
      </div>
    </button>`).join('');

  /* ── IP 입력 칸 ── */
  const octetInputs = pg.octets.map((v,i) => `
    <input type="text" value="${v}" oninput="pgSetOctet(${i},this.value)"
      ${pg.phase!=='idle'?'disabled':''}
      placeholder="0"
      style="width:3.5rem;text-align:center;font-family:monospace;font-size:1rem;font-weight:700;
             border:2px solid #a5b4fc;border-radius:.5rem;padding:.5rem;outline:none;
             opacity:${pg.phase!=='idle'?'0.5':'1'}"/>
    ${i<3?'<span style="color:#9ca3af;font-size:1.25rem;font-weight:bold">.</span>':''}`).join('');

  /* ── 상태 메시지 색상 ── */
  const msgStyle = {
    idle:      'background:#f3f4f6;border:1px solid #d1d5db;color:#4b5563',
    routing:   'background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8',
    travelling:'background:#fef9c3;border:1px solid #fde047;color:#854d0e',
    arrived:   'background:#dcfce7;border:2px solid #4ade80;color:#166534',
    lost:      'background:#fee2e2;border:2px solid #f87171;color:#b91c1c',
  }[pg.phase] || 'background:#f3f4f6;border:1px solid #d1d5db;color:#4b5563';

  /* ── SVG 네트워크 지도 ── */
  const svgLines = PG_DEVICES.map(d => {
    const pos = PG_POS[d.id];
    const involved = (pg.phase==='travelling'||pg.phase==='arrived') && (d.id===pg.sender||d.id===pg.target?.id);
    return `<line x1="${PG_ROUTER.x}" y1="${PG_ROUTER.y}" x2="${pos.x}" y2="${pos.y}"
      stroke="${involved?d.color:'#d1d5db'}" stroke-width="${involved?3:2}"
      stroke-dasharray="6,4" opacity="${involved?1:0.5}">
      ${!involved?'<animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>':''}
    </line>`;
  }).join('');

  /* ── 패킷 위치 계산 ── */
  let packetDot = '';
  if (pg.phase==='travelling' && pg.target) {
    const sp = PG_POS[pg.sender];
    const ep = PG_POS[pg.target.id];
    let px, py;
    if (pg.packetPos < 0.5) {
      const t = pg.packetPos * 2;
      px = sp.x + (PG_ROUTER.x - sp.x) * t;
      py = sp.y + (PG_ROUTER.y - sp.y) * t;
    } else {
      const t = (pg.packetPos - 0.5) * 2;
      px = PG_ROUTER.x + (ep.x - PG_ROUTER.x) * t;
      py = PG_ROUTER.y + (ep.y - PG_ROUTER.y) * t;
    }
    packetDot = `<circle cx="${px}" cy="${py}" r="14" fill="#F59E0B" stroke="white" stroke-width="2"/>
                 <text x="${px}" y="${py+5}" text-anchor="middle" font-size="12">📦</text>`;
  }

  /* ── 패킷 유실 X 표시 ── */
  const lostMark = pg.phase==='lost'
    ? `<text x="${PG_ROUTER.x}" y="${PG_ROUTER.y+5}" text-anchor="middle" font-size="28" fill="#ef4444">✗</text>` : '';

  /* ── 기기 노드 ── */
  const svgNodes = PG_DEVICES.map(d => {
    const pos = PG_POS[d.id];
    const isSender  = d.id === pg.sender;

  }).join('');

  /* ── 배달 로그 ── */
  const logHtml = pg.log.length > 0 ? `
    <div style="margin-top:1.25rem;background:white;border:2px solid #e5e7eb;border-radius:.75rem;padding:1rem;box-shadow:0 2px 8px rgba(0,0,0,.06)">

          <div style="border-radius:.5rem;padding:.75rem;font-size:.875rem;display:flex;align-items:start;gap:.5rem;
                      background:${h.type==='ok'?'#f0fdf4':'#fef2f2'};border:1px solid ${h.type==='ok'?'#86efac':'#fca5a5'}">
            <span>${h.type==='ok'?'✅':'❌'}</span>
            <div>
              <div style="font-weight:700;color:#1f2937">${h.from} → ${h.to}</div>
              <div style="font-family:monospace;color:#6b7280">${h.ip}</div>
              <div style="color:#9ca3af">${h.time}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
    <div style="background:linear-gradient(135deg,#eff6ff,#eef2ff);padding:1.5rem;border-radius:.75rem;border:2px solid #bfdbfe;box-shadow:0 4px 16px rgba(0,0,0,.08)">

        <div style="display:flex;flex-direction:column;gap:1rem">
          <!-- 발신 기기 선택 -->
          <div style="background:white;border-radius:.75rem;padding:1rem;border:2px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)">
            <h4 style="font-weight:700;color:#374151;margin-bottom:.75rem">📤 보내는 기기 선택</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">${senderBtns}</div>
          </div>

          <!-- IP 입력 -->
          <div style="background:white;border-radius:.75rem;padding:1rem;border:2px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)">
            <h4 style="font-weight:700;color:#374151;margin-bottom:.25rem">🎯 목적지 IP 주소 입력</h4>
            <p style="font-size:.875rem;color:#6b7280;margin-bottom:.75rem">아래에서 기기를 클릭하면 자동 입력!</p>
            <div style="display:flex;align-items:center;gap:.25rem;margin-bottom:.75rem;flex-wrap:wrap">
              ${octetInputs}
            </div>
            <div style="background:#111827;color:#4ade80;font-family:monospace;text-align:center;padding:.5rem;border-radius:.5rem;font-size:1rem;margin-bottom:.75rem">
              ${pg.octets.map(v=>v||'?').join(' . ')}
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem">
              ${hintBtns}
            </div>
            <button onclick="pgSend()" ${pg.phase!=='idle'?'disabled':''}
              style="width:100%;padding:.75rem;background:#2563eb;color:white;font-weight:700;border:none;border-radius:.5rem;cursor:${pg.phase!=='idle'?'not-allowed':'pointer'};opacity:${pg.phase!=='idle'?'0.5':'1'};font-size:1rem;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.15)">
              📦 패킷 전송!
            </button>
            ${pg.msg ? `<div style="${msgStyle};padding:.75rem;border-radius:.5rem;margin-top:.75rem;font-size:.875rem;font-weight:700">${pg.msg}</div>` : ''}
          </div>
        </div>

        <!-- 오른쪽: 네트워크 지도 -->
        <div style="background:white;border-radius:.75rem;padding:1rem;border:2px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)">
          <h4 style="font-weight:700;color:#374151;margin-bottom:.75rem">🗺️ 네트워크 지도</h4>
          <svg viewBox="0 0 600 420" style="width:100%;display:block">
            ${svgLines}
            <!-- 라우터 -->
            <circle cx="${PG_ROUTER.x}" cy="${PG_ROUTER.y}" r="38" fill="#8b5cf6" stroke="#6d28d9" stroke-width="3"/>
            <text x="${PG_ROUTER.x}" y="${PG_ROUTER.y+5}" text-anchor="middle" dominant-baseline="middle" font-size="24">🔀</text>
            <text x="${PG_ROUTER.x}" y="${PG_ROUTER.y+58}" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d28d9">라우터</text>
            <text x="${PG_ROUTER.x}" y="${PG_ROUTER.y+73}" text-anchor="middle" font-size="11" fill="#7c3aed">(IP 주소 확인)</text>
            ${svgNodes}
            ${packetDot}
            ${lostMark}
          </svg>
        </div>
      </div>
      ${logHtml}
    </div>`;
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
render();
</script>
</body>
</html>
