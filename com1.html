<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>무손실 압축 - RLE, 허프만, 사전 기반, LZ77</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
      margin: 0;
      padding: 20px;
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceOnce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50% { transform: translateY(-10px) translateX(-50%); }
    }
    .animate-slide-in {
      animation: slideIn 0.5s ease-out;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    .pixel-cell {
      width: 30px;
      height: 30px;
      border: 1px solid #ccc;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .pixel-cell:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 허프만 복호화 컴포넌트
    const HuffmanDecoder = ({ compressed, codes, original }) => {
      const [step, setStep] = React.useState(0);
      const [decoded, setDecoded] = React.useState([]);

      const reverseCodes = {};
      Object.entries(codes).forEach(([char, code]) => { reverseCodes[code] = char; });

      const getAllDecoded = () => {
        let result = [];
        let buf = '';
        for (let c of compressed) {
        buf += c;
        if (reverseCodes[buf] !== undefined) {
          result.push({ bits: buf, char: reverseCodes[buf] });
          buf = '';
        }
        }
        return result;
      };

      const allDecoded = getAllDecoded();

      const decodeStep = () => {
        if (step < allDecoded.length) {
        setDecoded(allDecoded.slice(0, step + 1));
        setStep(step + 1);
        }
      };

      const decodeAll = () => {
        setDecoded(allDecoded);
        setStep(allDecoded.length);
      };

      const resetDecoder = () => { setStep(0); setDecoded([]); };

      const decodedText = decoded.map(d => d.char).join('');
      const bitsUsed = decoded.reduce((acc, d) => acc + d.bits.length, 0);
      const isComplete = decodedText === original;

      return (
        <div className="space-y-4">
        <div className="bg-white p-4 rounded-lg border border-green-200">
          <p className="text-base text-gray-600 mb-2 font-bold">압축된 비트열 (분리하며 읽기):</p>
          <div className="font-mono text-base break-all leading-relaxed">
            {decoded.map((d, i) => (
            <span key={i} className="inline-block bg-green-100 border border-green-400 rounded px-1 mr-1 mb-1 font-bold text-green-800" title={`→ '${d.char}'`}>
              {d.bits}
            </span>
            ))}
            <span className="text-gray-400">{compressed.slice(bitsUsed)}</span>
          </div>
        </div>
        <div className="bg-white p-4 rounded-lg border border-green-200">
          <p className="text-base text-gray-600 mb-2 font-bold">복원된 문자:</p>
          <div className="font-mono text-2xl font-bold text-green-700 tracking-widest min-h-[2rem]">
            {decodedText || <span className="text-gray-300 text-base">아직 없음</span>}
          </div>
        </div>
        {isComplete && (
          <div className="bg-green-100 border border-green-400 rounded-lg p-3 text-green-800 font-bold text-center text-base">
            🎉 완벽하게 복원됐어요! 원본 "{original}"과 100% 일치합니다!
          </div>
        )}
        <div className="flex gap-2 flex-wrap">
          <button onClick={decodeStep} disabled={step >= allDecoded.length}
            className="bg-gradient-to-r from-green-500 to-green-600 text-white px-5 py-2 rounded-lg font-bold hover:shadow-lg transition-all disabled:opacity-50">
            ▶ 한 글자씩 복호화
          </button>
          <button onClick={decodeAll}
            className="bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-5 py-2 rounded-lg font-bold hover:shadow-lg transition-all">
            ⏩ 전체 복호화
          </button>
          <button onClick={resetDecoder}
            className="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg font-bold hover:bg-gray-300 transition-all">
            🔄 초기화
          </button>
        </div>
        <div className="bg-gray-50 p-3 rounded-lg">
          <p className="text-base text-gray-600 font-bold mb-2">📋 코드표 (이걸 보고 비트열을 해석해요):</p>
          <div className="flex flex-wrap gap-2">
            {Object.entries(codes).sort((a,b) => a[1].length - b[1].length).map(([char, code]) => (
            <span key={char} className="bg-blue-100 border border-blue-300 rounded px-2 py-1 text-base font-mono">
              '{char}' → {code}
            </span>
            ))}
          </div>
        </div>
        </div>
      );
    };

    const HuffmanTreeVisualization = ({ tree }) => {
      if (!tree) return null;

      // 트리 깊이 계산
      const getDepth = (node) => {
        if (!node) return 0;
        return 1 + Math.max(getDepth(node.left), getDepth(node.right));
      };
      const depth = getDepth(tree);

      // 깊이에 따라 SVG 크기 동적 결정
      const svgHeight = Math.max(300, depth * 80 + 60);
      const svgWidth = Math.max(500, Math.pow(2, depth - 1) * 60);
      const startX = svgWidth / 2;

      const renderNode = (node, x, y, level, direction, parentSpacing) => {
        if (!node) return null;

        const isLeaf = node.char !== null;
        const spacing = parentSpacing / 2;

        return (
          <g key={`${x}-${y}-${level}`}>
            {node.left && (
              <>
                <line x1={x} y1={y} x2={x - spacing} y2={y + 75}
                  stroke="#64748b" strokeWidth="2" />
                {renderNode(node.left, x - spacing, y + 75, level + 1, 'left', spacing)}
              </>
            )}
            {node.right && (
              <>
                <line x1={x} y1={y} x2={x + spacing} y2={y + 75}
                  stroke="#64748b" strokeWidth="2" />
                {renderNode(node.right, x + spacing, y + 75, level + 1, 'right', spacing)}
              </>
            )}
            <circle cx={x} cy={y} r="22"
              fill={isLeaf ? '#10b981' : '#3b82f6'}
              stroke="#1e40af" strokeWidth="2"
            />
            <text x={x} y={y + 5} textAnchor="middle"
              fill="white" fontSize="13" fontWeight="bold">
              {isLeaf ? `'${node.char}'` : node.freq}
            </text>
            {direction && (
              <text x={x} y={y - 30} textAnchor="middle"
                fill="#1e293b" fontSize="15" fontWeight="bold">
                {direction === 'left' ? '0' : '1'}
              </text>
            )}
          </g>
        );
      };

      return (
        <div style={{ overflowX: 'auto' }}>
          <svg width={svgWidth} height={svgHeight} className="bg-blue-50 rounded-lg" style={{ minWidth: '100%' }}>
            {renderNode(tree, startX, 40, 0, null, svgWidth / 2)}
          </svg>
        </div>
      );
    };

    // 데이터 매칭 퀴즈 컴포넌트
    const DataMatchQuiz = ({ item, idx }) => {
      const [revealed, setRevealed] = useState(false);
      const icons = ['📄', '🔁', '🎲'];
      return (
        <div className="bg-white rounded-xl p-5 shadow-sm border border-green-200">
          <div className="flex items-start gap-3">
            <span className="text-2xl">{icons[idx]}</span>
            <div className="flex-1">
              <p className="font-bold text-gray-800 mb-1">데이터: <code className="bg-green-100 px-2 py-1 rounded font-mono">{item.data}</code></p>
              <p className="text-gray-600 text-base mb-3">{item.hint}</p>
              {revealed ? (
                <div className="bg-green-50 border border-green-300 rounded-lg p-3">
                  <p className="font-bold text-green-700 mb-1">✅ 더 유리한 압축: <span className="text-green-800">{item.best}</span></p>
                  <p className="text-gray-700 text-base">{item.reason}</p>
                </div>
              ) : (
                <button onClick={() => setRevealed(true)}
                  className="bg-green-500 text-white px-4 py-2 rounded-lg font-bold text-base hover:bg-green-600 transition-all">
                  정답 확인하기
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    const CompressionEducation = () => {
      const [activeTab, setActiveTab] = useState('rle');
      
      // RLE 상태
      const [rleInput, setRleInput] = useState('cchaaaammm');
      const [rleResult, setRleResult] = useState(null);
      const [pixels, setPixels] = useState(Array(66).fill('white'));
      const [currentColor, setCurrentColor] = useState('black');
      const [imageResult, setImageResult] = useState(null);
      
      // 허프만 상태
      const [huffmanInput, setHuffmanInput] = useState('cchaaaammm');
      const [huffmanResult, setHuffmanResult] = useState(null);
      
      // 사전 기반 상태
      const [dictInput, setDictInput] = useState('Sorry Sorry Sorry Sorry\n내가 내가 내가 먼저\n네게 네게 네게 빠져');
      const [dictResult, setDictResult] = useState(null);
      
      // LZ77 상태
      const [lzInput, setLzInput] = useState('chamsaechamda');
      const [lzResult, setLzResult] = useState(null);
      const [lzSteps, setLzSteps] = useState([]);
      const [currentStep, setCurrentStep] = useState(-1);
      
      // 퀴즈 상태
      const [quizAnswers, setQuizAnswers] = useState({});
      const [showQuizResult, setShowQuizResult] = useState(false);
      const [showTooltip, setShowTooltip] = useState(false);

      // ============ 압축 실패 실험용 헬퍼 함수들 ============
      const generateRandomString = () => {
        const chars = 'abcdefghijklmnopqrstuvwxyz';
        let result = '';
        for (let i = 0; i < 16; i++) {
          result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
      };

      const generateEqualFreqString = () => 'abcdefghijklmnop';

      const generateNoRepeatString = () => {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        const shuffled = chars.split('').sort(() => Math.random() - 0.5);
        return shuffled.slice(0, 18).join('');
      };

      // ============ RLE 압축 함수 ============
      const compressRLE = () => {
        if (!rleInput.trim()) {
          setRleResult({ error: '문자열을 입력해주세요!' });
          return;
        }
        
        let compressed = '';
        let count = 1;
        
        for (let i = 0; i < rleInput.length; i++) {
          if (rleInput[i] === rleInput[i + 1]) {
            count++;
          } else {
            compressed += rleInput[i] + count;
            count = 1;
          }
        }
        
        const originalSize = rleInput.length * 8;
        const compressedSize = compressed.length * 8;
        const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);
        
        setRleResult({
          original: rleInput,
          compressed: compressed,
          originalSize: originalSize,
          compressedSize: compressedSize,
          ratio: ratio
        });
      };

      const compressImage = () => {
        const COLS = 11;
        const ROWS = 6;
        let compressedRows = [];
        let totalCompressed = 0;

        // 각 행별로 RLE 압축 (흰색부터 시작, 번갈아 표시)
        for (let row = 0; row < ROWS; row++) {
          let rowData = [];
          let isWhite = true; // 항상 흰색부터 시작
          let count = 0;

          for (let col = 0; col < COLS; col++) {
            const idx = row * COLS + col;
            const currentIsWhite = pixels[idx] === 'white';

            if (currentIsWhite === isWhite) {
              count++;
            } else {
              // 현재 색상의 개수 기록
              rowData.push(count);
              totalCompressed++;
              // 다음 색상으로 전환
              isWhite = !isWhite;
              count = 1;
            }
          }
          // 마지막 색상 개수 기록
          rowData.push(count);
          totalCompressed++;
          
          compressedRows.push(rowData.join(', '));
        }

        const originalBits = pixels.length * 1; // 흑백: 1비트/픽셀
        const compressedBits = totalCompressed * 4; // 0~11 표현에 4비트 필요
        const ratio = ((1 - compressedBits / originalBits) * 100).toFixed(1);

        let rleMessage = "연속된 같은 색이 많을수록 효과가 좋고, 색이 자주 바뀌면 오히려 데이터가 더 커질 수 있어요. 실제 이미지 RLE는 행별 압축 외에 전체 픽셀 순서(좌→우, 위→아래)로 연속 압축하기도 합니다.";

        if (parseFloat(ratio) > 0) {
          rleMessage = "잘 압축됐어요! " + rleMessage;
        } else if (parseFloat(ratio) < 0) {
          rleMessage = "색상이 자주 바뀌어서 오히려 커졌네요. " + rleMessage;
        } else {
          rleMessage = "압축 효과가 거의 없어요. " + rleMessage;
        }

        setImageResult({ 
          compressedRows, 
          originalBits, 
          compressedBits, 
          ratio, 
          message: rleMessage
        });
      };

      const togglePixel = (index) => {
        const newPixels = [...pixels];
        newPixels[index] = currentColor;
        setPixels(newPixels);
        setImageResult(null);
      };

      const fillAllPixels = (color) => {
        setPixels(Array(66).fill(color));
        setImageResult(null);
      };

      // ============ 허프만 코딩 함수 ============
      const buildHuffmanTree = (freqMap) => {
        let nodes = Object.entries(freqMap).map(([char, freq]) => ({
          char, freq, left: null, right: null
        }));
        nodes.sort((a, b) => a.freq - b.freq);
        
        while (nodes.length > 1) {
          const left = nodes.shift();
          const right = nodes.shift();
          const parent = {
            char: null,
            freq: left.freq + right.freq,
            left,
            right
          };
          let inserted = false;
          for (let i = 0; i < nodes.length; i++) {
            if (parent.freq <= nodes[i].freq) {
              nodes.splice(i, 0, parent);
              inserted = true;
              break;
            }
          }
          if (!inserted) nodes.push(parent);
        }
        
        return nodes[0];
      };

      const generateHuffmanCodes = (node, code = '', codes = {}) => {
        if (!node) return codes;
        if (node.char !== null) {
          codes[node.char] = code || '0';
          return codes;
        }
        generateHuffmanCodes(node.left, code + '0', codes);
        generateHuffmanCodes(node.right, code + '1', codes);
        return codes;
      };

      const compressHuffman = () => {
        if (!huffmanInput.trim()) {
          setHuffmanResult({ error: '텍스트를 입력해주세요!' });
          return;
        }

        const freqMap = {};
        for (const char of huffmanInput) {
          freqMap[char] = (freqMap[char] || 0) + 1;
        }

        const sorted = Object.entries(freqMap).sort((a, b) => b[1] - a[1]);
        const tree = buildHuffmanTree(freqMap);
        const codes = generateHuffmanCodes(tree);

        let compressed = '';
        for (const char of huffmanInput) {
          compressed += codes[char];
        }

        const originalSize = huffmanInput.length * 8;
        const compressedSize = compressed.length;
        const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);

        setHuffmanResult({
          original: huffmanInput,
          sorted: sorted,
          tree: tree,
          codes: codes,
          compressed: compressed,
          originalSize: originalSize,
          compressedSize: compressedSize,
          ratio: ratio
        });
      };

      // ============ 사전 기반 압축 함수 ============
      const compressDictionary = () => {
        if (!dictInput.trim()) {
          setDictResult({ error: '텍스트를 입력해주세요!' });
          return;
        }

        const words = dictInput.split(/\s+/);
        const wordCount = {};
        
        words.forEach(word => {
          wordCount[word] = (wordCount[word] || 0) + 1;
        });

        const repeatedWords = Object.entries(wordCount)
          .filter(([_, count]) => count >= 2)
          .sort((a, b) => b[1] - a[1]);

        const dictionary = {};
        repeatedWords.forEach(([word, _], index) => {
          dictionary[word] = `①②③④⑤⑥⑦⑧⑨⑩`[index] || `(${index + 1})`;
        });

        let compressed = dictInput;
        Object.entries(dictionary).forEach(([word, symbol]) => {
          const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const regex = new RegExp(`(?<=[\\s]|^)${escaped}(?=[\\s]|$)`, 'gm');
          compressed = compressed.replace(regex, symbol);
        });

        const originalSize = dictInput.length * 8;
        const compressedTextLen = compressed.length;
        const dictDetail = Object.entries(dictionary).map(([word, symbol]) => ({
          word, symbol, len: word.length + symbol.length
        }));
        const dictLen = dictDetail.reduce((sum, d) => sum + d.len, 0);
        const compressedSize = (compressedTextLen + dictLen) * 8;
        const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);

        setDictResult({
          original: dictInput,
          dictionary: dictionary,
          compressed: compressed,
          wordCount: wordCount,
          originalSize: originalSize,
          compressedSize: compressedSize,
          compressedTextLen: compressedTextLen,
          dictLen: dictLen,
          dictDetail: dictDetail,
          ratio: ratio
        });
      };

      // ============ LZ77 압축 함수 ============
      const compressLZ77 = () => {
        if (!lzInput.trim()) {
          setLzResult({ error: '텍스트를 입력해주세요!' });
          return;
        }

        const windowSize = 20;
        let compressed = [];
        let steps = [];
        let i = 0;

        while (i < lzInput.length) {
          let matchLength = 0;
          let matchDistance = 0;
          
          const searchStart = Math.max(0, i - windowSize);
          
          for (let j = searchStart; j < i; j++) {
            let length = 0;
            while (
              i + length < lzInput.length &&
              lzInput[j + length] === lzInput[i + length] &&
              length < 15
            ) {
              length++;
            }
            
            if (length > matchLength) {
              matchLength = length;
              matchDistance = i - j;
            }
          }

          if (matchLength >= 3) {
            compressed.push(`(${matchDistance},${matchLength})`);
            steps.push({
              type: 'match',
              position: i,
              distance: matchDistance,
              length: matchLength,
              original: lzInput.substring(i, i + matchLength),
              compressed: `(${matchDistance},${matchLength})`
            });
            i += matchLength;
          } else {
            compressed.push(lzInput[i]);
            steps.push({
              type: 'literal',
              position: i,
              char: lzInput[i]
            });
            i++;
          }
        }

        const compressedStr = compressed.join('');
        
        // 압축 크기 계산: 일반 문자 1바이트, (거리,길이) 2바이트
        let compressedBytes = 0;
        for (let item of compressed) {
          if (item.startsWith('(')) {
            compressedBytes += 2;  // (거리,길이) = 2바이트
          } else {
            compressedBytes += 1;  // 일반 문자 = 1바이트
          }
        }
        
        const originalBytes = lzInput.length;
        const ratio = ((1 - compressedBytes / originalBytes) * 100).toFixed(1);

        setLzResult({
          original: lzInput,
          compressed: compressedStr,
          steps: steps,
          originalBytes: originalBytes,
          compressedBytes: compressedBytes,
          ratio: ratio
        });
        setLzSteps(steps);
        setCurrentStep(-1);
      };

      // LZ77 단계별 시각화
      const LZStepVisualizer = () => {
        if (!lzResult || !lzSteps.length) return null;

        const step = currentStep >= 0 ? lzSteps[currentStep] : null;
        const visibleSteps = currentStep >= 0 ? lzSteps.slice(0, currentStep + 1) : [];

        return (
          <div className="mt-4 bg-white rounded-xl border border-purple-200 p-4 shadow-sm">
            <p className="font-bold text-purple-700 mb-3 flex items-center gap-2">
              <span className="text-lg">🪟</span> 슬라이딩 윈도우 단계별 보기
            </p>

            {/* 원본 문자열 */}
            <div className="mb-4">
              <p className="text-base text-gray-500 mb-2 font-medium">원본 문자열:</p>
              <div className="flex flex-wrap gap-1 font-mono">
                {lzInput.split('').map((ch, i) => {
                  let bg = 'bg-gray-100 text-gray-700 border border-gray-200';
                  if (step) {
                    const currentPos = step.position;
                    const currentLen = step.type === 'match' ? step.length : 1;
                    if (i >= currentPos && i < currentPos + currentLen) {
                      bg = 'bg-purple-400 text-white border border-purple-500 scale-110 shadow-md';
                    } else if (i < currentPos) {
                      bg = 'bg-purple-100 text-purple-700 border border-purple-200';
                    }
                  }
                  return (
                    <span key={i} className={`inline-flex items-center justify-center w-8 h-8 rounded text-base font-bold transition-all duration-200 ${bg}`}>
                      {ch}
                    </span>
                  );
                })}
              </div>
            </div>

            {/* 현재 스텝 설명 */}
            {step && (
              <div className={`mb-3 p-3 rounded-lg border text-base font-medium ${
                step.type === 'match' 
                  ? 'bg-yellow-50 border-yellow-300 text-yellow-800' 
                  : 'bg-gray-50 border-gray-200 text-gray-700'
              }`}>
                {step.type === 'match' ? (
                  <>

                  </table>

              </div>

              {/* 자주 헷갈리는 포인트 팁 박스 */}
              <div className="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-2xl p-6 mb-6 border border-yellow-300">
                <h3 className="text-2xl font-bold text-orange-900 mb-4">🤔 학생들이 자주 헷갈리는 3가지</h3>
                <div className="space-y-4">
                  <div className="bg-white rounded-xl p-5 shadow-sm border-l-4 border-yellow-400">
                    <h4 className="font-bold text-yellow-700 mb-2">1. RLE는 왜 색이 자주 바뀌면 용량이 오히려 커질까?</h4>
                    <p className="text-gray-700 text-base">문자마다 숫자(길이)를 붙여야 하기 때문이에요. 예를 들어 "abcd" → "a1b1c1d1"로 두 배가 됩니다. 반복이 없을수록 불리해요!</p>
                  </div>
                  <div className="bg-white rounded-xl p-5 shadow-sm border-l-4 border-orange-400">
                    <h4 className="font-bold text-orange-700 mb-2">2. 허프만 코딩은 왜 항상 최적이라고 할까?</h4>
                    <p className="text-gray-700 text-base">주어진 문자 빈도에 대해 <strong>최적의 접두 부호(prefix code)</strong>를 만들어줍니다. 단, 빈도가 모두 같으면 코드 길이도 균일해져 압축 효과가 줄어들어요.</p>
                  </div>
                  <div className="bg-white rounded-xl p-5 shadow-sm border-l-4 border-amber-400">
                    <h4 className="font-bold text-amber-700 mb-2">3. 허프만 트리는 항상 하나만 만들어질까?</h4>
                    <p className="text-gray-700 text-base">아니요! 같은 빈도의 문자가 있을 때 트리는 <strong>여러 개 존재할 수 있어요.</strong> 어느 트리를 선택해도 총 비트 수는 동일하게 최적입니다.</p>
                  </div>
                </div>
              </div>

              {/* 어떤 데이터에 어떤 압축이 적합한가 퀴즈 */}
              <div className="bg-gradient-to-r from-green-50 to-emerald-50 rounded-2xl p-6 mb-6 border border-green-300">
                <h3 className="text-2xl font-bold text-green-900 mb-2">🎯 어떤 압축이 더 효율적일까?</h3>
                <p className="text-gray-600 mb-5 text-base">데이터 특성에 따라 더 잘 맞는 압축 방법이 있어요. 각 데이터에 어떤 압축이 더 유리할지 생각해보세요!</p>
                <div className="space-y-4">
                  {[
                    { data: 'AAAAAAA', hint: '같은 문자가 길게 반복돼요.', best: 'RLE', reason: '연속 반복 패턴 → RLE가 "A7" 하나로 압축! 허프만도 쓸 수 있지만 이 경우엔 RLE가 가장 간단해요.' },
                    { data: 'HelloHelloHello', hint: '같은 단어가 3번 반복돼요.', best: 'LZ77 / 사전 기반', reason: '동일 패턴 반복 → LZ77은 (거리,길이)로, 사전 기반은 기호로 치환. 둘 다 효과적이에요!' },
                    { data: '무작위 데이터 (랜덤)', hint: '패턴이나 반복이 전혀 없어요.', best: '효과 없음', reason: '어떤 압축을 써도 효과가 없거나 오히려 커질 수 있어요. 이미 압축된 파일(ZIP, MP3)도 같은 이유로 재압축이 안 돼요!' },
                  ].map((item, idx) => (
                    <DataMatchQuiz key={idx} item={item} idx={idx} />
                  ))}
                </div>
              </div>

              {/* 생각해보기 섹션 */}
              <div className="bg-gradient-to-r from-cyan-50 to-blue-50 rounded-2xl p-6 border border-cyan-200 mb-6">
                <h3 className="text-2xl font-bold text-cyan-900 mb-4">🤔 생각해보기</h3>
                <div className="grid md:grid-cols-2 gap-4">
                  <div className="bg-white p-5 rounded-lg shadow-sm border-t-4 border-cyan-400">
                    <h4 className="font-bold text-xl text-cyan-700 mb-3">Q. 무손실 압축과 손실 압축의 차이는?</h4>
                    <p className="text-base text-gray-700 leading-relaxed">
                      <span className="font-bold text-cyan-700">무손실 압축</span>은 원본을 100% 복원할 수 있어요. 문서, 프로그램처럼 정확해야 하는 파일에 사용합니다.
                      <span className="font-bold text-orange-500"> 손실 압축</span>은 일부 정보를 버려서 더 작게 만들어요. 사진, 음악, 동영상처럼 약간의 손실이 괜찮은 파일에 사용합니다.
                    </p>
                  </div>
                  <div className="bg-white p-5 rounded-lg shadow-sm border-t-4 border-cyan-400">
                    <h4 className="font-bold text-xl text-cyan-700 mb-3">Q. ZIP 파일은 어떤 압축을 사용하나요?</h4>
                    <p className="text-base text-gray-700 leading-relaxed">
                      <span className="font-bold text-cyan-700">ZIP 파일</span>은 주로 LZ 압축과 허프만 코딩을 함께 사용해요.
                      먼저 LZ로 반복 패턴을 찾고, 그 다음 허프만 코딩으로 빈도가 높은 데이터를 더 압축합니다!
                    </p>
                  </div>
                  <div className="bg-white p-5 rounded-lg shadow-sm border-t-4 border-blue-400">
                    <h4 className="font-bold text-xl text-blue-700 mb-3">Q. 압축률은 항상 좋을까요?</h4>
                    <p className="text-base text-gray-700 leading-relaxed">
                      아니요! <span className="font-bold text-orange-500">반복이나 패턴이 적은 데이터</span>는 압축률이 낮아요.
                      예를 들어 완전히 랜덤한 데이터나 이미 압축된 파일은 더 이상 압축이 안 될 수 있어요.
                    </p>
                  </div>
                  <div className="bg-white p-5 rounded-lg shadow-sm border-t-4 border-blue-400">
                    <h4 className="font-bold text-xl text-blue-700 mb-3">Q. 실생활에서 무손실 압축을 어디에 쓸까요?</h4>
                    <p className="text-base text-gray-700 leading-relaxed">
                      <span className="font-bold text-cyan-700">문서 전송</span>, <span className="font-bold text-cyan-700">프로그램 설치파일</span>,
                      <span className="font-bold text-orange-500"> 의료 이미지</span>, <span className="font-bold text-orange-500">법률 문서</span> 등
                      원본이 중요한 모든 곳에서 사용됩니다!
                    </p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 홈으로 돌아가기 버튼 - 모든 탭 공통 */}
          <div className="text-center py-8 bg-gray-50 border-t border-gray-200">
            <a 
              href="index.html" 
              className="inline-block bg-gradient-to-r from-cyan-600 to-blue-600 text-white w-64 py-3 rounded-lg font-bold text-lg hover:from-cyan-700 hover:to-blue-700 transition-all shadow-lg hover:shadow-xl"
            >
              🏠 홈으로 돌아가기
            </a>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CompressionEducation />);
  </script>
</body>
</html>
