/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   탭 3: 데이터 전처리
═══════════════════════════════════════════ */
const ProcessTab = () => {
  const [step, setStep] = useState(0);
  const [showBusanTooltip, setShowBusanTooltip] = useState(false);

  const raw       = [
    { id:1, name:'김민준', age:'16', score:'85',   city:'서울' },
    { id:2, name:null,    age:'17', score:'72',   city:'부산' },
    { id:3, name:'이서연', age:'16', score:'9999', city:'서울' },
    { id:4, name:'박도윤', age:'17', score:'91',   city:'서울특별시' },
    { id:5, name:'최유나', age:'16', score:'',     city:'대구' },
    { id:6, name:'정시우', age:'16', score:'78',   city:'서울' },
  ];
  const cleaned   = [
    { id:1, name:'김민준', age:'16', score:'85', city:'서울' },
    { id:4, name:'박도윤', age:'17', score:'91', city:'서울특별시' },
    { id:6, name:'정시우', age:'16', score:'78', city:'서울' },
  ];
  const merged    = [
    { id:1, name:'김민준', age:'16', score:'85', city:'서울', region:'수도권' },
    { id:4, name:'박도윤', age:'17', score:'91', city:'서울', region:'수도권' },
    { id:6, name:'정시우', age:'16', score:'78', city:'서울', region:'수도권' },
  ];
  const normalized = [
    { id:1, name:'김민준', age:'16', score:'0.54', city:'서울', region:'수도권' },
    { id:4, name:'박도윤', age:'17', score:'1.00', city:'서울', region:'수도권' },
    { id:6, name:'정시우', age:'16', score:'0.00', city:'서울', region:'수도권' },
  ];

  const tables = [raw, cleaned, merged, normalized];
  const current = tables[step];
  const cols = step < 2 ? ['name','age','score','city'] : ['name','age','score','city','region'];
  const colLabel = { name:'이름', age:'나이', score: step===3?'점수(정규화)':'점수', city:'도시', region:'지역' };

  const stepMeta = [
    { label:'원시 데이터',   icon:'⚠️', btn:'bg-red-100 text-red-700 border-red-300',
      desc:'데이터를 수집하면 처음에는 이런 형태예요. 빈 값(이름이 없음), 말이 안 되는 값(9999점), 표기가 다른 값(서울특별시 vs 서울) 등 다양한 오류가 섞여 있어요. 이 상태로는 분석이 불가능해요!',
      concepts: [] },
    { label:'1단계: 정리', icon:'🧹', btn:'bg-blue-100 text-blue-700 border-blue-300',
      desc:'결측치와 이상치를 찾아내서 삭제하거나 적절한 값으로 채우는 과정이에요. 이 단계를 거쳐야 분석 결과가 신뢰할 수 있어요. 전처리 시간의 70~80%가 이 정리 단계에 쓰인다고 해요!',
      concepts: [
        { badge:'bg-red-400',    label:'❌ 결측치 (Missing Value)', detail:'값이 아예 비어있는 데이터예요. 이름이나 점수 칸이 공백인 경우로, 계산에 포함하면 오류가 나거나 결과가 왜곡될 수 있어요. 삭제하거나 평균값으로 채우는 방법을 쓰기도 해요.' },
        { badge:'bg-orange-400', label:'⚠️ 이상치 (Outlier)',       detail:'현실적으로 있을 수 없는 비정상적인 값이에요. 100점 만점 시험에서 9999점은 명백한 오류예요. 이상치를 그냥 두면 평균, 표준편차 등 모든 통계 수치가 왜곡돼요.' },
      ] },
    { label:'2단계: 통합', icon:'🔗', btn:'bg-emerald-100 text-emerald-700 border-emerald-300',
      desc:'"서울"과 "서울특별시"는 같은 곳이지만 컴퓨터는 다른 값으로 인식해요. 이처럼 같은 의미를 가진 표현들을 하나의 기준으로 통일하고, 필요한 경우 다른 데이터를 합치는 과정이에요.',
      concepts: [] },
    { label:'3단계: 정규화', icon:'📐', btn:'bg-purple-100 text-purple-700 border-purple-300',
      desc:'예를 들어 성적은 100점 만점이고, 키는 cm 단위라서 두 값을 바로 비교하기 어려워요. 그래서 서로 다른 기준이나 단위를 가진 데이터를 모두 0~1 사이 숫자로 바꿔서 같은 기준으로 비교할 수 있게 해주는 과정이에요.',
      concepts: [] },
  ];

  const changes = [
    [],
    ['이름이 없는 행(2번) → 결측치 → 해당 행 삭제', '점수 9999 → 이상치(100점 만점 기준 불가) → 해당 행 삭제', '점수 빈칸(5번) → 결측치 → 해당 행 삭제', '✅ 결과: 6개 행 → 깨끗한 3개 행으로 정리!'],
    ['"서울특별시" → "서울"로 표기 통일 (같은 지역이지만 표기가 달랐음)', '새 컬럼 "지역" 추가: 서울 → 수도권으로 분류', '✅ 결과: 데이터 형식이 일관성 있게 정리되었어요!'],
    ['최솟값 78점 → 0.00, 최댓값 91점 → 1.00으로 변환', '85점 → 0.54 계산: (85 − 78) ÷ (91 − 78) = 7 ÷ 13 ≈ 0.54', '✅ 결과: 0~1 범위로 맞춰 서로 다른 기준 비교 가능!'],
  ];

  const getRowStyle = row => {
    if (step !== 0) return '';
    if (!row.name) return 'bg-red-50';
    if (row.score === '9999' || row.score === '') return 'bg-yellow-50';
    return '';
  };

  const renderCell = (col, val) => {
    if (val === null || val === '') return <span className="text-red-400 font-bold">❌ 빈칸</span>;
    if (step === 0 && col === 'score' && val === '9999') return <span className="text-orange-500 font-bold">⚠️ 9999</span>;
    if (step <= 1 && col === 'city' && val === '서울특별시') return <span className="text-orange-500 font-bold">⚠️ 서울특별시</span>;
    if (step === 2 && col === 'city' && val === '서울') return <span className="text-emerald-600 font-bold">✅ {val}</span>;
    if (step === 2 && col === 'region') return <span className="text-emerald-600 font-bold">🆕 {val}</span>;
    if (step === 3 && col === 'score') return <span className="text-purple-600 font-bold">📐 {val}</span>;
    if (val === '부산') return (
      <span className="relative inline-block cursor-pointer hover:scale-110 transition-transform"
        onClick={() => { setShowBusanTooltip(true); setTimeout(() => setShowBusanTooltip(false), 400); }}>
        부산
        {showBusanTooltip && (
          <span className="absolute left-1/2 -translate-x-1/2 -top-10 bg-red-400 text-white px-3 py-1 rounded-lg text-sm font-bold whitespace-nowrap shadow-lg animate-bounce">
            {"\uCC38\uC0C8"}
          </span>
        )}
      </span>
    );
    return <span>{val}</span>;
  };

  const sm = stepMeta[step];

  return (
    <div className="space-y-8 slide-in">
      <div className="bg-gradient-to-r from-orange-500 to-red-500 p-6 rounded-2xl text-white shadow-lg">
        <h2 className="text-2xl font-bold mb-2">🔧 데이터 전처리란?</h2>
        <p className="text-base text-orange-100 leading-relaxed">
          수집된 데이터는 바로 분석에 쓸 수 없어요. 오류, 빈칸, 중복, 형식 불일치 등 다양한 문제가 있기 때문이에요.
          전처리(Pre-processing)는 이런 문제를 정리해서 분석하기 좋은 상태로 다듬는 과정이에요.
          실제 데이터 분석 전체 시간의 약 70~80%를 전처리에 사용할 만큼 중요한 단계예요!
        </p>
      </div>

      {/* 단계 버튼 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {stepMeta.map((s, i) => (
          <button key={i} onClick={() => setStep(i)}
            className={`py-3 px-2 rounded-xl text-base font-bold text-center transition-all border-2 leading-tight
              ${step === i ? `${s.btn} scale-105 shadow-md` : step > i ? 'bg-green-50 text-green-600 border-green-200' : 'bg-gray-50 text-gray-400 border-gray-200'}`}>
            <div className="text-xl mb-1">{step > i && i > 0 ? '✅' : s.icon}</div>
            <div>{s.label}</div>
          </button>
        ))}
      </div>

      {/* 현재 단계 설명 */}
      <div className={`p-5 rounded-xl border-2 ${sm.btn}`}>
        <p className="font-bold text-base mb-2">{sm.icon} {sm.label}</p>
        <p className="text-base leading-relaxed">{sm.desc}</p>
      </div>

      {/* 결측치/이상치 개념 */}
      {sm.concepts.length > 0 && (
        <div className="space-y-3">
          {sm.concepts.map((c, i) => (
            <div key={i} className="flex items-start gap-4 bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
              <span className={`text-white text-base font-bold px-3 py-1 rounded-lg flex-shrink-0 ${c.badge}`}>개념</span>
              <div>
                <div className="font-bold text-base text-gray-800 mb-1">{c.label}</div>
                <div className="text-base text-gray-600 leading-relaxed">{c.detail}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 테이블 */}
      <div className="overflow-x-auto rounded-xl shadow border border-gray-200">
        <table className="w-full border-collapse">
          <thead>
            <tr className="bg-gray-100">
              {cols.map(c => <th key={c} className="p-3 text-center font-bold text-gray-600 text-base border border-gray-200">{colLabel[c]}</th>)}
            </tr>
          </thead>
          <tbody>
            {current.map((row, ri) => (
              <tr key={row.id} className={`border ${getRowStyle(row)} float-up`} style={{ animationDelay: `${ri * 0.05}s` }}>
                {cols.map(c => <td key={c} className="p-3 text-center text-base border border-gray-100">{renderCell(c, row[c])}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 변화 설명 */}
      {step > 0 && changes[step].length > 0 && (
        <div className="bg-green-50 border-2 border-green-200 rounded-xl p-5">
          <h4 className="font-bold text-green-700 mb-3 text-base">🔍 이번 단계에서 어떤 변화가 일어났나요?</h4>
          <ul className="text-base text-gray-700 space-y-2">
            {changes[step].map((c, i) => <li key={i}>{c}</li>)}
          </ul>
        </div>
      )}

      {/* 이전/다음 버튼 */}
      <div className="flex gap-3">
        {step > 0 && (
          <button onClick={() => setStep(s => s - 1)}
            className="flex-1 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all text-base">
            ← 이전 단계
          </button>
        )}
        {step < 3 && (
          <button onClick={() => setStep(s => s + 1)}
            className="flex-1 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-500 hover:opacity-90 transition-all shadow-md text-base">
            다음 단계 →
          </button>
        )}
      </div>

      {/* 전처리 흐름 요약 */}
      <div className="bg-indigo-50 border-2 border-indigo-200 rounded-2xl p-5">
        <h3 className="font-bold text-indigo-700 mb-3 text-base text-center">🗺️ 전처리 3단계 한눈에 보기</h3>
        <div className="flex items-center justify-center gap-3 flex-wrap">
          {['🧹 데이터 정리\n(결측치·이상치 제거)', '→', '🔗 데이터 통합\n(표기 통일·컬럼 추가)', '→', '📐 데이터 정규화\n(0~1 범위로 변환)'].map((t, i) => (
            t === '→'
              ? <span key={i} className="text-indigo-300 font-bold text-xl">→</span>
              : <div key={i} className="bg-white rounded-lg px-4 py-3 text-base font-bold text-indigo-700 border border-indigo-200 text-center whitespace-pre-line leading-snug">{t}</div>
          ))}
        </div>
      </div>
    </div>
  );
};

};

          </g>

      opts:['결측치','공공 데이터','이상치','정규화'], ans:2,
      ex:'이상치(Outlier)는 측정 오류나 입력 실수로 발생한 비정상적인 값이에요. 이상치를 포함하면 평균 등 모든 통계가 왜곡돼요!' },
    { cat:'📊 데이터 시각화', q:'어느 점수대 학생이 가장 많은지 분포를 볼 때 가장 적합한 그래프는?', hint:'X축이 범위(구간)으로 나뉘어져 있는 그래프예요!',
      opts:['막대그래프','선 그래프','산점도','히스토그램'], ans:3,
      ex:'히스토그램은 X축이 구간(범위)으로 나뉘어 데이터가 어디에 얼마나 몰려 있는지를 보여줘요. "70점대 학생이 가장 많다"처럼 구간별 인원 수를 파악할 때 사용해요!' },
    { cat:'📊 데이터 시각화', q:'공부 시간이 늘수록 성적도 올라가는 관계를 무엇이라고 할까요?', hint:'두 값이 같은 방향으로 함께 변해요!',
      opts:['음의 상관관계','양의 상관관계','무상관','히스토그램'], ans:1,
      ex:'두 값이 함께 커지는 관계를 양의 상관관계라고 해요. 반대로 한쪽이 커질수록 다른 쪽이 작아지면 음의 상관관계예요!' },
    { cat:'💡 문제 해결', q:'데이터 분석 후 "초코빵을 더 많이 주문하자"고 결정하는 것은?', hint:'분석 결과를 바탕으로 행동 방향을 정하는 최종 단계예요!',
      opts:['데이터 수집','데이터 전처리','데이터 시각화','의사결정'], ans:3,
      ex:'데이터→정보→지식을 거쳐 최종적으로 행동을 결정하는 것이 의사결정이에요. 빅데이터 활용의 궁극적 목표예요!' },
    { cat:'🛡️ 데이터 윤리', q:'친구들을 대상으로 설문조사를 할 때 반드시 먼저 해야 하는 것은?', hint:'데이터를 수집하기 전에 상대방의 권리를 존중해야 해요!',
      opts:['최대한 많은 개인정보를 수집한다','이름·연락처를 몰래 기록한다','조사 목적을 알리고 동의를 받는다','수집한 데이터를 SNS에 공유한다'], ans:2,
      ex:'개인정보보호법에 따라 데이터 수집 전 반드시 목적을 알리고 동의를 받아야 해요. 이것이 데이터 윤리의 기본이에요!' },
    { cat:'🏛️ 공공데이터', q:'정부·공공기관이 국민 누구나 무료로 사용할 수 있게 제공하는 데이터 포털은?', hint:'우리나라 대표 공공 오픈데이터 사이트예요!',
      opts:['캐글 (Kaggle)','data.go.kr (공공데이터포털)','유튜브 데이터 랩','인스타그램 인사이트'], ans:1,
      ex:'data.go.kr(공공데이터포털)에서 버스 노선·인구 통계·날씨 등 수만 가지 공공데이터를 무료로 내려받아 활용할 수 있어요!' },
    { cat:'🤖 AI와 빅데이터', q:'ChatGPT 같은 AI가 자연스럽게 대화할 수 있는 근본적인 이유는?', hint:'AI는 스스로 태어날 때부터 알고 있는 게 아니에요!',
      opts:['AI가 태어날 때부터 모든 것을 알고 있어서','수천억 개의 텍스트 데이터를 학습했기 때문에','인터넷 속도가 빠르기 때문에','개발자가 모든 답을 직접 입력했기 때문에'], ans:1,
      ex:'ChatGPT는 인터넷의 수천억 개 문장 데이터를 학습해 만들어졌어요. AI의 성능은 학습 데이터의 양과 질에 직결돼요!' },
  ];

  const q = QUIZ[qi], total = QUIZ.length;
  const pick  = idx => { if(done) return; setSel(idx); setDone(true); if(idx === q.ans) setScore(s => s+1); };
  const next  = () => { if(qi+1 >= total) { setFin(true); } else { setQi(i => i+1); setSel(null); setDone(false); } };
  const retry = () => { setQi(0); setScore(0); setSel(null); setDone(false); setFin(false); };
  const medal = (s, t) => {
    const r = s/t;
    if(r === 1)  return { e:'🏆', m:'완벽해요! 빅데이터 전문가 등극!', c:'text-yellow-600' };
    if(r >= 0.8) return { e:'🥇', m:'훌륭해요! 거의 다 맞혔어요!',    c:'text-orange-500' };
    if(r >= 0.6) return { e:'🥈', m:'잘했어요! 조금만 더 공부하면!',  c:'text-blue-500' };
    return { e:'📚', m:'다시 한번 도전해봐요!', c:'text-green-600' };
  };

  return (
    <div className="space-y-6 slide-in">
      <div className="bg-gradient-to-r from-yellow-400 to-orange-500 p-6 rounded-2xl text-white text-center shadow-lg">
        <h2 className="text-2xl font-bold mb-1">🏆 빅데이터 퀴즈</h2>
        <p className="text-base opacity-90">배운 내용을 확인해봐요! 총 {total}문제</p>
      </div>

      {!fin ? (
        <div className="bg-white rounded-2xl border-2 border-orange-200 shadow-lg overflow-hidden">
          <div className="bg-gray-100 px-6 pt-5 pb-3">
            <div className="flex justify-between text-base font-bold text-gray-600 mb-2">
              <span>{q.cat}</span><span>{qi+1} / {total}</span>
            </div>
            <div className="w-full bg-gray-200 rounded-full h-3">
              <div className="bg-gradient-to-r from-yellow-400 to-orange-400 h-3 rounded-full transition-all duration-500"
                style={{ width:`${((qi+1)/total)*100}%` }}/>
            </div>
          </div>
          <div className="px-6 py-5">
            <p className="text-lg font-bold text-gray-800 mb-2">{q.q}</p>
            <p className="text-base text-blue-600 bg-blue-50 px-4 py-2 rounded-lg mb-5">💡 힌트: {q.hint}</p>
            <div className="space-y-3">
              {q.opts.map((opt, idx) => {
                let style = 'bg-gray-50 border-gray-200 text-gray-700 hover:bg-orange-50 hover:border-orange-300 cursor-pointer';
                if (done) {
                  if (idx === q.ans)    style = 'bg-green-100 border-green-500 text-green-800 font-bold';
                  else if (idx === sel) style = 'bg-red-100 border-red-400 text-red-700';
                  else                  style = 'bg-gray-50 border-gray-200 text-gray-400';
                }
                return (
                  <div key={idx} onClick={() => pick(idx)}
                    className={`p-4 rounded-xl border-2 transition-all text-base ${style}`}>
                    <span className="font-bold mr-2">{['①','②','③','④'][idx]}</span>{opt}
                    {done && idx === q.ans && <span className="ml-2">✅</span>}
                    {done && idx === sel && idx !== q.ans && <span className="ml-2">❌</span>}
                  </div>
                );
              })}
            </div>
            {done && (
              <div className="mt-5 bg-yellow-50 border-2 border-yellow-300 p-4 rounded-xl">
                <p className="font-bold text-yellow-800 mb-1">{sel === q.ans ? '🎉 정답이에요!' : '😅 아쉬워요!'}</p>
                <p className="text-base text-gray-700 leading-relaxed">{q.ex}</p>
              </div>
            )}
          </div>
          <div className="px-6 pb-6">
            {done
              ? <button onClick={next} className="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-white py-3 rounded-xl font-bold text-base hover:opacity-90 transition-all shadow-md">
                  {qi+1 >= total ? '🏁 결과 보기' : '다음 문제 →'}
                </button>
              : <p className="text-center text-base text-gray-400">보기를 선택해주세요!</p>
            }
          </div>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border-2 border-yellow-300 shadow-lg p-8 text-center">
          {(() => { const r = medal(score, total); return (<>
            <p className="text-6xl mb-4">{r.e}</p>
            <p className={`text-2xl font-bold mb-2 ${r.c}`}>{r.m}</p>
            <p className="text-5xl font-bold text-gray-800 my-6">{score} <span className="text-2xl text-gray-400">/ {total}</span></p>
            <div className="grid grid-cols-5 gap-2 mb-8">
              {QUIZ.map((_,i) => <div key={i} className={`h-3 rounded-full ${i < score ? 'bg-green-400' : 'bg-red-300'}`}/>)}
            </div>
            <button onClick={retry} className="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-white py-3 rounded-xl font-bold text-lg hover:opacity-90 transition-all shadow-md">
              🔄 다시 도전하기
            </button>
          </>); })()}
        </div>
      )}

      {!fin && (
        <div className="bg-orange-50 border border-orange-200 rounded-xl px-5 py-3 flex items-center justify-between">
          <span className="text-base font-bold text-orange-700">🏅 현재 점수</span>
          <span className="text-xl font-bold text-orange-600">{score} / {qi + (done ? 1 : 0)}</span>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
