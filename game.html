<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정답 생쥐를 찾아라!</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        text-align: center;
    }

    #game {
        width: 800px;
        height: 600px;
        margin: 20px auto;
        background: white;
        border: 2px solid #333;
        position: relative;
        overflow: hidden;
    }

    .mouse {
        position: absolute;
        cursor: pointer;
        user-select: none;
    }

    #info {
        font-size: 22px;
        margin-top: 10px;
    }

    #gameover {
        font-size: 36px;
        color: red;
        margin-top: 20px;
        display: none;
    }

    #restartBtn {
        display: none;
        margin-top: 20px;
        padding: 12px 24px;
        font-size: 20px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>🐭 정답 생쥐를 찾아라!</h1>

<div id="info">
    ⏱ 남은 시간: <span id="time">30</span>초 |
    🎯 점수: <span id="score">0</span>
</div>

<div id="game"></div>

<div id="gameover"></div>
<button id="restartBtn">🔄 다시 시작</button>

<script>
    const game = document.getElementById("game");
    const scoreText = document.getElementById("score");
    const timeText = document.getElementById("time");
    const gameOverText = document.getElementById("gameover");
    const restartBtn = document.getElementById("restartBtn");

    // 게임 상태 변수
    let score = 0;
    let timeLeft = 30;
    let gameRunning = true;
    let timer = null;

    // 격자 설정 (3x3)
    const rows = 3;
    const cols = 3;
    const total = rows * cols;

    const gameWidth = 800;
    const gameHeight = 600;

    const cellWidth = gameWidth / cols;
    const cellHeight = gameHeight / rows;

    let mouseSize = 80;

    function startRound() {
        if (!gameRunning) return;

        // ⭐ 점수 기반 난이도
        mouseSize = (score >= 20) ? 50 : 80;

        game.innerHTML = "";

        const targetIndex = Math.floor(Math.random() * total);

        for (let i = 0; i < total; i++) {
            const img = document.createElement("img");
            img.className = "mouse";

            img.src = (i === targetIndex)
                ? "mouse_target.svg"
                : "mouse_normal.svg";

            img.style.width = mouseSize + "px";
            img.style.height = mouseSize + "px";

            const row = Math.floor(i / cols);
            const col = i % cols;

            const x = col * cellWidth + (cellWidth - mouseSize) / 2
                      + (Math.random() * 20 - 10);
            const y = row * cellHeight + (cellHeight - mouseSize) / 2
                      + (Math.random() * 20 - 10);

            img.style.left = x + "px";
            img.style.top = y + "px";

            img.onclick = () => {
                if (!gameRunning) return;

                score += (i === targetIndex) ? 1 : -1;
                scoreText.innerText = score;
                startRound();
            };

            game.appendChild(img);
        }
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            timeText.innerText = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        gameRunning = false;
        clearInterval(timer);
        game.innerHTML = "";

        gameOverText.style.display = "block";
        gameOverText.innerHTML = `
            ⏰ 게임 종료!<br>
            최종 점수: ${score}
        `;

        restartBtn.style.display = "inline-block";
    }

    function restartGame() {
        // 상태 초기화
        score = 0;
        timeLeft = 30;
        mouseSize = 80;
        gameRunning = true;

        scoreText.innerText = score;
        timeText.innerText = timeLeft;

        gameOverText.style.display = "none";
        restartBtn.style.display = "none";

        startRound();
        startTimer();
    }

    // 다시 시작 버튼 이벤트
    restartBtn.onclick = restartGame;

    // 최초 시작
    startRound();
    startTimer();
</script>

</body>
</html>
