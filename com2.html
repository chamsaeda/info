<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>손실 압축 체험하기</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #f093fb 100%);
      margin: 0;
      padding: 20px;
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in { animation: slideIn 0.5s ease-out; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    canvas { max-width: 100%; height: auto; }
    .slider-pink {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: #fce7f3;
      outline: none;
    }
    .slider-pink::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #f5576c;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .freq-bar {
      flex: 1;
      max-width: 30px;
      background: linear-gradient(to top, #f093fb, #f5576c);
      border-radius: 5px 5px 0 0;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }
    .freq-bar:hover { opacity: 0.8; transform: scale(1.05); }
    .freq-bar.removed { background: #ddd; opacity: 0.3; }
    .freq-bar.playing { animation: pulse 0.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.1); }
    }
    .freq-bar-label {
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65em;
      white-space: nowrap;
      color: #666;
    }
    .wave-bar {
      flex: 1;
      background: #f5576c;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .wave-bar.masked { background: #ddd; opacity: 0.3; }
    .wave-bar.playing { animation: wavePulse 0.5s ease-in-out infinite; }
    @keyframes wavePulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.15); }
    }
    @keyframes bounceOnce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50% { transform: translateY(-10px) translateX(-50%); }
    }
    .collapsible-content {
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      max-height: 0;
      opacity: 0;
    }
    .collapsible-content.open { max-height: 2000px; opacity: 1; }

    /* ── Wu 색상 압축 체험 섹션 전용 스타일 ── */
    .wu-drop-area {
      border: 2px dashed #f9a8d4;
      border-radius: 16px;
      background: #fdf2f8;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .wu-drop-area.over {
      border-color: #f5576c;
      background: #fce7f3;
    }
    .wu-progress-wrap {
      display: none;
      margin-bottom: 12px;
    }
    .wu-progress-wrap.show { display: block; }
    .wu-p-bg {
      background: #fce7f3;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
      border: 1px solid #f9a8d4;
    }
    .wu-p-fill {
      height: 100%;
      background: linear-gradient(90deg, #f093fb, #f5576c);
      border-radius: 6px;
      width: 0%;
      transition: width .3s;
    }
    .wu-card {
      background: white;
      border: 1.5px solid #fce7f3;
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow .2s, transform .15s;
    }
    .wu-card:hover {
      box-shadow: 0 4px 16px rgba(245,87,108,0.18);
      transform: translateY(-2px);
    }
    .wu-card.orig-card { border-color: #f9a8d4; }
    .wu-cw {
      position: relative;
      background: #f9fafb;
      line-height: 0;
      overflow: hidden;
    }
    .wu-cw canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .wu-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(245,87,108,0.85);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      letter-spacing: .3px;
    }
    .wu-badge.orig-badge { background: rgba(79,154,222,0.9); }
    .wu-spin-wrap {
      position: absolute;
      inset: 0;
      background: rgba(253,242,248,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wu-spinner {
      width: 26px;
      height: 26px;
      border: 3px solid #fce7f3;
      border-top-color: #f5576c;
      border-radius: 50%;
      animation: wu-spin .7s linear infinite;
    }
    @keyframes wu-spin { to { transform: rotate(360deg); } }
    .wu-footer {
      padding: 10px 12px 12px;
      border-top: 1px solid #fce7f3;
    }
    .wu-card-title {
      font-weight: 800;
      font-size: 14px;
      color: #be185d;
      margin-bottom: 6px;
    }
    .wu-palette-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 6px;
      min-height: 16px;
    }
    .wu-pchip {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.08);
      cursor: default;
      flex-shrink: 0;
      transition: transform .15s;
      position: relative;
    }
    .wu-pchip:hover { transform: scale(1.5); z-index: 5; }
    .wu-pchip:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 20;
    }
    .wu-stats {
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .wu-stats strong { color: #374151; }
    .wu-dl-btn {
      width: 100%;
      padding: 6px 0;
      border: 1px solid #f9a8d4;
      border-radius: 8px;
      background: #fdf2f8;
      color: #be185d;
      font-family: 'Malgun Gothic', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .wu-dl-btn:hover:not(:disabled) {
      background: #f5576c;
      color: white;
      border-color: #f5576c;
    }
    .wu-dl-btn:disabled { opacity: .35; cursor: not-allowed; }
    .wu-toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .wu-sw {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .wu-sw input { opacity: 0; width: 0; height: 0; }
    .wu-sw-tr {
      position: absolute;
      inset: 0;
      background: #fce7f3;
      border-radius: 12px;
      transition: background .3s;
      border: 1px solid #f9a8d4;
    }
    .wu-sw input:checked + .wu-sw-tr { background: #f5576c; border-color: #f5576c; }
    .wu-sw-kn {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #be185d;
      border-radius: 50%;
      transition: transform .3s;
      pointer-events: none;
    }
    .wu-sw input:checked ~ .wu-sw-kn { transform: translateX(20px); background: white; }

    .color-option {
      width: 38px; height: 38px;
      border-radius: 6px;
      border: 3px solid #ddd;
      cursor: pointer;
      transition: all 0.2s;
    }
    .color-option:hover { transform: scale(1.1); border-color: #f5576c; }
    .color-option.selected {
      border-color: #f5576c;
      box-shadow: 0 0 10px rgba(245,87,108,0.5);
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ===================== 퀴즈 컴포넌트 =====================
    const QuizSection = () => {
      const [answers, setAnswers] = useState({});
      const [showResult, setShowResult] = useState(false);

      const quizData = [
        {
          id: 1,
          question: '손실 압축에 대한 설명으로 올바른 것은?',
          options: [
            '압축 후 원본을 완벽하게 복원할 수 있다',
            '사람이 잘 느끼지 못하는 정보를 제거해서 파일을 줄인다',
            '파일 크기가 변하지 않는다',
            'ZIP 파일이 손실 압축의 대표적인 예이다'
          ],
          correct: 1,
          explanation: '손실 압축은 사람의 눈이나 귀로 잘 구분하기 어려운 정보를 제거해서 파일 크기를 줄이는 방식이에요. 한번 압축하면 원본으로 되돌릴 수 없어요.'
        },
        {
          id: 2,
          question: 'JPEG 이미지 압축에서 제거되는 정보는?',
          options: [
            '저주파 정보 (전체적인 색상과 밝기)',
            '고주파 정보 (세밀한 무늬와 경계선)',
            '파일 이름 정보',
            '이미지 크기 정보'
          ],
          correct: 1,
          explanation: 'JPEG는 사람 눈에 덜 민감한 고주파(세밀한 무늬, 경계선)를 제거해요. 전체적인 색상과 윤곽(저주파)은 유지하기 때문에 큰 차이를 못 느껴요!'
        },
        {
          id: 3,
          question: 'MP3 압축에서 사용하는 "마스킹 효과"란?',
          options: [
            '큰 소리가 날 때 작은 소리가 들리지 않는 현상',
            '소리를 완전히 무음으로 만드는 기술',
            '주파수를 높이는 기술',
            '파일 이름을 숨기는 기술'
          ],
          correct: 0,
          explanation: '마스킹 효과는 큰 소리 옆에 있는 작은 소리는 사람 귀에 안 들린다는 현상이에요. MP3는 이런 안 들리는 소리를 과감히 제거해서 파일 크기를 줄여요!'
        },
        {
          id: 4,
          question: '영상 압축(MPEG)에서 P 프레임이란?',
          options: [
            '영상의 첫 번째 프레임',
            '전체 화면을 저장하는 프레임',
            '이전 프레임과의 차이만 저장하는 프레임',
            '앞뒤 프레임을 모두 비교하는 프레임'
          ],
          correct: 2,
          explanation: 'P 프레임(Predicted Frame)은 이전 프레임과 달라진 부분만 저장해요. 배경이 그대로이고 사람만 움직이면, 움직인 사람 부분만 저장하면 되니까 파일이 작아져요!'
        },
        {
          id: 5,
          question: '다음 중 손실 압축 방식이 아닌 것은?',
          options: [
            'JPEG (이미지)',
            'MP3 (소리)',
            'MPEG (영상)',
            'PNG (이미지)'
          ],
          correct: 3,
          explanation: 'PNG는 무손실 압축 방식이에요! JPEG, MP3, MPEG는 모두 손실 압축이지만, PNG는 원본을 100% 복원할 수 있는 무손실 압축이에요.'
        }
      ];

      const handleAnswer = (qid, idx) => {
        setAnswers({ ...answers, [qid]: idx });
      };

      const calcScore = () => quizData.filter(q => answers[q.id] === q.correct).length;

      const resetQuiz = () => { setAnswers({}); setShowResult(false); };

      return (
        <div className="p-8 animate-slide-in">
          <div className="bg-gradient-to-r from-pink-600 to-rose-600 rounded-2xl p-6 mb-6 shadow-lg">
            <h2 className="text-2xl font-bold text-white text-center mb-6">🎯 퀴즈로 복습하기!</h2>

            {!showResult ? (
              <div className="space-y-4">
                <div className="bg-white rounded-xl p-4 shadow-sm">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-base font-bold text-gray-600">📋 진행 현황</span>
                    <span className="text-base font-bold text-pink-700">{Object.keys(answers).length} / {quizData.length} 완료</span>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-4">
                    <div
                      className="bg-gradient-to-r from-pink-500 to-rose-500 h-4 rounded-full transition-all duration-500"
                      style={{ width: `${(Object.keys(answers).length / quizData.length) * 100}%` }}
                    />
                  </div>
                </div>

                {quizData.map((quiz, qIdx) => (
                  <div key={quiz.id} className="bg-white p-5 rounded-lg shadow-md">
                    <p className="font-bold text-gray-900 mb-3">Q{qIdx + 1}. {quiz.question}</p>
                    <div className="space-y-2">
                      {quiz.options.map((option, oIdx) => {
                        const answered = answers[quiz.id] !== undefined;
                        const isSelected = answers[quiz.id] === oIdx;
                        const isCorrect = quiz.correct === oIdx;
                        let cls = 'bg-gray-50 border-gray-200 hover:bg-gray-100';
                        if (answered) {
                          if (isCorrect) cls = 'bg-green-100 border-green-400';
                          else if (isSelected) cls = 'bg-red-100 border-red-400';
                          else cls = 'bg-gray-50 border-gray-200';
                        }
                        return (
                          <button
                            key={oIdx}
                            onClick={() => !answered && handleAnswer(quiz.id, oIdx)}
                            disabled={answered}
                            className={`w-full text-left p-3 rounded-lg border-2 transition-all text-base ${cls} ${answered ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                          >
                            <span className="font-semibold">{'①②③④'[oIdx]}</span> {option}
                            {answered && isCorrect && <span className="ml-2 text-green-600 font-bold">✓ 정답</span>}
                            {answered && isSelected && !isCorrect && <span className="ml-2 text-red-600 font-bold">✗</span>}
                          </button>
                        );
                      })}
                    </div>
                    {answers[quiz.id] !== undefined && (
                      <div className="mt-4 p-3 bg-pink-50 rounded-lg border border-pink-200">
                        <p className="text-base text-gray-700"><span className="font-bold text-pink-600">설명: </span>{quiz.explanation}</p>
                      </div>
                    )}
                  </div>
                ))}

                {Object.keys(answers).length === quizData.length && (
                  <button
                    onClick={() => setShowResult(true)}
                    className="w-full py-4 bg-gradient-to-r from-pink-600 to-rose-600 text-white font-bold rounded-lg hover:shadow-lg transition-all text-lg"
                  >
                    🏁 결과 확인하기
                  </button>
                )}
              </div>
            ) : (
              <div className="text-center">
                <div className="bg-white p-8 rounded-lg border border-pink-200 mb-6 shadow-md">
                  <h3 className="text-2xl font-bold text-pink-900 mb-4">🎉 퀴즈 완료!</h3>
                  <div className="text-6xl font-bold text-pink-600 mb-4">{calcScore()} / {quizData.length}</div>
                  <p className="text-lg text-gray-700">
                    {calcScore() === quizData.length ? '완벽해요! 모든 문제를 맞히셨네요! 🎊'
                      : calcScore() >= 3 ? '잘하셨어요! 조금만 더 복습하면 완벽해요! 👍'
                      : '다시 한 번 복습해보세요! 💪'}
                  </p>
                </div>
                {quizData.filter(q => answers[q.id] !== q.correct).length > 0 && (
                  <div className="text-left space-y-3 mb-6">
                    {quizData.filter(q => answers[q.id] !== q.correct).map(q => (
                      <div key={q.id} className="bg-red-50 p-4 rounded-lg border border-red-200">
                        <p className="font-bold text-red-700 text-base mb-1">❌ 틀린 문제: {q.question}</p>
                        <p className="text-base text-gray-700"><span className="font-bold text-green-600">정답: </span>{q.options[q.correct]}</p>
                        <p className="text-base text-gray-600 mt-1">{q.explanation}</p>
                      </div>
                    ))}
                  </div>
                )}
                <button onClick={resetQuiz} className="px-8 py-4 bg-gradient-to-r from-pink-600 to-rose-600 text-white font-bold rounded-lg hover:shadow-lg transition-all">
                  🔄 다시 풀기
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ===================== 지식 확장 컴포넌트 =====================
    const KnowledgeSection = () => {
      const [revealed, setRevealed] = useState({});

      const quizItems = [
        {
          id: 0,
          data: '인물 사진 (얼굴, 풍경)',
          hint: '색상이 매우 다양하고 세밀한 부분이 많아요.',
          best: 'JPEG (손실 압축)',
          reason: '색이 복잡한 사진은 JPEG로 압축해도 눈으로 구분이 어려워요. PNG보다 10배 이상 작아져요!'
        },
        {
          id: 1,
          data: '로고, 아이콘 (단순한 그림)',
          hint: '색상이 몇 가지 없고 경계선이 뚜렷해요.',
          best: 'PNG (무손실 압축)',
          reason: 'JPEG로 압축하면 경계선이 뭉개져 보여요. 단순한 그림은 PNG가 더 선명하게 보여요!'
        },
        {
          id: 2,
          data: '움직이는 이모티콘 (움짤)',
          hint: '여러 장의 이미지가 연속으로 재생돼요.',
          best: 'GIF',
          reason: 'GIF는 여러 프레임(장면)을 하나의 파일에 담을 수 있어요. 대신 256색 제한이 있어요!'
        }
      ];

      return (
        <div className="p-8 animate-slide-in">
          <div className="bg-gradient-to-r from-pink-50 to-rose-50 rounded-2xl p-6 mb-6 border border-pink-200">
            <h3 className="text-2xl font-bold text-pink-900 mb-4">📁 실생활에서 손실 압축은 어디에 쓰일까?</h3>
            <div className="bg-white rounded-lg overflow-hidden shadow-sm">
              <table className="w-full text-base">
                <thead className="bg-gradient-to-r from-pink-600 to-rose-600 text-white">
                  <tr>
                    <th className="p-4 text-left">파일 형식</th>
                    <th className="p-4 text-left">압축 방식</th>
                    <th className="p-4 text-left">실생활 사용 예</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { fmt: 'JPEG', color: 'text-pink-600', method: 'DCT + 양자화 (고주파 제거)', use: '인스타그램, 카카오톡 사진 전송, 디지털카메라' },
                    { fmt: 'MP3', color: 'text-rose-600', method: '안 들리는 소리 제거 + 마스킹', use: '멜론, 스포티파이, 유튜브 뮤직' },
                    { fmt: 'MPEG/MP4', color: 'text-red-600', method: 'I/P/B 프레임 + 차이만 저장', use: '유튜브, 넷플릭스, 틱톡' },
                    { fmt: 'AAC', color: 'text-orange-600', method: 'MP3보다 개선된 오디오 압축', use: '애플 뮤직, 유튜브 오디오' },
                    { fmt: 'WebP', color: 'text-amber-600', method: 'JPEG보다 개선된 이미지 압축', use: '구글, 유튜브 썸네일' },
                  ].map(row => (
                    <tr key={row.fmt} className="border-b hover:bg-pink-50">
                      <td className={`p-4 font-bold ${row.color}`}>{row.fmt}</td>
                      <td className="p-4">{row.method}</td>

          <div className="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-2xl p-6 mb-6 border border-yellow-300">
            <h3 className="text-2xl font-bold text-orange-900 mb-4">🤔 학생들이 자주 헷갈리는 3가지</h3>

              {[
                {
                  q: '1. 손실 압축하면 원본을 되찾을 수 있을까?',
                  a: '아니요! 한번 버린 정보는 영영 없어져요. 카카오톡으로 사진을 보내면 자동으로 JPEG 압축이 되는데, 이때 원본 화질로 되돌릴 수 없어요. 원본을 보내려면 "원본으로 보내기"를 선택해야 해요!',

                  border: 'border-orange-400'
                },
                {
                  q: '3. 무손실 압축이 항상 더 좋을까?',
                  a: '상황에 따라 달라요! 의료 이미지(엑스레이), 법률 문서, 프로그램 파일은 무손실이 필수예요. 하지만 SNS 사진이나 스트리밍 음악은 손실 압축이 파일이 훨씬 작아서 더 실용적이에요.',
                  border: 'border-amber-400'

              ].map((item, i) => (
                <div key={i} className={`bg-white rounded-xl p-5 shadow-sm border-l-4 ${item.border}`}>
                  <h4 className="font-bold text-orange-700 mb-2">{item.q}</h4>
                  <p className="text-gray-700 text-base leading-relaxed">{item.a}</p>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-gradient-to-r from-green-50 to-emerald-50 rounded-2xl p-6 mb-6 border border-green-300">
            <h3 className="text-2xl font-bold text-green-900 mb-2">🎯 이 파일엔 어떤 압축이 적합할까?</h3>
            <p className="text-gray-600 mb-5 text-base">각 파일에 어떤 압축 방식이 더 유리할지 생각해보고 정답을 확인해봐요!</p>
            <div className="space-y-4">
              {quizItems.map(item => (
                <div key={item.id} className="bg-white rounded-xl p-5 shadow-sm border border-green-200">
                  <div className="flex items-start gap-3">
                    <span className="text-2xl">{['📷', '🎨', '😀'][item.id]}</span>
                    <div className="flex-1">
                      <p className="font-bold text-gray-800 mb-1">파일 종류: <code className="bg-green-100 px-2 py-1 rounded font-mono text-base">{item.data}</code></p>
                      <p className="text-gray-600 text-base mb-3">{item.hint}</p>
                      {revealed[item.id] ? (
                        <div className="bg-green-50 border border-green-300 rounded-lg p-3">
                          <p className="font-bold text-green-700 mb-1 text-base">✅ 추천 방식: <span className="text-green-800">{item.best}</span></p>
                          <p className="text-gray-700 text-base">{item.reason}</p>
                        </div>
                      ) : (
                        <button
                          onClick={() => setRevealed({ ...revealed, [item.id]: true })}
                          className="bg-green-500 text-white px-4 py-2 rounded-lg font-bold text-base hover:bg-green-600 transition-all"
                        >
                          정답 확인하기
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-gradient-to-r from-pink-50 to-rose-50 rounded-2xl p-6 border border-pink-200">
            <h3 className="text-2xl font-bold text-pink-900 mb-4">🤔 생각해보기</h3>
            <div className="grid md:grid-cols-2 gap-4">
              {[
                {
                  q: 'Q. 같은 사진을 JPEG로 여러 번 저장하면?',
                  a: '저장할 때마다 손실이 누적돼요! 처음에는 잘 모르지만, 10번 이상 반복하면 품질이 눈에 띄게 나빠져요. 이를 "세대 손실"이라고 해요.',
                  border: 'border-t-4 border-pink-400'
                },
                {
                  q: 'Q. MP3보다 더 좋은 음악 파일이 있을까요?',
                  a: '있어요! AAC, OGG, FLAC 등이 있어요. 특히 FLAC은 무손실 압축 오디오로, 음질이 CD와 동일하지만 파일 크기는 원본의 절반 정도예요.',
                  border: 'border-t-4 border-rose-400'
                },
                {
                  q: 'Q. 유튜브는 왜 화질이 720p, 1080p로 나뉠까요?',
                  a: '해상도가 높을수록 파일이 크고 더 많은 데이터가 필요해요. 인터넷 속도가 느릴 때는 낮은 화질로 자동 전환해서 끊김 없이 볼 수 있도록 해줘요.',
                  border: 'border-t-4 border-pink-400'
                },
                {
                  q: 'Q. 사진 파일을 ZIP으로 압축하면 더 작아질까요?',
                  a: '거의 차이 없어요! JPEG 파일은 이미 손실 압축이 된 상태라 추가로 압축할 데이터가 거의 없어요. 이미 압축된 파일은 재압축해도 효과가 없답니다.',
                  border: 'border-t-4 border-rose-400'
                }
              ].map((item, i) => (
                <div key={i} className={`bg-white p-5 rounded-lg shadow-sm ${item.border}`}>
                  <h4 className="font-bold text-pink-700 text-base mb-3">{item.q}</h4>
                  <p className="text-gray-700 text-base leading-relaxed">{item.a}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ===================== Wu 색상 압축 컴포넌트 =====================
    const WuColorCompress = () => {
      const [useDither, setUseDither] = useState(true);
      const [imgEl, setImgEl] = useState(null);
      const [processing, setProcessing] = useState(false);
      const [progress, setProgress] = useState(0);
      const [progressLabel, setProgressLabel] = useState('');
      const [cards, setCards] = useState([]);
      const [origInfo, setOrigInfo] = useState(null);
      const [isDragOver, setIsDragOver] = useState(false);
      const fileInputRef = useRef(null);

      const LEVELS = [
        {n:2,label:'2색'},{n:4,label:'4색'},
        {n:8,label:'8색'},{n:16,label:'16색'},
        {n:32,label:'32색'},{n:64,label:'64색'},
        {n:128,label:'128색'},{n:256,label:'256색'}
      ];

      const LEVEL_COLORS = ['#f5576c','#ff8fab','#ffb347','#f5c842','#a8e063','#56cf8a','#4ec9b0','#4ea8de'];

      const loadImage = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          setImgEl(img);
          setOrigInfo({ w: img.naturalWidth, h: img.naturalHeight });
          processAll(img, useDither);
        };
        img.src = url;
      };

      // Wu 알고리즘: 분산이 최대인 축으로 분할
      const wuQuantize = (pixels, n) => {
        const makeBox = (px) => {
          if (!px.length) return { px, mean: [0,0,0], score: 0, vR: 0, vG: 0, vB: 0 };
          let sR=0,sG=0,sB=0;
          for (const [r,g,b] of px) { sR+=r; sG+=g; sB+=b; }
          const cnt = px.length;
          const mR=sR/cnt, mG=sG/cnt, mB=sB/cnt;
          let vR=0,vG=0,vB=0;
          for (const [r,g,b] of px) {
            vR+=(r-mR)**2; vG+=(g-mG)**2; vB+=(b-mB)**2;
          }
          const score = (vR*0.299+vG*0.587+vB*0.114)/cnt;
          return { px, mean:[Math.round(mR),Math.round(mG),Math.round(mB)], score, vR:vR/cnt, vG:vG/cnt, vB:vB/cnt };
        };
        const splitBox = (box) => {
          const { px, vR, vG, vB } = box;
          const wR=vR*0.299, wG=vG*0.587, wB=vB*0.114;
          const ch = wG>=wR&&wG>=wB?1:wB>=wR?2:0;
          const sorted = [...px].sort((a,b)=>a[ch]-b[ch]);
          const mid = Math.floor(sorted.length/2);
          return [makeBox(sorted.slice(0,mid)), makeBox(sorted.slice(mid))];
        };
        let boxes = [makeBox(pixels)];
        while (boxes.length < n) {
          boxes.sort((a,b)=>b.score-a.score);
          const best = boxes[0];
          if (best.score < 0.001 || best.px.length < 2) break;
          boxes.shift();
          const [b1,b2] = splitBox(best);
          boxes.push(b1, b2);
        }
        return boxes.map(b=>b.mean);
      };

      const nearestIdx = (r,g,b,pal) => {
        let best=0, bestD=Infinity;
        for (let i=0;i<pal.length;i++) {
          const [pr,pg,pb]=pal[i];
          const dr=r-pr,dg=g-pg,db=b-pb;
          const d=dr*dr*0.299+dg*dg*0.587+db*db*0.114;
          if (d<bestD) { bestD=d; best=i; }
        }
        return best;
      };

      const applyNearest = (data, count, pal) => {
        const out = new Uint8ClampedArray(count*4);
        for (let i=0;i<count;i++) {
          const [pr,pg,pb] = pal[nearestIdx(data[i*4],data[i*4+1],data[i*4+2],pal)];
          out[i*4]=pr; out[i*4+1]=pg; out[i*4+2]=pb; out[i*4+3]=255;
        }
        return out;
      };

      const applyDitherSerpentine = (data, w, h, pal) => {
        const buf = new Float32Array(w*h*3);
        for (let i=0;i<w*h;i++) {
          buf[i*3]=data[i*4]; buf[i*3+1]=data[i*4+1]; buf[i*3+2]=data[i*4+2];
        }
        const out = new Uint8ClampedArray(w*h*4);
        const cl = v => v<0?0:v>255?255:Math.round(v);
        const addErr = (x,y,er,eg,eb) => {
          if(x<0||x>=w||y<0||y>=h) return;
          const i=(y*w+x)*3;
          buf[i]+=er; buf[i+1]+=eg; buf[i+2]+=eb;
        };
        for (let y=0;y<h;y++) {
          const ltr = (y%2===0);
          const xStart=ltr?0:w-1, xEnd=ltr?w:-1, dx=ltr?1:-1;
          for (let x=xStart;x!==xEnd;x+=dx) {
            const bi=(y*w+x)*3;
            const or=cl(buf[bi]),og=cl(buf[bi+1]),ob=cl(buf[bi+2]);
            const [nr,ng,nb]=pal[nearestIdx(or,og,ob,pal)];
            const oi=(y*w+x)*4;
            out[oi]=nr; out[oi+1]=ng; out[oi+2]=nb; out[oi+3]=255;
            const er=or-nr, eg=og-ng, eb=ob-nb;
            addErr(x+dx,y,   er*7/16,eg*7/16,eb*7/16);
            if(y+1<h){
              addErr(x-dx,y+1,er*3/16,eg*3/16,eb*3/16);
              addErr(x,   y+1,er*5/16,eg*5/16,eb*5/16);
              addErr(x+dx,y+1,er*1/16,eg*1/16,eb*1/16);
            }
          }
        }
        return out;
      };

      const processAll = (img, dither) => {
        const W=img.naturalWidth, H=img.naturalHeight;
        setProcessing(true);
        setProgress(0);
        setCards([]);

        const fc = document.createElement('canvas');
        fc.width=W; fc.height=H;
        const fctx = fc.getContext('2d');
        fctx.drawImage(img,0,0,W,H);
        const fullData = fctx.getImageData(0,0,W,H);

        const HIST_SAMPLE = Math.min(W*H,80000);
        const step = Math.max(1,Math.floor(W*H/HIST_SAMPLE));
        const sampledPx = [];
        for (let i=0;i<W*H;i+=step) {
          if (fullData.data[i*4+3]<128) continue;
          sampledPx.push([fullData.data[i*4],fullData.data[i*4+1],fullData.data[i*4+2]]);
        }

        let idx=0;
        const results = [];

        const next = () => {
          if (idx >= LEVELS.length) {
            setCards(results);
            setProcessing(false);
            setProgress(100);
            return;
          }
          const lv = LEVELS[idx];
          const pct = Math.round((idx/LEVELS.length)*100);
          setProgress(pct);
          setProgressLabel(`${lv.label} 처리 중...`);

          setTimeout(() => {
            const pal = wuQuantize(sampledPx, lv.n);
            const out = dither
              ? applyDitherSerpentine(fullData.data,W,H,pal)
              : applyNearest(fullData.data,W*H,pal);
            const bits = Math.ceil(Math.log2(lv.n));
            results.push({ lv, pal, out, W, H, bits });
            idx++;
            setTimeout(next, 20);
          }, 30);
        };
        setTimeout(next, 50);
      };

      useEffect(() => {
        if (imgEl) processAll(imgEl, useDither);
      }, [useDither]);

      const downloadCanvas = (id, label) => {
        const cv = document.getElementById('wu-cv-'+id);
        if (!cv || cv.width===0) return;
        cv.toBlob(blob => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href=url; a.download='gif_'+label+'.png';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        },'image/png');
      };

      // cards가 업데이트되면 캔버스에 렌더링
      useEffect(() => {
        cards.forEach(({lv,out,W,H}) => {
          const cv = document.getElementById('wu-cv-'+lv.n);
          if (!cv) return;
          cv.width=W; cv.height=H;
          const imgData = cv.getContext('2d').createImageData(W,H);
          imgData.data.set(out);
          cv.getContext('2d').putImageData(imgData,0,0);
        });
      }, [cards]);

      // 원본 캔버스 렌더링
      useEffect(() => {
        if (!origInfo || !imgEl) return;
        const cv = document.getElementById('wu-cv-orig');
        if (!cv) return;
        cv.width=imgEl.naturalWidth; cv.height=imgEl.naturalHeight;
        cv.getContext('2d').drawImage(imgEl,0,0);
      }, [origInfo, imgEl]);

      return (
        <div>
          {/* 소개 박스 */}
          <div className="bg-gradient-to-r from-pink-50 to-rose-50 p-4 rounded-lg border border-pink-200 mb-4">
            <h4 className="font-bold text-pink-900 text-base mb-2">💡 이 체험에서는 뭘 할 수 있나요?</h4>
            <p className="text-base text-gray-700 leading-relaxed">
              내 사진을 올리면 <span className="font-bold text-pink-600">2색 ~ 256색</span>으로 단계별로 줄여서 보여줘요.
              색이 줄어들수록 파일 크기가 작아지지만, 화질도 달라지는 걸 직접 눈으로 확인할 수 있어요!
            </p>
          </div>

          {/* 알고리즘 설명 */}
          <div className="grid md:grid-cols-3 gap-3 mb-4">
            {[
              { title:'🎯 Wu 색상 분석', color:'text-pink-600', bg:'bg-pink-50 border-pink-200', desc:'이미지에서 가장 중요한 색을 골라내는 방법이에요. 색상의 분포(퍼진 정도)가 가장 큰 부분을 기준으로 나눠요. 포토샵이 실제로 쓰는 방식이에요!' },
              { title:'✨ 디더링 기법', color:'text-rose-600', bg:'bg-rose-50 border-rose-200', desc:'팔레트에 없는 색은 점을 섞어서 표현해요. 예를 들어 파란색과 노란색 점을 번갈아 찍으면 초록처럼 보이는 원리예요. 옛날 신문 인쇄랑 같아요!' },
              { title:'📊 인지 가중치', color:'text-orange-600', bg:'bg-orange-50 border-orange-200', desc:'사람 눈은 초록색 변화에 가장 민감하고, 파란색 변화에는 덜 민감해요. 이 특성을 이용해서 눈에 잘 띄는 색 오류를 먼저 줄여줘요!' },
            ].map((item,i) => (
              <div key={i} className={`p-3 rounded-lg border text-base ${item.bg}`}>
                <p className={`font-bold mb-1 ${item.color}`}>{item.title}</p>
                <p className="text-gray-700 text-base leading-relaxed">{item.desc}</p>
              </div>
            ))}
          </div>

          {/* 디더링 토글 */}
          <div className="flex items-center gap-3 mb-4 bg-white p-3 rounded-lg border border-pink-100">
            <div>
              <p className="font-bold text-gray-800 text-base">🎨 디더링(Dithering) 켜기/끄기</p>
              <p className="text-base text-gray-500">ON: 점을 섞어 색 경계를 부드럽게 표현 / OFF: 딱딱한 경계 그대로 표현</p>
            </div>
            <label className="wu-toggle-label ml-auto">
              <div className="wu-sw">
                <input type="checkbox" checked={useDither} onChange={e=>setUseDither(e.target.checked)} />
                <div className="wu-sw-tr"></div>
                <div className="wu-sw-kn"></div>
              </div>
              <span className={`text-base font-bold ${useDither?'text-pink-600':'text-gray-400'}`}>{useDither?'ON':'OFF'}</span>
            </label>
          </div>

          {/* 드래그&드롭 업로드 */}
          <div
            className={`wu-drop-area mb-4 ${isDragOver?'over':''}`}
            onClick={()=>fileInputRef.current&&fileInputRef.current.click()}
            onDragOver={e=>{e.preventDefault();setIsDragOver(true);}}
            onDragLeave={()=>setIsDragOver(false)}
            onDrop={e=>{e.preventDefault();setIsDragOver(false);const f=e.dataTransfer.files[0];if(f)loadImage(f);}}
          >
            <div className="text-4xl mb-2">🖼️</div>
            <p className="font-bold text-pink-600 text-base mb-1"><span className="underline">클릭</span>하거나 이미지를 끌어다 놓으세요</p>
            <p className="text-base text-gray-500">JPG · PNG · GIF · WebP 지원</p>
            <input ref={fileInputRef} type="file" accept="image/*" className="hidden"
              onChange={e=>{if(e.target.files[0])loadImage(e.target.files[0]);}} />
          </div>

          {/* 진행 바 */}
          {processing && (
            <div className="wu-progress-wrap show mb-4">
              <div className="flex justify-between text-base text-gray-500 mb-1">
                <span>{progressLabel}</span>
                <span>{progress}%</span>
              </div>
              <div className="wu-p-bg">
                <div className="wu-p-fill" style={{width:progress+'%'}}></div>
              </div>
            </div>
          )}

          {/* 원본 카드 */}
          {origInfo && (
            <div className="wu-card orig-card mb-4">
              <div className="wu-cw">
                <canvas id="wu-cv-orig" style={{maxWidth:'100%',height:'auto',display:'block'}}></canvas>
                <div className="wu-badge orig-badge">원본 이미지</div>
              </div>
              <div className="wu-footer">
                <div className="wu-card-title" style={{color:'#4ea8de'}}>원본 이미지</div>
                <div className="wu-stats">원본 크기: <strong>{origInfo.w} × {origInfo.h} px</strong></div>
                <button className="wu-dl-btn" style={{borderColor:'#bfdbfe',color:'#1d4ed8',background:'#eff6ff'}}
                  onClick={()=>downloadCanvas('orig','원본')}>⬇ 원본 다운로드</button>
              </div>
            </div>
          )}

          {/* 압축 결과 그리드 */}
          {cards.length > 0 && (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              {cards.map(({lv,pal,bits},ci) => (
                <div key={lv.n} className="wu-card">
                  <div className="wu-cw">
                    <canvas id={'wu-cv-'+lv.n} style={{maxWidth:'100%',height:'auto',display:'block'}}></canvas>
                    <div className="wu-badge" style={{background: LEVEL_COLORS[ci]+'cc'}}>{lv.label}</div>
                  </div>
                  <div className="wu-footer">

          )}

          {/* 관찰 포인트 */}
          <div className="bg-gradient-to-r from-yellow-50 to-orange-50 p-4 rounded-lg border border-yellow-300">
            <h4 className="font-bold text-orange-800 text-base mb-2">📌 관찰해보세요!</h4>
            <div className="grid md:grid-cols-2 gap-3">
              <div className="bg-white p-3 rounded-lg border border-green-300">
                <p className="font-bold text-green-700 mb-1 text-base">👍 디더링을 켜면?</p>
                <ul className="text-base text-gray-700 space-y-1">
                  <li>• 같은 색상 수에서 훨씬 부드러워 보여요</li>
                  <li>• 없는 색을 점으로 섞어서 흉내내는 거예요</li>
                  <li>• 단, 파일 크기가 조금 더 커질 수 있어요</li>

              </div>
              <div className="bg-white p-3 rounded-lg border border-red-300">
                <p className="font-bold text-red-700 mb-1 text-base">👎 색이 줄면?</p>
                <ul className="text-base text-gray-700 space-y-1">
                  <li>• 16색 이하부터 품질 저하가 눈에 띄어요</li>
                  <li>• 2색(흑백)은 파일이 아주 작아지지만 뭉개져요</li>
                  <li>• 사진보다 단순한 그림이 더 잘 버텨요!</li>

    // ===================== 이미지 압축 탭 =====================
    const ImageTab = () => {
      const [imageDetailResult, setImageDetailResult] = useState(null);
      const [dctQuality, setDctQuality] = useState(50);
      const [dctBlockSize, setDctBlockSize] = useState(8);
      const [dctStats, setDctStats] = useState(null);
      const [dctExplanation, setDctExplanation] = useState('이미지를 업로드하면 DCT 압축 효과를 볼 수 있어요!');
      const [showDctDetail, setShowDctDetail] = useState(false);
      const [uploadedImage, setUploadedImage] = useState(null);
      const [showGrid, setShowGrid] = useState(false);

      const originalCanvasRef = useRef(null);
      const frequencyCanvasRef = useRef(null);
      const dctCompressedRef = useRef(null);
      const compressionChartRef = useRef(null);
      const gridOverlayOrigRef = useRef(null);
      const gridOverlayCompRef = useRef(null);

      useEffect(() => {
        drawCompressionChart();
      }, []);

      const drawCompressionChart = () => {
        const canvas = compressionChartRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const container = canvas.parentElement;
        const cssW = container ? (container.clientWidth || 800) : 800;
        const cssH = 260;
        canvas.style.width = cssW + 'px';
        canvas.style.height = cssH + 'px';
        canvas.width = cssW * dpr;
        canvas.height = cssH * dpr;
        ctx.scale(dpr, dpr);
        const w = cssW, h = cssH;
        const groups = [
          { label: '원본',  normal: 1820, dither: null },
          { label: '256색', normal: 461,  dither: 703  },
          { label: '128색', normal: 344,  dither: 544  },
          { label: '64색',  normal: 252,  dither: 419  },
          { label: '32색',  normal: 199,  dither: 341  },
          { label: '16색',  normal: 116,  dither: 229  },
          { label: '8색',   normal: 96,   dither: 188  },
          { label: '4색',   normal: 62,   dither: 130  },
          { label: '2색',   normal: 28,   dither: 77   },
        ];
        const maxSize=2000,padL=58,padR=20,padT=50,padB=50;
        const chartW=w-padL-padR,chartH=h-padT-padB;
        const groupW=chartW/groups.length,barW=groupW*0.32;
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle='#be185d'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
        ctx.fillText('색상 수에 따른 파일 크기 비교 (일반 vs 디더링)', w/2, 22);
        ctx.fillStyle='#f5576c'; ctx.fillRect(w/2-130,32,13,13);
        ctx.fillStyle='#3b82f6'; ctx.fillRect(w/2+10,32,13,13);
        ctx.fillStyle='#374151'; ctx.font='12px sans-serif'; ctx.textAlign='left';
        ctx.fillText('일반 압축', w/2-113, 43);
        ctx.fillText('디더링 압축', w/2+27, 43);
        ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
        for(let i=0;i<=5;i++){
          const y=padT+chartH*(i/5);
          ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
          ctx.fillStyle='#6b7280'; ctx.font='11px sans-serif'; ctx.textAlign='right';
          ctx.fillText(Math.round(maxSize-maxSize*i/5)+'KB',padL-6,y+4);
        }
        groups.forEach((g,idx)=>{
          const gx=padL+idx*groupW,cx=gx+groupW/2;
          const nhB=(g.normal/maxSize)*chartH,nhY=padT+chartH-nhB,nhX=cx-barW-2;
          ctx.fillStyle='#f5576c'; ctx.fillRect(nhX,nhY,barW,nhB);
          ctx.fillStyle='#374151'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
          ctx.fillText(g.normal+'KB',nhX+barW/2,nhY-3);
          if(g.dither!==null){
            const dhB=(g.dither/maxSize)*chartH,dhY=padT+chartH-dhB,dhX=cx+2;
            ctx.fillStyle='#3b82f6'; ctx.fillRect(dhX,dhY,barW,dhB);
            ctx.fillStyle='#374151'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
            ctx.fillText(g.dither+'KB',dhX+barW/2,dhY-3);
          }
          ctx.fillStyle='#374151'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
          ctx.fillText(g.label,cx,padT+chartH+18);
        });
        ctx.strokeStyle='#d1d5db'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(padL,padT+chartH); ctx.lineTo(w-padR,padT+chartH); ctx.stroke();
      };

      const showImageDetail = (filename, colorName, sizeKB) => {
        const original = 1820;
        const ratio = ((1 - sizeKB/original)*100).toFixed(1);
        setImageDetailResult({ filename, colorName, sizeKB, ratio, original });
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => { setUploadedImage(img); };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      useEffect(() => {
        if (uploadedImage) {
          // 캔버스가 DOM에 마운트된 뒤 실행되도록 setTimeout 사용
          setTimeout(() => processDCT(uploadedImage, dctQuality, dctBlockSize), 0);
        }
      }, [uploadedImage]);

      const processDCT = (img, quality, blockSize) => {
        const oc = originalCanvasRef.current;
        const dc = dctCompressedRef.current;
        if (!oc || !dc || !img) return;
        oc.width = img.width; oc.height = img.height;
        oc.getContext('2d').drawImage(img, 0, 0);
        const result = applyDCTCompression(oc, quality/100, blockSize);
        dc.width = img.width; dc.height = img.height;
        dc.getContext('2d').putImageData(result.imageData, 0, 0);
        visualizeFrequency(result.frequencyData, blockSize);
        setDctStats(result.stats);
        // 격자 그리기 (showGrid 상태와 무관하게 ref에 저장, 렌더링은 useEffect로)
        setTimeout(() => drawGridOverlay(blockSize, showGrid), 50);
        const removeLevel = 100 - quality;
        let txt = `이미지를 ${blockSize}×${blockSize} 크기의 작은 블록으로 나눈 다음, `;
        if (quality >= 70) txt += `고주파 제거 ${removeLevel}% — 세밀한 무늬가 거의 남아 있어 원본과 비슷해요.`;
        else if (quality >= 40) txt += `고주파 제거 ${removeLevel}% — 잔무늬·경계선은 사라지고, 큰 색 덩어리(저주파)는 유지돼요.`;
        else txt += `고주파 제거 ${removeLevel}% — 대부분의 세밀한 정보가 제거되어 뭉개진 느낌이 나요.`;
        setDctExplanation(txt);
      };

      const drawGridOverlay = (blockSize, visible) => {
        [gridOverlayOrigRef, gridOverlayCompRef].forEach((ref, ri) => {
          const baseRef = ri === 0 ? originalCanvasRef : dctCompressedRef;
          const base = baseRef.current;
          const overlay = ref.current;
          if (!overlay || !base) return;
          overlay.width = base.width;
          overlay.height = base.height;
          overlay.style.width = base.style.width || base.width + 'px';
          overlay.style.height = base.style.height || base.height + 'px';
          const ctx = overlay.getContext('2d');
          ctx.clearRect(0, 0, overlay.width, overlay.height);
          if (!visible) return;
          ctx.strokeStyle = 'rgba(245, 87, 108, 0.7)';
          ctx.lineWidth = 1;
          for (let x = 0; x <= overlay.width; x += blockSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, overlay.height); ctx.stroke();
          }
          for (let y = 0; y <= overlay.height; y += blockSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(overlay.width, y); ctx.stroke();
          }
        });
      };

      useEffect(() => {
        if (uploadedImage) drawGridOverlay(dctBlockSize, showGrid);
      }, [showGrid, dctBlockSize]);

      const applyDCTCompression = (canvas, keepRatio, N) => {
        const ctx = canvas.getContext('2d');
        const {data, width, height} = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const ch = (fn) => { const a = new Float32Array(width*height); for (let i=0;i<data.length;i+=4) a[i/4]=data[i+fn]; return a; };
        const R = ch(0), G = ch(1), B = ch(2);
        const ni = ctx.createImageData(width, height);
        const nd = ni.data;
        const fqd = [];
        let total = 0, kept = 0;
        const dct = (blk) => {
          const out = new Float32Array(N*N);
          for (let v=0;v<N;v++) for (let u=0;u<N;u++) {
            let s=0;
            for (let y=0;y<N;y++) for (let x=0;x<N;x++) s+=(blk[y*N+x]-128)*Math.cos((2*x+1)*u*Math.PI/(2*N))*Math.cos((2*y+1)*v*Math.PI/(2*N));
            const cu=u===0?1/Math.sqrt(2):1, cv=v===0?1/Math.sqrt(2):1;
            out[v*N+u]=0.25*cu*cv*s;
          }
          return out;
        };
        const idct = (blk) => {
          const out = new Float32Array(N*N);
          for (let y=0;y<N;y++) for (let x=0;x<N;x++) {
            let s=0;
            for (let v=0;v<N;v++) for (let u=0;u<N;u++) {
              const cu=u===0?1/Math.sqrt(2):1, cv=v===0?1/Math.sqrt(2):1;
              s+=cu*cv*blk[v*N+u]*Math.cos((2*x+1)*u*Math.PI/(2*N))*Math.cos((2*y+1)*v*Math.PI/(2*N));
            }
            out[y*N+x]=Math.max(0,Math.min(255,s*0.25+128));
          }
          return out;
        };
        const quant = (blk) => {
          const q = new Float32Array(N*N);
          const cnt = Math.floor(N*N*keepRatio);
          const vs = Array.from({length:N*N},(_,i)=>({v:Math.abs(blk[i]),i,o:blk[i]})).sort((a,b)=>b.v-a.v);
          vs.slice(0,cnt).forEach(({i,o})=>{ q[i]=o; });
          return q;
        };
        const extr = (ch,x,y) => { const b=new Float32Array(N*N); for (let j=0;j<N;j++) for (let i=0;i<N;i++) { const px=Math.min(x+i,width-1),py=Math.min(y+j,height-1); b[j*N+i]=ch[py*width+px]; } return b; };
        const ins = (r,g,b,x,y) => { for (let j=0;j<N;j++) for (let i=0;i<N;i++) { const px=x+i,py=y+j; if(px<width&&py<height){const idx=(py*width+px)*4;nd[idx]=r[j*N+i];nd[idx+1]=g[j*N+i];nd[idx+2]=b[j*N+i];nd[idx+3]=255;}} };
        const nz = (a) => a.reduce((c,v)=>c+(Math.abs(v)>0.1?1:0),0);
        for (let y=0;y<height;y+=N) for (let x=0;x<width;x+=N) {
          const rb=extr(R,x,y),gb=extr(G,x,y),bb=extr(B,x,y);
          const rd=dct(rb),gd=dct(gb),bd=dct(bb);
          const rq=quant(rd),gq=quant(gd),bq=quant(bd);
          ins(idct(rq),idct(gq),idct(bq),x,y);
          total+=N*N*3; kept+=nz(rq)+nz(gq)+nz(bq);
          if(fqd.length===0) fqd.push({q:rq});
        }
        const ratio=(kept/total*100).toFixed(1);
        return { imageData:ni, frequencyData:fqd, stats:{
          originalSize:(width*height*3/1024).toFixed(1),
          compressedSize:(width*height*3*kept/total/1024).toFixed(1),
          ratio, saved:(100-parseFloat(ratio)).toFixed(1)
        }};
      };

      const visualizeFrequency = (fqd, N) => {
        const canvas = frequencyCanvasRef.current;
        if (!canvas || fqd.length===0) return;
        const ctx = canvas.getContext('2d');
        const cell = Math.min(400/N, 50);
        canvas.width = N*cell; canvas.height = N*cell;
        const d = fqd[0].q;
        let max = 0;
        for (let i=0;i<d.length;i++) max = Math.max(max, Math.abs(d[i]));
        if (max === 0) max = 1; // 0 나누기 방지

        for (let y=0;y<N;y++) for (let x=0;x<N;x++) {
          const v = d[y*N+x];
          const norm = Math.abs(v)/max;
          const br = Math.floor(norm*255);
          ctx.fillStyle = Math.abs(v)<0.1 ? '#f0f0f0' : `rgb(${255-br},${255-br},255)`;
          ctx.fillRect(x*cell, y*cell, cell-1, cell-1);

          // ✅ 수정 1: 숫자 표시 (N<=16일 때만, 셀 크기가 충분할 때)
          if (N <= 16) {
            // ✅ 수정 2: font은 'bold Npx font' 순서여야 유효 (bold가 px 앞에)
            const fontSize = Math.max(Math.floor(cell / 3), 9);
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // ✅ 수정 3: brightness 기준으로 글자색 결정 (배경이 진할수록 흰 글씨)
            ctx.fillStyle = br > 100 ? 'white' : '#333333';
            ctx.fillText(
              Math.abs(v) < 0.1 ? '0' : Math.round(v),
              x*cell + cell/2,
              y*cell + cell/2
            );
          }
        }

        // 저주파 영역 빨간 박스
        ctx.strokeStyle='#f5576c'; ctx.lineWidth=3;
        ctx.strokeRect(0,0,cell*3,cell*3);

        // ✅ 수정 4: 라벨에 반투명 배경 깔아서 셀 색상과 무관하게 선명하게 표시
        const labelSize = Math.max(11, Math.floor(cell * 0.28));
        // ✅ 수정 5: font 문법 'bold Npx font' 순서 교정
        ctx.font = `bold ${labelSize}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        const labelW = cell * 2.1;
        const labelH = labelSize * 2 + 8;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(2, 2, labelW, labelH);
        ctx.fillStyle = '#ffffff';
        ctx.fillText('저주파(중요!)', 6, 5);
      };

      const normalImages = [
        { src:'src/1.png', label:'원본 PNG', bit:'24비트 (1,677만색)', size:1820, sizeStr:'1.82 MB' },
        { src:'src/256.gif', label:'256색', bit:'8비트', size:461, sizeStr:'461 KB' },
        { src:'src/128.gif', label:'128색', bit:'7비트', size:344, sizeStr:'344 KB' },
        { src:'src/64.gif', label:'64색', bit:'6비트', size:252, sizeStr:'252 KB' },
        { src:'src/32.gif', label:'32색', bit:'5비트', size:199, sizeStr:'199 KB' },
        { src:'src/16.gif', label:'16색', bit:'4비트', size:116, sizeStr:'116 KB' },
        { src:'src/8.gif', label:'8색', bit:'3비트', size:96, sizeStr:'96 KB' },
        { src:'src/4.gif', label:'4색', bit:'2비트', size:62, sizeStr:'62 KB' },
        { src:'src/2.gif', label:'2색 (흑백)', bit:'1비트', size:28, sizeStr:'28 KB' },
      ];
      const ditherImages = [
        { src:'src/256_1.gif', label:'256색 디더링', bit:'8비트', size:703, sizeStr:'703 KB' },
        { src:'src/128_1.gif', label:'128색 디더링', bit:'7비트', size:544, sizeStr:'544 KB' },
        { src:'src/64_1.gif', label:'64색 디더링', bit:'6비트', size:419, sizeStr:'419 KB' },
        { src:'src/32_1.gif', label:'32색 디더링', bit:'5비트', size:341, sizeStr:'341 KB' },
        { src:'src/16_1.gif', label:'16색 디더링', bit:'4비트', size:229, sizeStr:'229 KB' },
        { src:'src/8_1.gif', label:'8색 디더링', bit:'3비트', size:188, sizeStr:'188 KB' },
        { src:'src/4_1.gif', label:'4색 디더링', bit:'2비트', size:130, sizeStr:'130 KB' },
        { src:'src/2_1.gif', label:'2색 디더링', bit:'1비트', size:77, sizeStr:'77 KB' },
      ];

      return (
        <div className="p-8 animate-slide-in">

          {/* ---- 색상 압축 비교 ---- */}
          <div className="bg-gradient-to-r from-pink-50 to-rose-50 p-6 rounded-lg border border-pink-200 mb-6">
            <h3 className="font-bold text-pink-900 text-xl mb-2 flex items-center gap-2">
              <span className="text-2xl">📸</span> 실제 이미지 압축 비교하기
            </h3>
            <p className="text-gray-800 leading-relaxed text-base">
              같은 사진을 다양한 색상 수로 압축했을 때 어떻게 변하는지 직접 비교해봐요!
              <span className="font-bold text-pink-700"> 인스타그램, 카카오톡</span>에서 사진을 전송할 때 이런 압축이 자동으로 일어나요!
            </p>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <h3 className="font-bold text-gray-900 text-xl mb-4">🔍 색상 압축 단계별 비교</h3>
            <div className="grid grid-cols-3 md:grid-cols-5 gap-3 mb-6">
              {normalImages.map(img => (
                <div key={img.src} onClick={() => showImageDetail(img.src, img.label, img.size)}
                  className="bg-white rounded-xl border border-pink-100 p-2 text-center cursor-pointer hover:shadow-md hover:-translate-y-1 transition-all">
                  <div style={{aspectRatio:"1/1",overflow:"hidden",borderRadius:"6px",marginBottom:"8px"}}><img src={img.src} style={{width:"100%",height:"100%",objectFit:"cover"}} /></div>
                  <strong className="text-pink-600 text-base block">{img.label}</strong>
                  <p className="text-base text-gray-500">{img.bit}</p>
                  <p className="font-bold text-green-600 text-base">{img.sizeStr}</p>
                </div>
              ))}
            </div>

            <h3 className="font-bold text-gray-900 text-xl mb-2">🎨 디더링 압축 단계별 비교</h3>
            <p className="text-base text-gray-600 mb-4">
              디더링은 점을 섞어서 중간 색상을 표현하는 기법이에요. 적은 색으로도 더 자연스럽게 보여요!
            </p>
            <div className="grid grid-cols-3 md:grid-cols-5 gap-3 mb-4">
              {ditherImages.map(img => (
                <div key={img.src} onClick={() => showImageDetail(img.src, img.label, img.size)}
                  className="bg-white rounded-xl border border-pink-100 p-2 text-center cursor-pointer hover:shadow-md hover:-translate-y-1 transition-all">
                  <div style={{aspectRatio:"1/1",overflow:"hidden",borderRadius:"6px",marginBottom:"8px"}}><img src={img.src} style={{width:"100%",height:"100%",objectFit:"cover"}} /></div>
                  <strong className="text-pink-600 text-base block">{img.label}</strong>
                  <p className="text-base text-gray-500">{img.bit}</p>
                  <p className="font-bold text-green-600 text-base">{img.sizeStr}</p>
                </div>
              ))}
