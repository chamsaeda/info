      const [bitrate, setBitrate] = useState(128);
      const [maskingStatus, setMaskingStatus] = useState('소리가 꺼져있어요 🔇');
      const [maskingDetails, setMaskingDetails] = useState('아래 버튼을 눌러 시작해보세요!');
      const [maskingFreqCount, setMaskingFreqCount] = useState('0개');
      const [maskingCompression, setMaskingCompression] = useState('0%');
      const [compressedSize, setCompressedSize] = useState('100%');
      const [compressionRatio, setCompressionRatio] = useState('16:16');
      const [showMp3Detail, setShowMp3Detail] = useState(false);
      const [maskingActive, setMaskingActive] = useState(false);
      const [maskingApplyEnabled, setMaskingApplyEnabled] = useState(false);
      const [maskingBars, setMaskingBars] = useState(
        Array.from({length:14}, (_,i) => ({ height:[30,25,20,15,100,90,95,100,95,40,35,30,25,20][i], isLoud: i>=4&&i<=8, masked:false, playing:false }))
      );
      const [freqBars, setFreqBars] = useState(
        [
          {freq:30,label:'30Hz',type:'inaudible',height:40,removed:false,playing:false},
          {freq:50,label:'50Hz',type:'low',height:60,removed:false,playing:false},
          {freq:100,label:'100Hz',type:'audible',height:80,removed:false,playing:false},
          {freq:200,label:'200Hz',type:'audible',height:100,removed:false,playing:false},
          {freq:500,label:'500Hz',type:'audible',height:120,removed:false,playing:false},
          {freq:1000,label:'1kHz',type:'audible',height:140,removed:false,playing:false},
          {freq:2000,label:'2kHz',type:'audible',height:160,removed:false,playing:false},
          {freq:4000,label:'4kHz',type:'audible',height:180,removed:false,playing:false},
          {freq:8000,label:'8kHz',type:'audible',height:160,removed:false,playing:false},
          {freq:10000,label:'10kHz',type:'audible',height:140,removed:false,playing:false},
          {freq:12000,label:'12kHz',type:'audible',height:120,removed:false,playing:false},
          {freq:15000,label:'15kHz',type:'high',height:100,removed:false,playing:false},
          {freq:17000,label:'17kHz',type:'high',height:80,removed:false,playing:false},
          {freq:19000,label:'19kHz',type:'high',height:60,removed:false,playing:false},
          {freq:20000,label:'20kHz',type:'inaudible',height:40,removed:false,playing:false},
          {freq:22000,label:'22kHz',type:'inaudible',height:30,removed:false,playing:false},
        ]
      );

      const waveCanvasRef = useRef(null);
      const audioCtxRef = useRef(null);
      const oscRef = useRef(null);
      const soundOscsRef = useRef({});
      const maskingOscsRef = useRef({});
      const bitrateAudioRef = useRef(null);

      const initAudio = () => {
        if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext||window.webkitAudioContext)();
      };

      useEffect(() => { drawWaveform(freqValue); }, [freqValue]);

      const drawWaveform = (freq) => {
        const canvas = waveCanvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = '#fdf2f8'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle = '#f5576c'; ctx.lineWidth = 2;
        ctx.beginPath();
        const amp = h/3, cy = h/2, wl = w/(freq/100);
        for (let x=0;x<w;x++) {
          const y = cy + amp * Math.sin((x/wl)*Math.PI*2);
          x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.fillStyle='#999'; ctx.font='12px sans-serif';
        ctx.fillText('20Hz',8,h-8); ctx.fillText('20,000Hz',w-70,h-8);
      };

      const playTone = () => {
        stopTone();
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        audioCtxRef.current = ac;
        oscRef.current = ac.createOscillator();
        const g = ac.createGain();
        oscRef.current.frequency.value = freqValue;
        oscRef.current.type = 'sine';
        g.gain.value = 0.3;
        oscRef.current.connect(g); g.connect(ac.destination);
        oscRef.current.start();
        setTimeout(stopTone, 3000);
      };

      const stopTone = () => {
        if (oscRef.current) { try { oscRef.current.stop(); } catch(e){} oscRef.current=null; }
        if (audioCtxRef.current) { try { audioCtxRef.current.close(); } catch(e){} audioCtxRef.current=null; }
      };

      const toggleFreqBar = (idx) => {
        if (freqBars[idx].removed) return;
        initAudio();
        const ac = audioCtxRef.current || new (window.AudioContext||window.webkitAudioContext)();
        audioCtxRef.current = ac;
        if (soundOscsRef.current[idx]) {
          soundOscsRef.current[idx].stop();
          delete soundOscsRef.current[idx];
          setFreqBars(prev => prev.map((b,i)=>i===idx?{...b,playing:false}:b));
        } else {
          const osc = ac.createOscillator(), g = ac.createGain();
          osc.frequency.value = freqBars[idx].freq; osc.type='sine';
          g.gain.value=0.3; osc.connect(g); g.connect(ac.destination); osc.start();
          soundOscsRef.current[idx]=osc;
          setFreqBars(prev => prev.map((b,i)=>i===idx?{...b,playing:true}:b));
        }
      };

      const updateStats = (bars) => {
        const total = bars.length;
        const remaining = bars.filter(b=>!b.removed).length;
        setCompressedSize(Math.round(remaining/total*100)+'%');
        setCompressionRatio(`${total}:${remaining}`);
      };

      const removeInaudible = () => {
        const next = freqBars.map(b => b.type==='inaudible' ? {...b,removed:true,playing:false} : b);
        Object.keys(soundOscsRef.current).forEach(k=>{ if(freqBars[k]?.type==='inaudible') { soundOscsRef.current[k].stop(); delete soundOscsRef.current[k]; } });
        setFreqBars(next); updateStats(next);
      };
      const removeHigh = () => {
        const next = freqBars.map(b => b.type==='high' ? {...b,removed:true,playing:false} : b);
        Object.keys(soundOscsRef.current).forEach(k=>{ if(freqBars[k]?.type==='high') { soundOscsRef.current[k].stop(); delete soundOscsRef.current[k]; } });
        setFreqBars(next); updateStats(next);
      };
      const removeLow = () => {
        const next = freqBars.map(b => b.type==='low' ? {...b,removed:true,playing:false} : b);
        Object.keys(soundOscsRef.current).forEach(k=>{ if(freqBars[k]?.type==='low') { soundOscsRef.current[k].stop(); delete soundOscsRef.current[k]; } });
        setFreqBars(next); updateStats(next);
      };
      const resetBars = () => {
        Object.keys(soundOscsRef.current).forEach(k=>{ soundOscsRef.current[k].stop(); delete soundOscsRef.current[k]; });
        const next = freqBars.map(b=>({...b,removed:false,playing:false}));
        setFreqBars(next); updateStats(next);
      };

      const startMasking = () => {
        if (maskingActive) return;
        initAudio();
        const ac = audioCtxRef.current;
        const make = (freq, vol) => {
          const osc = ac.createOscillator(), g = ac.createGain();
          osc.type='sine'; osc.frequency.value=freq; g.gain.value=vol;
          osc.connect(g); g.connect(ac.destination); osc.start();
          return {osc,g};
        };
        maskingOscsRef.current['loud'] = make(1000, 0.3);
        maskingOscsRef.current['s1'] = make(900, 0.08);
        maskingOscsRef.current['s2'] = make(1100, 0.08);
        setMaskingActive(true); setMaskingApplyEnabled(true);
        setMaskingStatus('소리 재생 중 🔊');
        setMaskingDetails('큰 소리(1000Hz) + 작은 소리 2개(900Hz, 1100Hz)\n작은 소리들이 들리나요?');
        setMaskingFreqCount('3개'); setMaskingCompression('0%');
        setMaskingBars(prev => prev.map(b=>({...b,playing:true})));
      };

      const applyMasking = () => {
        if (!maskingActive) return;
        ['s1','s2'].forEach(k => {
          if (maskingOscsRef.current[k]) {
            maskingOscsRef.current[k].g.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime+0.5);
            setTimeout(()=>{ maskingOscsRef.current[k]?.osc.stop(); delete maskingOscsRef.current[k]; }, 500);
          }
        });
        setTimeout(()=>{
          setMaskingStatus('마스킹 효과 적용됨! 🎭');
          setMaskingDetails('큰 소리(1000Hz)만 남음\n차이를 느끼셨나요? 못 느끼셨다면 성공!');
          setMaskingFreqCount('1개'); setMaskingCompression('67%');
          setMaskingApplyEnabled(false);
          setMaskingBars(prev => prev.map(b => b.isLoud ? b : {...b, masked:true, playing:false}));
        }, 500);
      };

      const resetMasking = () => {
        Object.keys(maskingOscsRef.current).forEach(k=>{ maskingOscsRef.current[k]?.osc?.stop(); delete maskingOscsRef.current[k]; });
        setMaskingActive(false); setMaskingApplyEnabled(false);
        setMaskingStatus('소리가 꺼져있어요 🔇'); setMaskingDetails('아래 버튼을 눌러 시작해보세요!');
        setMaskingFreqCount('0개'); setMaskingCompression('0%');
        setMaskingBars(prev => prev.map(b=>({...b,masked:false,playing:false})));
      };

      const playBitrate = () => {
        if (bitrateAudioRef.current) { bitrateAudioRef.current.pause(); bitrateAudioRef.current.currentTime=0; }
        const file = bitrate===64 ? 'src/064.mp3' : bitrate===320 ? 'src/320.mp3' : 'src/192.mp3';
        bitrateAudioRef.current = new Audio(file);
        bitrateAudioRef.current.volume = 0.5;
        bitrateAudioRef.current.play().catch(()=>alert('오디오 파일을 찾을 수 없어요. src 폴더를 확인해주세요.'));
      };

      const stopBitrate = () => {
        if (bitrateAudioRef.current) { bitrateAudioRef.current.pause(); bitrateAudioRef.current.currentTime=0; }
      };

      const bitrateInfo = {
        64: { quality:'낮은 음질 — 뭉개진 느낌', size:'약 1.4 MB' },
        192: { quality:'일반 음질 — 대부분 만족', size:'약 4.3 MB' },
        320: { quality:'고음질 — 원음에 가까움', size:'약 7 MB' },
      };

      return (
        <div className="p-8 animate-slide-in">
          <div className="bg-gradient-to-r from-pink-50 to-rose-50 p-6 rounded-lg border border-pink-200 mb-6">
            <h3 className="font-bold text-pink-900 text-lg mb-2 flex items-center gap-2">
              <span className="text-2xl">🎵</span> MP3 압축의 비밀
            </h3>
            <p className="text-gray-800 leading-relaxed text-base">
              MP3는 어떻게 원본 CD 음질을 <span className="font-bold text-pink-600">10분의 1</span>로 줄이면서도 거의 같은 소리를 낼까요?
              <span className="font-bold text-rose-600"> 사람의 귀로 잘 들리지 않는 소리를 제거</span>하는 방식으로 압축해요!
              스포티파이, 멜론, 유튜브 뮤직이 모두 이 기술을 사용해요.
            </p>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <h3 className="font-bold text-gray-900 text-xl mb-4">👂 1단계: 소리의 주파수 체험하기</h3>
            <p className="text-base text-gray-700 mb-4">사람은 이론적으로 20Hz~20,000Hz 사이의 소리를 들을 수 있어요. 직접 들어보며 어느 범위가 잘 들리는지 확인해봐요!</p>
            <canvas ref={waveCanvasRef} width={550} height={150} className="w-full rounded-lg border border-gray-200 mb-4" />
            <div className="mb-4">
              <label className="font-bold text-gray-700 text-base">주파수: <span className="text-pink-600">{freqValue} Hz</span></label>
              <input type="range" min={20} max={20000} value={freqValue} onChange={e=>setFreqValue(parseInt(e.target.value))} className="slider-pink mt-2 w-full" />
            </div>
            <div className="flex gap-2 mb-3">
              <button onClick={playTone} className="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-5 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all">▶️ 소리 들어보기 (3초)</button>
              <button onClick={stopTone} className="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg font-bold text-base hover:bg-gray-300 transition-all">⏹️ 정지</button>
            </div>
            <div className="bg-yellow-50 border border-yellow-300 rounded-lg p-3">
              <p className="text-base text-yellow-800">⚠️ 높은 주파수는 귀가 아플 수 있으니 볼륨을 낮춰주세요!</p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <h3 className="font-bold text-gray-900 text-xl mb-4">🎼 2단계: 주파수 제거 체험하기</h3>
            <p className="text-base text-gray-700 mb-4">MP3는 사람이 듣기 어려운 주파수를 제거해요. 막대를 클릭해서 각 주파수 소리를 직접 들어보세요!</p>

            <div className="flex gap-2 h-52 items-end justify-center bg-pink-50 rounded-lg p-4 mb-6 flex-wrap">
              {freqBars.map((bar, idx) => (
                <div key={idx} onClick={() => toggleFreqBar(idx)}
                  className={`freq-bar relative ${bar.removed ? 'removed' : ''} ${bar.playing ? 'playing' : ''}`}
                  style={{ height: bar.height+'px' }}>
                  <div className="freq-bar-label">{bar.label}</div>
                </div>
              ))}
            </div>

            <div className="flex gap-2 flex-wrap justify-center mb-4">
              <button onClick={removeInaudible} className="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-4 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all">🔇 안 들리는 주파수 제거</button>
              <button onClick={removeHigh} className="bg-gradient-to-r from-rose-400 to-red-400 text-white px-4 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all">⬆️ 초고주파 제거</button>
              <button onClick={removeLow} className="bg-gradient-to-r from-orange-400 to-amber-400 text-white px-4 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all">⬇️ 초저주파 제거</button>
              <button onClick={resetBars} className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold text-base hover:bg-gray-300 transition-all">🔄 초기화</button>
            </div>

            <div className="grid grid-cols-2 gap-4">
              {[{label:'압축 후 크기',value:compressedSize},{label:'압축 비율',value:compressionRatio}].map(s=>(
                <div key={s.label} className="bg-white p-4 rounded-xl text-center border-2 border-pink-100">
                  <div className="text-base text-gray-500 mb-1">{s.label}</div>
                  <div className="text-2xl font-bold text-pink-600">{s.value}</div>
                </div>
              ))}
            </div>

            <div className="mt-4 bg-gradient-to-r from-green-50 to-emerald-50 p-4 rounded-lg border border-green-200">
              <h4 className="font-bold text-green-800 mb-1 text-base">💡 첫 번째 비법: 듣기 어려운 주파수 제거!</h4>
              <p className="text-base text-gray-700">이론적으로 20Hz~20,000Hz를 들을 수 있지만, 실제로는 대부분 15,000Hz 이하만 잘 들려요. 너무 낮거나 높은 주파수는 제거해도 차이를 못 느껴요!</p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <h3 className="font-bold text-gray-900 text-xl mb-4">🎭 3단계: 마스킹 효과 체험하기</h3>
            <p className="text-base text-gray-700 mb-4">큰 소리와 작은 소리가 동시에 나오면 작은 소리는 들리지 않아요. 이를 <strong>"마스킹 효과"</strong>라고 해요!</p>

            <div className="relative h-36 bg-pink-50 rounded-lg p-4 mb-4">
              <div className="flex items-center h-full gap-1">
                {maskingBars.map((bar, i) => (
                  <div key={i} className={`wave-bar ${bar.masked?'masked':''} ${bar.playing?'playing':''}`}
                    style={{ height: bar.height+'%', background: bar.isLoud?'#f5576c':'#f093fb' }} />
                ))}
              </div>
              {maskingActive && <div className="absolute top-2 right-2 bg-red-500 text-white text-base px-2 py-1 rounded font-bold">큰 소리 🔊</div>}
            </div>

            <div className="flex gap-2 flex-wrap mb-4">
              <button onClick={startMasking} disabled={maskingActive} className="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-4 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all disabled:opacity-50">🔊 소리 재생</button>
              <button onClick={applyMasking} disabled={!maskingApplyEnabled} className="bg-gradient-to-r from-rose-500 to-red-500 text-white px-4 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all disabled:opacity-50">🎭 마스킹 효과 적용</button>
              <button onClick={resetMasking} className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold text-base hover:bg-gray-300 transition-all">🔄 초기화</button>
            </div>

            <div className="grid grid-cols-3 gap-3 mb-4">
              {[{label:'현재 상태',value:maskingStatus},{label:'주파수 개수',value:maskingFreqCount},{label:'압축률',value:maskingCompression}].map(s=>(
                <div key={s.label} className="bg-white p-3 rounded-xl text-center border-2 border-pink-100">
                  <div className="text-base text-gray-500 mb-1">{s.label}</div>
                  <div className="text-base font-bold text-pink-600">{s.value}</div>
                </div>
              ))}
            </div>

            <div className="bg-yellow-50 border border-yellow-300 rounded-lg p-3">
              <h4 className="font-bold text-yellow-800 text-base mb-1">💡 두 번째 비법: 마스킹 효과!</h4>
              <p className="text-base text-gray-700">드럼 소리가 크게 나올 때 작은 기타 소리는 들리지 않아요. MP3는 이런 안 들리는 작은 소리를 과감히 제거해서 파일 크기를 줄여요!</p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <h3 className="font-bold text-gray-900 text-xl mb-4">💿 비트레이트와 음질 비교</h3>
            <p className="text-base text-gray-700 mb-4">비트레이트가 높을수록 음질이 좋지만 파일 크기도 커져요. 직접 들어보며 차이를 느껴봐요!</p>

            <div className="mb-4">
              <label className="font-bold text-gray-700 text-base">비트레이트: <span className="text-pink-600">{bitrate} kbps</span></label>
              <input type="range" min={64} max={320} step={128} value={bitrate} onChange={e=>setBitrate(parseInt(e.target.value))} className="slider-pink mt-2 w-full" />
            </div>

            <div className="flex gap-2 mb-4">
              <button onClick={playBitrate} className="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-5 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all">▶️ 소리 듣기</button>
              <button onClick={stopBitrate} className="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg font-bold text-base hover:bg-gray-300 transition-all">⏹️ 정지</button>
            </div>

            {bitrateInfo[bitrate] && (
              <div className="bg-pink-50 border-l-4 border-pink-400 p-4 rounded-lg mb-4">
                <p className="text-base"><strong>{bitrate} kbps:</strong> {bitrateInfo[bitrate].quality}</p>
                <p className="text-base mt-1"><strong>예상 파일 크기 (3분 곡):</strong> {bitrateInfo[bitrate].size}</p>
              </div>
            )}

            <div className="bg-white rounded-xl p-4 border border-gray-200">
              <p className="font-bold text-gray-700 mb-3 text-base">💿 CD vs MP3 용량 비교 (3분 곡 기준)</p>
              {[
                { label:'💿 CD 음질', size:30, color:'from-red-500 to-red-600', width:100 },
                { label:'🎵 MP3 320kbps', size:7, color:'from-green-500 to-emerald-500', width:23 },
                { label:'🎵 MP3 128kbps', size:2.8, color:'from-yellow-400 to-amber-400', width:9 },
                { label:'🎵 MP3 64kbps', size:1.4, color:'from-gray-400 to-gray-500', width:5 },
              ].map(row => (
                <div key={row.label} className="mb-3">
                  <div className="flex justify-between text-base text-gray-600 mb-1"><span>{row.label}</span><span>{row.size}MB</span></div>
                  <div className="h-5 bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full bg-gradient-to-r ${row.color} rounded-full`} style={{width:`${row.width}%`}} />
                  </div>
                </div>
              ))}
              <p className="text-base text-gray-500 text-center mt-3">😲 CD 한 장(74분) 음악 → MP3 128kbps로 바꾸면 <strong className="text-pink-600">700MB → 70MB</strong></p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <div className="flex justify-between items-center mb-3">
              <h3 className="font-bold text-gray-900 text-xl">🔬 MP3 압축의 3가지 비밀 기술</h3>
              <button onClick={() => setShowMp3Detail(!showMp3Detail)}
                className="text-pink-600 border-2 border-pink-300 rounded-full px-3 py-1 text-base font-bold hover:-translate-y-0.5 transition-all">
                {showMp3Detail ? '📕 접기' : '📖 심화 내용 보기'}
              </button>
            </div>
            <p className="text-base text-gray-600 mb-2">① 안 들리는 소리 제거 &nbsp; ② 마스킹 효과 &nbsp; ③ 대역별 압축 — 세 가지 방법으로 10분의 1로 줄여요!</p>
            <div className={`collapsible-content ${showMp3Detail ? 'open' : ''}`}>
              <div className="space-y-3 mt-3">
                {[
                  { num:'1', title:'사람 귀에 안 들리는 소리 제거', desc:'사람은 20Hz~20,000Hz 사이의 소리만 들을 수 있어요. 이 범위 밖의 소리는 지워버려요!', bg:'bg-pink-50 border-pink-200', nc:'text-pink-600' },
                  { num:'2', title:'마스킹 효과 (큰 소리에 작은 소리가 묻힘)', desc:'시끄러운 음악 속에서는 작은 소리가 안 들려요. 안 들리는 작은 소리를 지워버려요!', bg:'bg-rose-50 border-rose-200', nc:'text-rose-600' },
                  { num:'3', title:'주파수 대역별로 다르게 압축', desc:'중요한 중간 소리는 자세하게, 덜 중요한 높거나 낮은 소리는 간단하게 저장해요!', bg:'bg-green-50 border-green-200', nc:'text-green-600' },
                ].map(s => (
                  <div key={s.num} className={`flex items-start gap-3 p-3 rounded-lg border ${s.bg}`}>
                    <div className={`text-2xl font-bold ${s.nc} min-w-[32px]`}>{s.num}</div>
                    <div>
                      <h5 className={`font-bold ${s.nc} mb-1 text-base`}>{s.title}</h5>
                      <p className="text-gray-700 text-base">{s.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="bg-gradient-to-r from-yellow-50 to-orange-50 p-6 rounded-lg border border-yellow-300">
            <h3 className="font-bold text-orange-900 text-lg mb-3">📌 소리 손실 압축의 특징</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded-lg border border-green-300">
                <p className="font-bold text-green-700 mb-2">👍 장점</p>
                <ul className="text-base text-gray-800 space-y-1">
                  <li>• 파일 크기를 10배 이상 줄여요</li>
                  <li>• 음질 차이를 거의 느끼지 못해요</li>
                  <li>• 스트리밍 서비스에 최적이에요</li>
                </ul>
              </div>
              <div className="bg-white p-4 rounded-lg border border-red-300">
                <p className="font-bold text-red-700 mb-2">👎 단점</p>
                <ul className="text-base text-gray-800 space-y-1">
                  <li>• 원본 음질로 되돌릴 수 없어요</li>
                  <li>• 낮은 비트레이트(64kbps)는 음질이 나빠요</li>
                  <li>• 전문 음악 작업엔 부적합해요</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ===================== 영상 압축 탭 =====================
    const VideoTab = () => {
      const [showIpbDetail, setShowIpbDetail] = useState(false);
      const [scene, setScene] = useState('classroom');
      const [speed, setSpeed] = useState(2);
      const [showTooltip, setShowTooltip] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);

      const handleTooltipClick = () => {
        setShowTooltip(true);
        setTimeout(() => setShowTooltip(false), 1500);
      };
      const [stats, setStats] = useState({ frame: 0, iCount: 0, pCount: 0, savedAvg: 0, changedPct: 0 });
      const [frameType, setFrameType] = useState(null); // 'I' or 'P'

      const cvPrevRef = useRef(null);
      const cvCurrRef = useRef(null);
      const cvDiffRef = useRef(null);
      const animRef = useRef(null);
      const sRef = useRef({
        frame:0, iCount:0, pCount:0, totalSaved:0,
        prevData:null, lastTime:0,
        teacher:{x:60, vx:1.2},
        ball:{x:30, y:80, vx:2, vy:1.5},
        car:{x:-80},
        wave:0,
      });

      const W = 210, H = 140;
      const I_INTERVAL = 10;

      const drawScene = (ctx, name, st) => {
        ctx.clearRect(0,0,W,H);
        if (name === 'classroom') {
          // 배경: 교실 벽
          ctx.fillStyle = '#fef9f0'; ctx.fillRect(0,0,W,H);
          // 칠판
          ctx.fillStyle = '#2d6a4f'; ctx.fillRect(18,10,174,72);
          ctx.strokeStyle = '#8B6914'; ctx.lineWidth=3; ctx.strokeRect(18,10,174,72);
          ctx.fillStyle = '#52b788';
          ctx.font = 'bold 10px sans-serif'; ctx.textAlign='center';
          ctx.fillText('영상 압축 = 변화만 저장!', W/2, 40);
          ctx.fillStyle='#74c69d'; ctx.font='9px sans-serif';
          ctx.fillText('I-frame / P-frame / B-frame', W/2, 56);
          ctx.textAlign='left';
          // 바닥
          ctx.fillStyle='#c8a96e'; ctx.fillRect(0,H-18,W,18);
          // 책상 4개 (정적)
          [15,65,115,165].forEach(dx=>{
            ctx.fillStyle='#a0785a'; ctx.fillRect(dx,H-36,42,20);
            ctx.fillStyle='#88633f'; ctx.fillRect(dx+2,H-16,38,4);
          });
          // 선생님 (움직임)
          const tx = st.teacher.x;
          ctx.fillStyle='#4a86e8'; ctx.fillRect(tx-7,H-70,14,38);
          ctx.fillStyle='#f4a261'; ctx.beginPath(); ctx.arc(tx,H-75,9,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle='#4a86e8'; ctx.lineWidth=3;
          ctx.beginPath(); ctx.moveTo(tx-7,H-62); ctx.lineTo(tx-18,H-53);
          ctx.moveTo(tx+7,H-62); ctx.lineTo(tx+22,H-48); ctx.stroke();
          // 변화 있음 라벨
          ctx.fillStyle='rgba(255,80,80,0.85)'; ctx.font='bold 9px sans-serif';
          ctx.fillText('← 움직임', tx+14, H-78);

        } else if (name === 'soccer') {
          // 잔디
          for(let i=0;i<7;i++){
            ctx.fillStyle = i%2===0?'#2d6a1f':'#357a24';
            ctx.fillRect(i*(W/7),0,W/7,H);
          }
          // 골대
          ctx.strokeStyle='white'; ctx.lineWidth=3;
          ctx.strokeRect(W-32,H-55,28,42);
          // 센터라인
          ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
          ctx.beginPath(); ctx.arc(W/2,H/2,28,0,Math.PI*2); ctx.stroke();
          // 공 (움직임)
          const bx=st.ball.x, by=st.ball.y;
          ctx.beginPath(); ctx.arc(bx,by,9,0,Math.PI*2);
          ctx.fillStyle='white'; ctx.fill();
          ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.stroke();
          ctx.fillStyle='#333';
          [[bx-2,by-2,3],[bx+3,by+1,2.5],[bx-1,by+4,2]].forEach(([x,y,r])=>{
            ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
          });

        } else if (name === 'ocean') {
          // 하늘
          const sky=ctx.createLinearGradient(0,0,0,H*0.52);
          sky.addColorStop(0,'#87ceeb'); sky.addColorStop(1,'#b8e4ff');
          ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.52);
          // 태양
          ctx.fillStyle='#FFD700';
          ctx.beginPath(); ctx.arc(35,22,16,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='rgba(255,215,0,0.25)';
          ctx.beginPath(); ctx.arc(35,22,24,0,Math.PI*2); ctx.fill();
          // 구름 (정적)
          ctx.fillStyle='rgba(255,255,255,0.85)';
          [[120,18,18],[140,14,14],[155,18,12]].forEach(([cx,cy,r])=>{
            ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
          });
          // 파도 (전체 움직임)
          const ph=st.wave;
          ctx.fillStyle='#1565c0';
          ctx.beginPath(); ctx.moveTo(0,H*0.52);
          for(let x=0;x<=W;x+=3){
            const y=H*0.52+Math.sin(x*0.05+ph)*11+Math.sin(x*0.09+ph*1.4)*5;
            ctx.lineTo(x,y);
          }
          ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
          ctx.fillStyle='#1976d2';
          ctx.beginPath(); ctx.moveTo(0,H*0.58);
          for(let x=0;x<=W;x+=3){
            const y=H*0.58+Math.sin(x*0.05+ph+1.2)*9+Math.sin(x*0.08+ph*1.6)*4;
            ctx.lineTo(x,y);
          }
          ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
          // 거품선
          ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.moveTo(0,H*0.52);
          for(let x=0;x<=W;x+=3){
            const y=H*0.52+Math.sin(x*0.05+ph)*11+Math.sin(x*0.09+ph*1.4)*5;
            ctx.lineTo(x,y);
          }
          ctx.stroke();

        } else if (name === 'car') {
          // 하늘
          ctx.fillStyle='#d4e8f5'; ctx.fillRect(0,0,W,H*0.55);
          // 건물들 (정적)
          [{x:5,w:32,h:58,c:'#8b9dc3'},{x:45,w:22,h:42,c:'#a8b8d0'},
           {x:140,w:36,h:65,c:'#7a8db5'},{x:182,w:26,h:48,c:'#9aabcc'}].forEach(b=>{
            ctx.fillStyle=b.c; ctx.fillRect(b.x,H*0.55-b.h,b.w,b.h);
            ctx.fillStyle='rgba(255,255,180,0.55)';
            for(let r=0;r<3;r++) for(let c2=0;c2<2;c2++)
              ctx.fillRect(b.x+3+c2*11,H*0.55-b.h+7+r*15,8,9);
          });
          // 도로
          ctx.fillStyle='#555'; ctx.fillRect(0,H*0.55,W,H*0.45);
          ctx.fillStyle='#666'; ctx.fillRect(0,H*0.55,W,3);
          ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
          ctx.setLineDash([18,12]);
          ctx.beginPath(); ctx.moveTo(0,H*0.77); ctx.lineTo(W,H*0.77); ctx.stroke();
          ctx.setLineDash([]);
          // 자동차 (움직임)
          const cx2=st.car.x, cy2=H*0.59;
          ctx.fillStyle='#e63946';
          ctx.fillRect(cx2,cy2+7,65,26);
          ctx.fillStyle='#c1121f'; ctx.fillRect(cx2+11,cy2,44,16);
          ctx.fillStyle='rgba(180,230,255,0.8)';
          ctx.fillRect(cx2+14,cy2+1,17,12); ctx.fillRect(cx2+35,cy2+1,16,12);
          ctx.fillStyle='#111';
          [cx2+11,cx2+50].forEach(wx=>{
            ctx.beginPath(); ctx.arc(wx,cy2+35,8,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(wx,cy2+35,3.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#111';
          });
        }
      };

      const updateSRef = (name, spd) => {
        const s=sRef.current; s.frame++;
        if(name==='classroom'){
          s.teacher.x+=s.teacher.vx*spd;
          if(s.teacher.x>185||s.teacher.x<35) s.teacher.vx*=-1;
        } else if(name==='soccer'){
          s.ball.x+=s.ball.vx*spd; s.ball.y+=s.ball.vy*spd;
          if(s.ball.x<10||s.ball.x>W-10) s.ball.vx*=-1;
          if(s.ball.y<10||s.ball.y>H-10) s.ball.vy*=-1;
        } else if(name==='ocean'){
          s.wave+=0.07*spd;
        } else if(name==='car'){
          s.car.x+=1.8*spd;
          if(s.car.x>W+10) s.car.x=-85;
        }
      };

      const computeDiff = (ctxD, prevD, currD) => {
        if(!prevD) return 0;
        const img=ctxD.createImageData(W,H);
        let changed=0;
        for(let i=0;i<W*H;i++){
          const idx=i*4;
          const d=(Math.abs(prevD[idx]-currD[idx])+Math.abs(prevD[idx+1]-currD[idx+1])+Math.abs(prevD[idx+2]-currD[idx+2]))/3;
          if(d>18){
            changed++;
            img.data[idx]=Math.min(255,d*4); img.data[idx+1]=30; img.data[idx+2]=60; img.data[idx+3]=255;
          } else {
            img.data[idx]=18; img.data[idx+1]=18; img.data[idx+2]=18; img.data[idx+3]=255;
          }
        }
        ctxD.putImageData(img,0,0);
        return changed/(W*H)*100;
      };

      useEffect(()=>{
        const s=sRef.current;
        s.frame=0; s.iCount=0; s.pCount=0; s.totalSaved=0;
        s.prevData=null; s.lastTime=0;
        s.teacher={x:60,vx:1.2}; s.ball={x:30,y:80,vx:2,vy:1.5};
        s.car={x:-80}; s.wave=0;
        setStats({frame:0,iCount:0,pCount:0,savedAvg:0,changedPct:0});
        setFrameType(null);
        setIsPlaying(false);
        if(animRef.current) cancelAnimationFrame(animRef.current);
        // setTimeout(0): 탭 전환 직후 ref가 null일 수 있어서 한 틱 뒤에 실행
        setTimeout(()=>{
          [cvPrevRef,cvCurrRef,cvDiffRef].forEach(r=>{
            if(!r.current) return;
            const ctx=r.current.getContext('2d');
            ctx.fillStyle='#f3f4f6'; ctx.fillRect(0,0,W,H);
            ctx.fillStyle='#9ca3af'; ctx.font='13px sans-serif'; ctx.textAlign='center';
            ctx.fillText('▶ 시작을 눌러보세요!',W/2,H/2); ctx.textAlign='left';
          });
        }, 0);
      },[scene]);

      useEffect(()=>{
        if(!isPlaying) return;
        const s=sRef.current;
        const loop=(ts)=>{
          const spd=speed*0.5;
          if(ts-s.lastTime < 1000/(10*spd)){
            animRef.current=requestAnimationFrame(loop); return;
          }
          s.lastTime=ts;
          updateSRef(scene,spd);
          const cvC=cvCurrRef.current, cvP=cvPrevRef.current, cvD=cvDiffRef.current;
          if(!cvC||!cvP||!cvD) return;
          const ctxC=cvC.getContext('2d'), ctxP=cvP.getContext('2d'), ctxD=cvD.getContext('2d');
          drawScene(ctxC,scene,s);
          const currImg=ctxC.getImageData(0,0,W,H);
          const isI=s.frame%I_INTERVAL===1;
          let changedPct=0;
          if(isI||!s.prevData){
            // I-frame: 검정화면 대신 현재 화면 + 파란 오버레이 → 깜빡임 제거
            if(s.prevData) ctxP.putImageData(s.prevData,0,0);
            else { ctxP.fillStyle='#f3f4f6'; ctxP.fillRect(0,0,W,H); }
            ctxD.putImageData(currImg,0,0);
            ctxD.fillStyle='rgba(30,80,200,0.35)'; ctxD.fillRect(0,0,W,H);
            ctxD.fillStyle='rgba(255,220,80,0.95)'; ctxD.fillRect(0,0,W,20);
            ctxD.fillStyle='#7c3a00'; ctxD.font='bold 10px sans-serif'; ctxD.textAlign='center';
            ctxD.fillText('I-Frame: 전체 저장 (기준점)',W/2,14); ctxD.textAlign='left';
            s.iCount++;
          } else {
            ctxP.putImageData(s.prevData,0,0);
            changedPct=computeDiff(ctxD,s.prevData.data,currImg.data);
            const saved=100-changedPct;
            s.totalSaved+=saved; s.pCount++;
            ctxD.fillStyle='rgba(0,0,0,0.5)'; ctxD.fillRect(0,0,W,20);
            ctxD.fillStyle='rgba(255,110,110,1)'; ctxD.font='bold 10px sans-serif';
            ctxD.fillText(`변화: ${changedPct.toFixed(1)}%`,5,14);
            ctxD.fillStyle='rgba(100,255,150,1)';
            ctxD.fillText(`절약: ${saved.toFixed(1)}%`,90,14);
          }
          s.prevData=currImg;
          // 3프레임마다만 setStats → 불필요한 리렌더 최소화
          if(s.frame%3===0){
            const savedAvg=s.pCount>0?(s.totalSaved/s.pCount).toFixed(1):0;
            setStats({frame:s.frame,iCount:s.iCount,pCount:s.pCount,savedAvg,changedPct:changedPct.toFixed(1)});
            setFrameType(isI ? 'I' : 'P');
          }
          animRef.current=requestAnimationFrame(loop);
        };
        animRef.current=requestAnimationFrame(loop);
        return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
      },[isPlaying,scene,speed]);

      const handleStop=()=>{ setIsPlaying(false); if(animRef.current) cancelAnimationFrame(animRef.current); };

      const scenes=[
        {id:'classroom',icon:'🏫',label:'교실',desc:'선생님만 이동',hint:'절약 많음 ~85%',hintColor:'text-green-600'},
        {id:'soccer',icon:'⚽',label:'축구장',desc:'공만 굴러감',hint:'절약 많음 ~80%',hintColor:'text-green-600'},
        {id:'ocean',icon:'🌊',label:'바다',desc:'파도 전체 움직임',hint:'절약 적음 ~20%',hintColor:'text-red-500'},
        {id:'car',icon:'🚗',label:'도로',desc:'자동차만 이동',hint:'절약 중간 ~60%',hintColor:'text-yellow-600'},
      ];

      return (
        <div className="p-8 animate-slide-in">
          <div className="bg-gradient-to-r from-pink-50 to-rose-50 p-6 rounded-lg border border-pink-200 mb-6">
            <h3 className="font-bold text-pink-900 text-lg mb-2 flex items-center gap-2">
              <span className="text-2xl">🎬</span> 영상 압축 체험하기 (MPEG 방식)
            </h3>
            <p className="text-gray-800 leading-relaxed text-base">
              연속된 화면에서 <span className="font-bold text-pink-600">변화가 있는 부분만 저장</span>하는 방식이에요.
              배경은 그대로이고 사람만 움직이면 사람 부분만 저장하면 되겠죠?
              <span className="font-bold text-rose-600"> 유튜브, 넷플릭스, 틱톡</span>의 모든 영상이 이 기술을 써요!
            </p>
          </div>

          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <div className="flex justify-between items-center mb-3">
              <h3 className="font-bold text-gray-900 text-xl">🎞️ I / P / B 프레임이란?</h3>
              <button onClick={() => setShowIpbDetail(!showIpbDetail)}
                className="text-pink-600 border-2 border-pink-300 rounded-full px-3 py-1 text-base font-bold hover:-translate-y-0.5 transition-all">
                {showIpbDetail ? '📕 접기' : '📖 심화 내용 보기'}
              </button>
            </div>
            <p className="text-base text-gray-700 mb-3">I(전체 저장) / P(이전과 차이) / B(앞뒤 비교) — 세 종류를 섞어서 저장해 용량을 줄여요!</p>
            <div className={`collapsible-content ${showIpbDetail ? 'open' : ''}`}>
              <div className="flex gap-4 flex-wrap justify-center mt-3 mb-4">
                {[
                  { name:'I 프레임', sub:'(Intra Frame)', desc:'🖼️ 완전한 그림 전체 저장', detail:'기준이 되는 프레임\n파일 크기: 크다', color:'from-red-500 to-red-600' },
                  { name:'P 프레임', sub:'(Predicted Frame)', desc:'↩️ 이전 프레임과 차이만 저장', detail:'앞 프레임 기준으로 예측\n파일 크기: 중간', color:'from-orange-500 to-amber-500' },
                  { name:'B 프레임', sub:'(Bidirectional Frame)', desc:'↩️↪️ 앞뒤 프레임 둘 다 비교', detail:'가장 효율적인 압축\n파일 크기: 가장 작다', color:'from-green-500 to-emerald-500' },
                ].map(f => (
                  <div key={f.name} className={`flex-1 min-w-44 bg-gradient-to-b ${f.color} text-white rounded-xl p-4 text-center`}>
                    <div className="text-xl font-bold mb-1">{f.name}</div>
                    <div className="text-base mb-2 opacity-80">{f.sub}</div>
                    <div className="bg-white bg-opacity-20 rounded-lg p-2 text-base mb-2">{f.desc}</div>
                    <div className="text-base opacity-90 whitespace-pre-line">{f.detail}</div>
                  </div>
                ))}
              </div>
              <div className="bg-gray-50 rounded-xl p-4 mb-3">
                <p className="font-bold text-gray-700 text-base mb-3 text-center">📽️ 실제 저장 순서 예시</p>
                <div className="flex gap-2 justify-center flex-wrap">
                  {['I','B','B','P','B','B','I'].map((f,i) => (
                    <React.Fragment key={i}>
                      <div className={`px-3 py-2 rounded-lg font-bold text-white text-base ${f==='I'?'bg-red-500':f==='P'?'bg-orange-500':'bg-yellow-400'}`}>{f}</div>
                      {i<6 && <span className="text-gray-400 self-center">→</span>}
                    </React.Fragment>
                  ))}
                  <span className="text-gray-400 self-center text-lg">⋯</span>
                </div>
                <p className="text-base text-gray-500 text-center mt-2">I 프레임은 가끔, P/B 프레임이 대부분 → 파일이 훨씬 작아져요!</p>
              </div>
            </div>
          </div>

          {/* ── 변화 감지 체험 섹션 ── */}
          <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-lg mb-6">
            <h3 className="font-bold text-gray-900 text-xl mb-1">
              <span className="relative inline-block cursor-pointer" onClick={handleTooltipClick}>
                ⏱️
                {showTooltip && (
                  <span
                    className="absolute left-1/2 -top-10 bg-pink-200 text-gray-900 px-3 py-1 rounded-xl text-base font-bold whitespace-nowrap shadow-2xl z-50"
                    style={{animation:'bounceOnce 0.4s ease-in-out'}}
                  >
                    {"\uCC38\uC0C8"}
                  </span>
                )}
              </span>
              {' '}변화 감지 체험
            </h3>
            <p className="text-base text-gray-600 mb-4">장면을 선택하고 ▶ 시작을 눌러보세요! 어떤 부분이 저장되는지 눈으로 확인할 수 있어요.</p>

            {/* 장면 선택 */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
              {scenes.map(sc=>(
                <button key={sc.id} onClick={()=>setScene(sc.id)}
                  className={`rounded-xl p-3 border-2 text-left transition-all ${scene===sc.id?'border-pink-500 bg-pink-50 shadow-md':'border-gray-200 bg-gray-50 hover:border-pink-300'}`}>
                  <div className="text-2xl mb-1">{sc.icon}</div>
                  <div className="font-bold text-gray-800 text-base">{sc.label}</div>
                  <div className="text-sm text-gray-500 mb-1">{sc.desc}</div>
                  <div className={`text-sm font-bold ${sc.hintColor}`}>{sc.hint}</div>
                </button>
              ))}
            </div>

            {/* 3분할 캔버스 */}
            <div className="grid grid-cols-3 gap-3 mb-4">
              {[
                {ref:cvPrevRef, label:'이전 프레임', sub:'(기억하고 있는 화면)', border:'border-gray-300', badge:'bg-gray-500'},
                {ref:cvCurrRef, label:'현재 프레임', sub:'(지금 들어온 화면)', border:'border-pink-300', badge:'bg-pink-500'},
                {ref:cvDiffRef, label:'저장하는 데이터', sub:'(달라진 부분만!)', border:'border-rose-300', badge:'bg-rose-600'},
              ].map(({ref,label,sub,border,badge})=>(
                <div key={label} className={`rounded-xl border-2 ${border} overflow-hidden shadow`}>
                  <div className={`${badge} text-white text-sm font-bold px-2 py-1`}>{label}</div>
                  <div className="text-center text-sm text-gray-400 py-0.5 bg-gray-50">{sub}</div>
                  <canvas ref={ref} width={W} height={H} style={{display:'block',width:'100%',height:'auto'}} />
                </div>
              ))}
            </div>

            {/* 현재 프레임 타입 상태 표시줄 */}
            <div className={`rounded-xl p-4 mb-4 border-2 transition-all ${
              !frameType ? 'bg-gray-50 border-gray-200' :
              frameType==='I' ? 'bg-yellow-50 border-yellow-400' :
              'bg-green-50 border-green-400'
            }`}>
              {!frameType && (
                <p className="text-center text-gray-400 font-bold text-base">▶ 시작하면 현재 프레임 타입이 여기에 표시돼요</p>
              )}
              {frameType==='I' && (
                <div className="flex items-center gap-4 flex-wrap">
                  <span className="bg-yellow-400 text-yellow-900 font-black text-xl px-4 py-2 rounded-lg shrink-0">I-Frame</span>
                  <div>
                    <p className="font-bold text-yellow-800 text-base">🖼️ 전체 화면을 통째로 저장하는 중!</p>
                    <p className="text-yellow-700 text-sm mt-0.5">기준점 역할을 해요. 다음 P-Frame들이 이 프레임과 비교해요. 파일 용량이 커요.</p>
                  </div>
                </div>
              )}
              {frameType==='P' && (
                <div className="flex items-center gap-4 flex-wrap">
                  <span className="bg-green-400 text-green-900 font-black text-xl px-4 py-2 rounded-lg shrink-0">P-Frame</span>
                  <div className="flex-1">
                    <p className="font-bold text-green-800 text-base">✂️ 달라진 픽셀만 저장하는 중! (절약: <span className="text-green-600">{stats.savedAvg}%</span>)</p>
                    <p className="text-green-700 text-sm mt-0.5">빨간 부분만 저장해요. 어두운 부분은 저장 안 해도 돼요 → 용량이 훨씬 작아요!</p>
                  </div>
                </div>
              )}
            </div>

            {/* 설명 배너 */}
            <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4 text-base text-yellow-800">
              💡 <span className="font-bold">어두운 픽셀</span> = 변화 없음 (저장 안 해도 됨!) &nbsp;|&nbsp;
              <span className="font-bold text-red-600">빨간 픽셀</span> = 변화 있음 (이 부분만 저장)
            </div>

            {/* 컨트롤 */}
            <div className="flex gap-3 flex-wrap items-center justify-center mb-4">
              <button onClick={()=>setIsPlaying(true)} disabled={isPlaying}
                className="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-6 py-2 rounded-lg font-bold text-base hover:shadow-lg transition-all disabled:opacity-40">
                ▶ 시작
              </button>
              <button onClick={handleStop} disabled={!isPlaying}
                className="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg font-bold text-base hover:bg-gray-300 transition-all disabled:opacity-40">
                ⏸ 멈추기
              </button>
              <div className="flex items-center gap-2 bg-gray-100 rounded-lg px-4 py-2">
                <span className="text-sm text-gray-600 font-bold">🐢 속도</span>
                <input type="range" min="1" max="4" value={speed} onChange={e=>setSpeed(Number(e.target.value))}
                  className="slider-pink w-24" />
                <span className="text-sm text-gray-600 font-bold">🐇</span>
              </div>
            </div>

            {/* 통계 카드 */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[
                {label:'현재 프레임', value:stats.frame, color:'text-pink-600', bg:'bg-pink-50', border:'border-pink-200'},
                {label:'I-frame 수 (전체저장)', value:stats.iCount, color:'text-yellow-600', bg:'bg-yellow-50', border:'border-yellow-200'},
                {label:'P-frame 수 (차이저장)', value:stats.pCount, color:'text-rose-600', bg:'bg-rose-50', border:'border-rose-200'},
                {label:'평균 절약량', value:stats.savedAvg+'%', color:'text-green-600', bg:'bg-green-50', border:'border-green-200'},
              ].map(c=>(
                <div key={c.label} className={`${c.bg} border ${c.border} rounded-xl p-3 text-center`}>
                  <div className={`text-2xl font-bold ${c.color}`}>{c.value}</div>
                  <div className="text-sm text-gray-500 mt-0.5">{c.label}</div>
                </div>
              ))}
            </div>

            {/* 압축률 비교 */}
            <div className="mt-4 bg-gray-50 rounded-xl p-4 border border-gray-200">
              <p className="font-bold text-gray-700 text-base mb-3 text-center">📊 장면별 압축 효율 비교 (배경이 정적일수록 효율 UP!)</p>
              <div className="space-y-2">
                {[
                  {id:'classroom', label:'🏫 교실 (선생님만 이동)', pct:15, saved:85, color:'bg-green-400'},
                  {id:'soccer',    label:'⚽ 축구 (공만 이동)',     pct:20, saved:80, color:'bg-green-400'},
                  {id:'car',       label:'🚗 도로 (자동차만 이동)', pct:40, saved:60, color:'bg-yellow-400'},
                  {id:'ocean',     label:'🌊 바다 (파도 전체)',     pct:80, saved:20, color:'bg-red-400'},
                ].map(r=>{
                  const isSelected = scene === r.id;
                  return (
                    <div key={r.id} className={`flex items-center gap-2 rounded-lg px-2 py-1 transition-all ${isSelected ? 'bg-pink-50 border-2 border-pink-400' : 'opacity-35 border-2 border-transparent'}`}>
                      <span className={`text-sm w-44 shrink-0 ${isSelected ? 'text-gray-800 font-bold' : 'text-gray-400'}`}>
                        {r.label}
                        {isSelected && <span className="ml-1 text-pink-500">◀ 선택됨</span>}
                      </span>
                      <div className="flex-1 bg-gray-200 rounded-full h-5 overflow-hidden">
                        <div className={`${r.color} h-full rounded-full flex items-center justify-end pr-2`} style={{width:r.pct+'%'}}>
                          <span className="text-white text-sm font-bold">{r.pct}%</span>
                        </div>
                      </div>
                      <span className={`text-sm font-bold w-16 shrink-0 ${isSelected ? 'text-green-600' : 'text-gray-400'}`}>절약 {r.saved}%</span>
                    </div>
                  );
                })}
              </div>
              <p className="text-sm text-gray-400 text-center mt-2">← 막대가 짧을수록 저장 용량이 작아요 (변화가 적을수록 좋음)</p>
            </div>
          </div>

          <div className="bg-gradient-to-r from-yellow-50 to-orange-50 p-6 rounded-lg border border-yellow-300">
            <h3 className="font-bold text-orange-900 text-lg mb-3">📌 영상 손실 압축의 특징</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded-lg border border-green-300">
                <p className="font-bold text-green-700 mb-2">👍 장점</p>
                <ul className="text-base text-gray-800 space-y-1">
                  <li>• 최대 50배까지 압축 가능해요</li>
                  <li>• 정지된 배경이 많을수록 효과적이에요</li>
                  <li>• 유튜브/넷플릭스 스트리밍의 핵심이에요</li>
                </ul>
              </div>
              <div className="bg-white p-4 rounded-lg border border-red-300">
                <p className="font-bold text-red-700 mb-2">👎 단점</p>
                <ul className="text-base text-gray-800 space-y-1">
                  <li>• 움직임이 많으면 압축 효율이 낮아요</li>
                  <li>• 원본으로 되돌릴 수 없어요</li>
                  <li>• 압축을 세게 하면 뭉개짐(모기 노이즈)이 생겨요</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ===================== 메인 앱 =====================
    const LossyCompressionApp = () => {
      const [activeTab, setActiveTab] = useState('image');

      const tabs = [
        { id:'image', label:'🖼️ 이미지 압축' },
        { id:'audio', label:'🎵 소리 압축' },
        { id:'video', label:'🎬 영상 압축' },
        { id:'quiz', label:'🎯 퀴즈' },
        { id:'knowledge', label:'💡 지식 확장' },
      ];

      return (
        <div className="max-w-7xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
          <div className="bg-gradient-to-r from-pink-500 to-rose-500 p-6 text-white">
            <div className="flex justify-between items-center mb-2">
              <div className="text-sm text-pink-100">고등학교 정보 학습자료</div>
              <a href="index.html" className="bg-white text-pink-600 px-4 py-2 rounded-lg font-bold text-base hover:bg-pink-50 transition-all shadow-md hover:shadow-lg flex items-center gap-2">
                🏠 홈으로
              </a>
            </div>
            <h1 className="text-3xl font-bold mb-2">🎨 손실 압축 체험하기</h1>
            <p className="text-pink-100">이미지, 소리, 영상 파일이 어떻게 작아지는지 직접 체험해봐요!</p>
          </div>

          <div className="bg-gradient-to-r from-pink-50 to-rose-50 px-6 py-4 border-b-2 border-pink-200">
            <h3 className="font-bold text-pink-900 text-lg mb-2 flex items-center gap-2">
              <span className="text-2xl">💡</span> 손실 압축이란?
            </h3>
            <p className="text-gray-800 leading-relaxed text-base">
              파일을 작게 만들기 위해 <span className="font-bold text-pink-700">사람이 잘 느끼지 못하는 정보를 제거</span>하는 방법이에요.
              사람의 눈은 세밀한 무늬 변화에 둔감하고, 귀는 아주 작은 소리를 잘 못 들어요.
              이런 특성을 이용해서 정보를 버려도 <span className="font-bold text-rose-600">원본과 거의 같아 보이게</span> 만드는 기술이에요!
              단, 한번 압축하면 원본으로 되돌릴 수 없어요.
            </p>
          </div>

          <div className="bg-gray-100 px-6 py-4 flex gap-2 border-b border-gray-200 overflow-x-auto">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`px-6 py-3 rounded-lg font-bold transition-all whitespace-nowrap text-base ${
                  activeTab === tab.id
                    ? 'bg-gradient-to-r from-pink-500 to-rose-500 text-white shadow-lg'
                    : 'bg-white text-gray-600 hover:bg-gray-50'
                }`}>
                {tab.label}
              </button>
            ))}
          </div>

          {activeTab === 'image' && <ImageTab />}
          {activeTab === 'audio' && <AudioTab />}
          {activeTab === 'video' && <VideoTab />}
          {activeTab === 'quiz' && <QuizSection />}
          {activeTab === 'knowledge' && <KnowledgeSection />}

          <div className="text-center py-8 bg-gray-50 border-t border-gray-200">
            <a href="index.html"
              className="inline-block bg-gradient-to-r from-pink-500 to-rose-500 text-white w-64 py-3 rounded-lg font-bold text-lg hover:shadow-xl transition-all shadow-lg">
              🏠 홈으로 돌아가기
            </a>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LossyCompressionApp />);
  </script>
</body>
</html>
