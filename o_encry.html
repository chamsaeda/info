  <style>
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background: linear-gradient(135deg, #0ea5e9 0%, #10b981 50%, #059669 100%);
      margin: 0;
      padding: 20px;
    }
    @keyframes bounceOnce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50% { transform: translateY(-10px) translateX(-50%); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in {
      animation: slideIn 0.5s ease-out;
    }
    .tab-button {
      transition: all 0.3s ease;
    }
    .tab-button:hover {
      transform: translateY(-2px);
    }
    
    /* 시저 암호 원판 스타일 */
    .cipher-wheel {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
    }
    .circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid #333;
      box-sizing: border-box;
    }
    .outer { background: #fafafa; }
    .inner {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      background: #ffffff;
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      border: 4px solid #444;
      cursor: grab;
      user-select: none;
      z-index: 10;
    }
    .inner:active {
      cursor: grabbing;
    }
    .spokes {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .spoke {
      position: absolute;
      width: 1px;
      height: 100%;
      background: #555;
      left: 50%;
      top: 0;
      transform-origin: center center;
      opacity: 0.7;
    }
    .spoke-inner {
      position: absolute;
      width: 1px;
      height: 100%;
      background: #ff6b6b;
      left: 50%;
      top: 0;
      transform-origin: center center;
      opacity: 0.7;
    }
    .letters {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .letter {
      position: absolute;
      width: 26px;
      height: 26px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      line-height: 26px;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      color: #000;
    }

    /* 스키테일 암호 스타일 */
    .scytale-cylinder-container {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      gap: 0;
    }

    .scytale-cylinder {
      position: relative;
      display: flex;
      align-items: center;
    }

    .scytale-rod-left {
      width: 30px;
      height: 80px;
      background: linear-gradient(to bottom, #8B4513, #A0522D, #8B4513);
      border-radius: 50%;
      box-shadow: 2px 0 5px rgba(0,0,0,0.3);
      z-index: 2;
    }

    .scytale-rod-body {
      position: relative;
      display: flex;
      flex-direction: column;
