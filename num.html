<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔐 자물쇠로 배우는 경우의 수</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
    }
      @keyframes bounceOnce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50% { transform: translateY(-10px) translateX(-50%); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const useRef = React.useRef;
    const useEffect = React.useEffect;

    const quizData = [
      {
        id: 1,
        question: '4자리 숫자 자물쇠에서 각 자리마다 0~9까지 선택 가능할 때, 만들 수 있는 비밀번호의 총 개수는?',
        options: ['4,000가지', '10,000가지', '40,000가지', '1,000가지'],
        correct: 1,
        explanation: '각 자리마다 10가지(0~9)를 선택할 수 있고, 자리가 4개이므로 10 × 10 × 10 × 10 = 10⁴ = 10,000가지입니다. 이것을 "곱셈의 원리"라고 해요!'
      },
      {
        id: 2,
        question: '경우의 수를 계산할 때 곱셈을 사용하는 이유로 가장 올바른 것은?',
        options: [
          '숫자가 크면 항상 곱셈이 빠르기 때문에',
          '각 자리의 선택이 서로 독립적으로 이루어지기 때문에',
          '덧셈보다 곱셈이 더 정확하기 때문에',
          '자물쇠 제조사가 정한 규칙이기 때문에'
        ],
        correct: 1,
        explanation: '첫째 자리에서 어떤 숫자를 선택해도 둘째 자리는 항상 10가지를 선택할 수 있어요. 이처럼 각 자리의 선택이 서로 영향을 주지 않고 "독립적"이기 때문에 곱셈을 사용합니다!'
      },
      {
        id: 3,
        question: '3자리 자물쇠(각 자리 0~9)의 비밀번호 경우의 수는?',
        options: ['30가지', '300가지', '1,000가지', '3,000가지'],
        correct: 2,
        explanation: '10 × 10 × 10 = 10³ = 1,000가지입니다. 000부터 999까지 총 1,000개의 비밀번호를 만들 수 있어요!'
      },
      {
        id: 4,
        question: '각 자리마다 선택지가 5개인 4자리 자물쇠가 있다면, 비밀번호의 경우의 수는?',
        options: ['20가지', '500가지', '625가지', '2,500가지'],
        correct: 2,
        explanation: '각 자리마다 5가지 선택, 자리가 4개이므로 5 × 5 × 5 × 5 = 5⁴ = 625가지입니다. 선택지 개수가 줄어들면 경우의 수도 확 줄어드는 것을 볼 수 있죠!'
      },
      {
        id: 5,
        question: '1초에 1000만 번씩 비밀번호를 시도할 때, 4자리 자물쇠(0~9) 10,000가지를 모두 시도하려면 얼마나 걸릴까요?',
        options: ['약 0.001초 (1밀리초)', '약 0.01초 (10밀리초)', '약 0.1초 (100밀리초)', '약 1초'],
        correct: 0,
        explanation: '10,000번 ÷ 10,000,000번/초 = 0.001초 = 1밀리초가 걸립니다! 1초에 1000만 번씩 시도하면 4자리 자물쇠는 순식간에 뚫려요. 자릿수가 길수록 훨씬 안전한 비밀번호가 됩니다.'
      },
      {
        id: 6,
        question: '이번 자물쇠는 같은 숫자를 두 번 이상 쓸 수 없어요. (중복 불가!) 4자리 자물쇠에서 만들 수 있는 비밀번호는 몇 가지일까요?',
        options: ['5,040가지', '7,560가지', '10,000가지', '504가지'],
        correct: 0,
        explanation: '첫째 자리 10가지 → 둘째 자리는 쓴 숫자 빼고 9가지 → 셋째 자리 8가지 → 넷째 자리 7가지. 10 × 9 × 8 × 7 = 5,040가지! 중복 허용(10,000가지)보다 훨씬 적죠? 이렇게 순서가 중요하고 중복이 없는 경우를 수학에서 "순열"이라고 불러요. 나중에 더 자세히 배울 거예요~'
      },
      {
        id: 7,
        question: '"0000"은 앞자리가 0이니까 진짜 비밀번호가 아니다. 그러므로 4자리 자물쇠의 비밀번호는 총 9,999가지다. — 맞을까요, 틀릴까요?',
        options: ['맞다. 0000은 숫자가 아니니 제외해야 한다.', '틀리다. 0000도 유효한 비밀번호이므로 10,000가지다.', '맞다. 0으로 시작하는 번호는 모두 제외한다.', '틀리다. 하지만 이유는 모르겠다.'],
        correct: 1,
        explanation: '틀렸어요! 자물쇠는 "수(number)"가 아니라 "순서 있는 기호 조합"이에요. 0000, 0001처럼 0으로 시작해도 완전히 유효한 비밀번호예요. 실제 은행 ATM도 0000을 비밀번호로 설정할 수 있답니다. 0~9 각각 10가지이므로 10,000가지 전부 유효해요!'
      }
    ];

    const LockSimulator = () => {
      const [dials, setDials] = useState([0, 0, 0, 0]);
      const [attempts, setAttempts] = useState(0);
      const [showTooltip, setShowTooltip] = useState(false);
      const [quizAnswers, setQuizAnswers] = useState({});
      const [showQuizResult, setShowQuizResult] = useState(false);

      // 비밀번호 맞추기 게임
      const generateSecret = () => Array.from({length: 4}, () => Math.floor(Math.random() * 10));
      const [secretCode, setSecretCode] = useState(() => generateSecret());
      const [gameGuess, setGameGuess] = useState([0, 0, 0, 0]);
      const [gameAttempts, setGameAttempts] = useState(0);
      const [gameSolved, setGameSolved] = useState(false);
      const [gameHistory, setGameHistory] = useState([]);
      const [gameStarted, setGameStarted] = useState(false);

      const rotateGameDial = (index, direction) => {
        const newGuess = [...gameGuess];
        newGuess[index] = (newGuess[index] + direction + 10) % 10;
        setGameGuess(newGuess);
      };

      const submitGuess = () => {
        if (!gameStarted) setGameStarted(true);
        const newAttempts = gameAttempts + 1;
        setGameAttempts(newAttempts);
        const isCorrect = gameGuess.join('') === secretCode.join('');
        const hint = gameGuess.map((d, i) => {
          if (d === secretCode[i]) return '🟩';
          else if (secretCode.includes(d)) return '🟨';
          else return '⬛';
        }).join('');
        setGameHistory(prev => [{guess: gameGuess.join(''), hint, correct: isCorrect}, ...prev]);
        if (isCorrect) setGameSolved(true);
      };

      const resetGame = () => {
        setSecretCode(generateSecret());
        setGameGuess([0, 0, 0, 0]);
        setGameAttempts(0);
        setGameSolved(false);
        setGameHistory([]);
        setGameStarted(false);
      };

      // 실시간 경우의 수 계산기
      const [calcDigits, setCalcDigits] = useState(4);
      const [calcChoices, setCalcChoices] = useState(10);
      const totalCases = Math.pow(calcChoices, calcDigits);
      const hackSeconds = totalCases / 10000000;
      const formatTime = (sec) => {
        if (sec < 60) return `${sec}초`;
        if (sec < 3600) return `${(sec/60).toFixed(1)}분`;
        if (sec < 86400) return `${(sec/3600).toFixed(1)}시간`;
        if (sec < 31536000) return `${(sec/86400).toFixed(1)}일`;
        return `${(sec/31536000).toFixed(1)}년`;
      };

      // 브루트포스 시뮬레이터
      const [bfTarget, setBfTarget] = useState(() => Math.floor(Math.random() * 10000).toString().padStart(4, '0'));
      const [bfRunning, setBfRunning] = useState(false);
      const [bfCurrent, setBfCurrent] = useState('0000');
      const [bfFound, setBfFound] = useState(false);
      const [bfCount, setBfCount] = useState(0);
      const [bfSpeed, setBfSpeed] = useState(3);
      const bfRef = React.useRef(null);
      const bfCounterRef = React.useRef(0);

      // 속도 단계별 배치 크기 & 딜레이
      const getBatchSize = (spd) => spd === 1 ? 1000 : spd === 2 ? 200 : spd === 3 ? 30 : 1;
      const getDelay    = (spd) => spd === 1 ? 16   : spd === 2 ? 16  : spd === 3 ? 30  : 150;
      const speedLabel  = ['', '🚀 초고속', '⚡ 빠름', '🐇 보통', '🐢 느림'];

      const startBruteForce = () => {
        setBfCurrent('0000');
        setBfFound(false);
        setBfCount(0);
        bfCounterRef.current = 0;
        setBfRunning(true);
      };

      const stopBruteForce = () => {
        setBfRunning(false);
        if (bfRef.current) clearTimeout(bfRef.current);
      };

      const resetBruteForce = () => {
        stopBruteForce();
        const newTarget = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        setBfTarget(newTarget);
        setBfCurrent('0000');
        setBfFound(false);
        setBfCount(0);
        bfCounterRef.current = 0;
      };

      React.useEffect(() => {
        if (!bfRunning) return;
        const batchSize = getBatchSize(bfSpeed);
        const delay     = getDelay(bfSpeed);
        const step = () => {
          let cur = bfCounterRef.current;
          let found = false;
          let lastStr = cur.toString().padStart(4, '0');
          for (let i = 0; i < batchSize; i++) {
            const curStr = cur.toString().padStart(4, '0');
            lastStr = curStr;
            if (curStr === bfTarget) { found = true; cur++; break; }
            cur++;
            if (cur > 9999) break;
          }
          bfCounterRef.current = cur;
          setBfCurrent(lastStr);
          setBfCount(cur);
          if (found) { setBfFound(true); setBfRunning(false); return; }
          if (cur > 9999) { setBfRunning(false); return; }
          bfRef.current = setTimeout(step, delay);
        };
        bfRef.current = setTimeout(step, delay);
        return () => clearTimeout(bfRef.current);
      }, [bfRunning, bfTarget, bfSpeed]);

      const handleQuizAnswer = (questionId, selectedOption) => {
        setQuizAnswers(prev => ({...prev, [questionId]: selectedOption}));
      };
      const calculateScore = () => quizData.filter(q => quizAnswers[q.id] === q.correct).length;
      const resetQuiz = () => { setQuizAnswers({}); setShowQuizResult(false); };

      const rotateDial = (index, direction) => {
        const newDials = [...dials];
        newDials[index] = (newDials[index] + direction + 10) % 10;
        setDials(newDials);
        setAttempts(prev => prev + 1);
      };

      const resetLock = () => {
        setDials([0, 0, 0, 0]);
        setAttempts(0);
      };
      const handleTooltipClick = () => {
        setShowTooltip(true);
        setTimeout(() => {
          setShowTooltip(false);
        }, 500);
      };

      return (
        <div className="max-w-7xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
          {/* 헤더 */}
          <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white">
            <div className="flex justify-between items-center mb-2">
              <div className="text-sm text-indigo-100">고등학교 정보 학습자료</div>
              <a 
                href="index.html" 
                className="bg-white text-indigo-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-indigo-50 transition-all shadow-md hover:shadow-lg flex items-center gap-2"
              >
                🏠 홈으로
              </a>
            </div>
            <h1 className="text-3xl font-bold mb-2">🔐 자물쇠로 배우는 경우의 수</h1>
            <p className="text-indigo-100">화살표를 클릭해서 자물쇠를 돌려보세요!</p>
          </div>

          {/* 질문 영역 */}
          <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 border-b border-indigo-100">
            <div className="space-y-3 text-gray-700">
              <div>
                <h3 className="font-bold text-indigo-900 text-lg mb-2">📌 자물쇠의 비밀번호는 몇 개일까?</h3>
                <p className="leading-relaxed">
                  아래 그림처럼 4자리 숫자 자물쇠가 있습니다. 각 자리마다 <span className="font-bold text-blue-600">0부터 9까지</span> 총 10개의 숫자를 선택할 수 있어요. 그렇다면 만들 수 있는 비밀번호의 개수는 총 몇 개일까요?
                </p>
              </div>
            </div>
          </div>

          <div className="p-8">
            {/* 체험 방법 안내 */}
            <div className="mb-6 bg-yellow-50 p-4 rounded-lg border border-yellow-300">
              <p className="text-base font-semibold text-yellow-900 mb-2">💡 체험 방법</p>
              <p className="text-base text-gray-700">
                <span className="font-bold text-blue-600">화살표 버튼을 클릭해서 자물쇠를 돌려보세요! </span> 
                각 다이얼은 0부터 9까지 순환하며, 모든 조합을 만들어 볼 수 있습니다.
              </p>
            </div>

            {/* 자물쇠 시뮬레이터 */}
            <div className="bg-gray-50 p-8 rounded-lg border border-gray-200 mb-6">
              <div className="flex justify-center items-center gap-8 flex-wrap">
                {/* 왼쪽 몸통 */}
                <div className="w-20 h-44 bg-gradient-to-r from-gray-600 to-gray-700 rounded-l-3xl border-4 border-gray-800 shadow-xl"></div>

                {/* 다이얼 영역 */}
                <div className="flex gap-4">
                  {dials.map((dial, idx) => (
                    <div key={idx} className="flex flex-col items-center gap-2">
                      <button 
                        onClick={() => rotateDial(idx, 1)}
                        className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-lg flex items-center justify-center text-xl font-bold shadow-lg hover:scale-110 transition-transform"
                      >
                        ▲
                      </button>
                      <div className="w-16 h-28 bg-gradient-to-b from-gray-900 to-black rounded-xl border-2 border-gray-600 shadow-inner flex items-center justify-center">
                        <span className="text-white text-5xl font-bold">{dial}</span>
                      </div>
                      <button 
                        onClick={() => rotateDial(idx, -1)}
                        className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-lg flex items-center justify-center text-xl font-bold shadow-lg hover:scale-110 transition-transform"
                      >
                        ▼
                      </button>
                      <div className="text-base font-bold text-indigo-600 mt-1">
                        {['첫째', '둘째', '셋째', '넷째'][idx]}
                      </div>
                    </div>
                  ))}
                </div>

                {/* 오른쪽 U자형 막대 */}                
                <div className="relative ml-24">
                  <div className="w-20 h-44 bg-gradient-to-l from-gray-600 to-gray-700 rounded-r-3xl border-4 border-gray-800 shadow-xl"></div>
                  <div className="absolute right-20 top-1/2 translate-x-[4px] -translate-y-1/2 w-32 h-9 bg-gradient-to-r from-gray-700 to-gray-500 border-4 border-gray-800 shadow-xl"></div>
                  <div className="absolute right-20 top-1/2 -translate-y-[26px] -translate-x-16 w-6 h-8 bg-gradient-to-b from-gray-500 to-gray-700 border-4 border-gray-800 rounded-t-md -mt-5"></div>
                </div>
              </div>

              {/* 현재 상태 표시 */}
              <div className="mt-8 bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-6 rounded-xl text-center">
                <div className="text-lg mb-2">현재 번호</div>
                <div className="text-5xl font-bold tracking-widest mb-3">{dials.join('')}</div>
                <div className="text-base opacity-90">
                  시도 횟수: <span className="font-bold">{attempts}</span>회 / 전체 10,000가지
                </div>
              </div>

              {/* 리셋 버튼 */}
              <div className="text-center mt-6">
                <button 
                  onClick={resetLock}
                  className="bg-gray-600 hover:bg-gray-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition-transform"
                >
                  🔄 초기화
                </button>
              </div>
            </div>

            {/* 경우의 수 계산 설명 */}
            <div className="bg-gradient-to-r from-indigo-50 to-blue-50 p-6 rounded-lg border border-indigo-200 mb-6">
              <h3 className="text-xl font-bold text-indigo-900 mb-4">📊 경우의 수 계산하기</h3>
              <p className="text-gray-700 mb-4">각 자리마다 <span className="font-bold text-indigo-600">0부터 9까지</span> 10가지 선택 가능</p>
              
              <div className="bg-yellow-50 border-3 border-dashed border-yellow-400 p-6 rounded-xl text-center">
                <h4 className="text-lg font-bold text-gray-800 mb-3">💡 곱셈 원리 공식</h4>
                <div className="text-4xl font-bold text-red-600 my-4">10 × 10 × 10 × 10 = 10⁴</div>
                <div className="text-3xl font-bold text-indigo-600 mb-3">= 10,000가지</div>
                <p className="text-gray-600">10을 4번 곱한다 = 만 가지의 경우의 수</p>
              </div>
            </div>

            {/* 자릿수별 경우의 수 */}
            <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-6 rounded-lg border border-indigo-200 mb-6">
              <h3 className="text-xl font-bold text-indigo-900 mb-4">
                <span 
                  className="relative inline-block cursor-pointer"
                  onClick={handleTooltipClick}
                >
                  🎯
                  {showTooltip && (
                    <span 
                      className="absolute left-1/2 -translate-x-1/2 -top-16 
                                 bg-pink-200 text-gray-900 px-3 py-1 rounded-xl 
                                 text-sm font-bold whitespace-nowrap shadow-2xl z-50"
                      style={{
                        animation: 'bounceOnce 0.4s ease-in-out'
                      }}
                    >
                      {"\uCC38\uC0C8"}
                    </span>
                  )}
                </span>
                {' '}자릿수별 경우의 수
              </h3>
              <div className="grid md:grid-cols-2 gap-4">
                <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-indigo-500">
                  <div className="flex justify-between items-center">
                    <span className="font-bold text-indigo-700">1자리 자물쇠</span>
                    <span className="font-mono text-indigo-600 font-bold">10¹ = 10가지 (0~9)</span>
                  </div>
                </div>
                <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-green-500">
                  <div className="flex justify-between items-center">
                    <span className="font-bold text-green-700">2자리 자물쇠</span>
                    <span className="font-mono text-green-600 font-bold">10² = 100가지 (00~99)</span>
                  </div>
                </div>
                <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-orange-500">
                  <div className="flex justify-between items-center">
                    <span className="font-bold text-orange-700">3자리 자물쇠</span>
                    <span className="font-mono text-orange-600 font-bold">10³ = 1,000가지 (000~999)</span>
                  </div>
                </div>
                <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-purple-500">
                  <div className="flex justify-between items-center">
                    <span className="font-bold text-purple-700">4자리 자물쇠</span>
                    <span className="font-mono text-purple-600 font-bold">10⁴ = 10,000가지 (0000~9999)</span>
                  </div>
                </div>
              </div>
            </div>

            {/* 왜 곱셈인가 */}
            <div className="bg-gradient-to-r from-purple-50 to-pink-50 p-6 rounded-lg border border-purple-200 mb-6">
              <h3 className="text-xl font-bold text-purple-900 mb-4">🤔 왜 곱셈을 할까?</h3>
              <div className="space-y-3 text-gray-700">
                <div className="flex items-start gap-3">
                  <div className="w-8 h-8 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0">1</div>
                  <p><strong>첫째 자리</strong>에서 숫자를 하나 선택하면 (예: 3)</p>
                </div>

                      </div>
                      {quizAnswers[quiz.id] !== undefined && (
                        <div className="mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-200">
                          <p className="text-base text-gray-700">
                            <span className="font-bold text-indigo-600">설명: </span>{quiz.explanation}
                          </p>
                        </div>
                      )}
                    </div>
                  ))}

                  {Object.keys(quizAnswers).length === quizData.length && (
                    <div className="flex justify-center">
                      <button
                        onClick={() => setShowQuizResult(true)}
                        className="w-48 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg text-lg"
                      >
                        🏁 결과 확인하기
                      </button>
                    </div>
                  )}
                </div>
              ) : (
                <div className="text-center">
                  <div className="bg-gradient-to-r from-green-50 to-emerald-50 p-8 rounded-xl border border-green-200 mb-6">
                    <h3 className="text-3xl font-bold text-green-900 mb-4">🎉 퀴즈 완료!</h3>
                    <div className="text-6xl font-bold text-indigo-600 mb-4">
                      {calculateScore()} / {quizData.length}
                    </div>
                    <p className="text-lg text-gray-700">
                      {calculateScore() === quizData.length
                        ? '완벽해요! 모든 문제를 맞히셨네요! 🎊'
                        : calculateScore() >= quizData.length * 0.7
                        ? '잘하셨어요! 조금만 더 복습하면 완벽할 거예요! 👍'
                        : '다시 한 번 복습해보세요! 💪'}
                    </p>
                  </div>

                  <div className="text-left space-y-3 mb-6">
                    {quizData.filter(q => quizAnswers[q.id] !== q.correct).map(q => (
                      <div key={q.id} className="bg-red-50 p-4 rounded-lg border border-red-200">
                        <p className="font-bold text-red-700 text-base mb-1">❌ 틀린 문제: {q.question}</p>
                        <p className="text-base text-gray-700">
                          <span className="font-bold text-green-600">정답: </span>{q.options[q.correct]}
                        </p>
                        <p className="text-base text-gray-600 mt-1">{q.explanation}</p>
                      </div>
                    ))}
                  </div>

                  <button
                    onClick={resetQuiz}
                    className="w-48 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg"
                  >
                    🔄 다시 풀기
                  </button>
                </div>
              )}
            </div>

            {/* 더 공부하고 싶다면 */}
            <div className="bg-gradient-to-r from-indigo-50 to-blue-50 p-6 rounded-lg border border-indigo-200 mt-6">
              <h3 className="text-xl font-bold text-indigo-900 mb-4">📚 더 공부하고 싶다면?</h3>
              <div className="grid md:grid-cols-2 gap-4">
                <div className="bg-white p-4 rounded-lg border-l-4 border-indigo-500 shadow-sm">
                  <p className="font-bold text-indigo-700 mb-2">🔢 순열 (Permutation)</p>
                  <p className="text-gray-700 text-base leading-relaxed">오늘 Q6처럼 <strong>순서가 중요하고 중복이 없는</strong> 경우를 "순열"이라고 해요. 10 × 9 × 8 × 7처럼 하나씩 줄어드는 방식이죠. 다음 단원에서 자세히 배울 거예요!</p>
                </div>
                <div className="bg-white p-4 rounded-lg border-l-4 border-green-500 shadow-sm">
                  <p className="font-bold text-green-700 mb-2">🎲 조합 (Combination)</p>
                  <p className="text-gray-700 text-base leading-relaxed">"1, 2, 3을 뽑는데 순서가 달라도 같다고 칠 때"처럼 <strong>순서가 중요하지 않은</strong> 경우를 "조합"이라고 해요. 순열보다 경우의 수가 더 적어져요!</p>
                </div>
              </div>
              <div className="mt-4 p-4 bg-indigo-100 rounded-lg">
                <p className="text-center text-indigo-800 font-semibold">
                  오늘 배운 것 (중복 허용) → 순열 (중복 없음, 순서 중요) → 조합 (순서도 중요하지 않음)
                </p>
                <p className="text-center text-indigo-600 text-base mt-1">이 순서로 배워나가면 경우의 수 단원 완성! 🎯</p>
              </div>
            </div>

            <div className="mt-6 text-center">
              <a 
                href="index.html" 
                className="inline-block bg-gradient-to-r from-indigo-600 to-purple-600 text-white w-64 py-3 rounded-lg font-bold text-lg hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg hover:shadow-xl"
              >
                🏠 홈으로 돌아가기
              </a>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LockSimulator />);
  </script>
</body>
</html>
