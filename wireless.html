<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>무선 네트워크 기술 — 체험형 학습</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
      margin: 0;
      padding: 20px;
    }
    @keyframes bounceOnce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .slide-in { animation: slideIn 0.5s ease-out; }
    .anim-float { animation: float 2s ease-in-out infinite; }
    .anim-pulse { animation: pulse 1.2s ease-in-out infinite; }
    .anim-spin  { animation: spin 1s linear infinite; }
    .anim-slide { animation: slideIn 0.35s ease; }
    .anim-fade  { animation: slideIn 0.4s ease; }

    /* 섹션 숨김/표시 */
    .section-panel { display: none; }
    .section-panel.active { display: block; }

    /* 퀴즈 옵션 버튼 */
    .quiz-opt {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #e5e7eb; background: #f9fafb;
      color: #374151; cursor: pointer; transition: all 0.15s;
      text-align: left; font-family: inherit; font-weight: 700; font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .quiz-opt:hover:not(.locked) { border-color: #0d9488; background: #f0fdfa; }
    .quiz-opt.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .quiz-opt.wrong   { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .quiz-opt.locked  { cursor: default; }

    /* 드래그&드롭 */
    .drag-card {
      padding: 10px 16px; border-radius: 10px; cursor: grab;
      border: 2px solid #e5e7eb; background: white;
      font-weight: 700; font-size: 0.88rem; text-align: center;
      transition: all 0.15s; user-select: none; color: #374151;
    }
    .drag-card:hover { border-color: #0d9488; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,148,136,0.2); }
    .drag-card.dragging { opacity: 0.4; cursor: grabbing; }
    .drop-zone {
      min-height: 50px; border-radius: 10px;
      border: 2px dashed #d1d5db;
      background: #f9fafb;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; padding: 8px;
    }
    .drop-zone.drag-over { border-color: #0d9488; background: #f0fdfa; }
    .drop-zone.correct   { border-color: #10b981; background: #d1fae5; }
    .drop-zone.wrong     { border-color: #ef4444; background: #fee2e2; }

    /* 스마트홈 방 */
    .home-room {
      border: 2px solid #e5e7eb; border-radius: 12px;
      padding: 14px; cursor: pointer; transition: all 0.2s; min-height: 90px;
      background: white; position: relative;
    }
    .home-room:hover { border-color: #0d9488; }
    .home-room.selected { border-color: #0d9488; background: #f0fdfa; }
    .home-room.placed { border-color: #10b981; background: #d1fae5; }

    /* 진행 바 */
    .progress-bar-bg { background: #e5e7eb; border-radius: 999px; height: 8px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }

    /* 툴팁 */
    .tooltip {
      position: fixed;
      background-color: #000011;
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 10pt;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  /* ─── 공통 팝업 ─── */
  function Popup({ popup, onClose }) {
    if (!popup) return null;
    const ok = popup.type === 'success';
    return (
      <div className="fixed inset-0 z-50 bg-black bg-opacity-60 flex items-center justify-center" onClick={onClose}>
        <div className="bg-white rounded-2xl p-8 text-center max-w-xs w-full mx-4 shadow-2xl" onClick={e => e.stopPropagation()}
          style={{animation:'slideIn 0.3s ease'}}>
          <div className="text-5xl mb-3">{ok ? '🎉' : '💡'}</div>
          <h2 className={`text-xl font-bold mb-2 ${ok ? 'text-emerald-600' : 'text-yellow-600'}`}>
            {ok ? '성공!' : '아쉬워요!'}
          </h2>
          <p className="text-gray-600 mb-4 text-sm leading-relaxed">{popup.message}</p>
          {ok && (
            <div className="bg-gradient-to-r from-yellow-400 to-amber-500 text-white rounded-xl px-4 py-2 font-bold mb-4">
              +{popup.points} 포인트! 🌟
            </div>
          )}
          {!ok && popup.hint && (
            <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-sm text-yellow-800 mb-4 text-left">
              💡 힌트: {popup.hint}
            </div>
          )}
          <button className="bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-bold px-6 py-2 rounded-lg"
            onClick={onClose}>확인</button>
        </div>
      </div>
    );
  }

  /* ─── AP 네트워크 빌더 ─── */
  function APLab({ onEarn }) {
    const canvasRef = useRef(null);
    const [aps, setAps] = useState([]);
    const [devices, setDevices] = useState([]);
    const [mode, setMode] = useState('ap');
    const [rangeVal, setRangeVal] = useState(80);
    const [stats, setStats] = useState({connected:0,total:0,coverage:0});
    const [scored, setScored] = useState(false);
    const idRef = useRef(0);
    const W=560, H=320;

    const draw = useCallback(() => {
      const cv = canvasRef.current; if(!cv) return;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#f0fdfa'; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(13,148,136,0.1)'; ctx.lineWidth=1;
      for(let x=40;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=40;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      const rooms=[{x:20,y:20,w:160,h:120,label:'교실 1'},{x:200,y:20,w:160,h:120,label:'교실 2'},
        {x:380,y:20,w:160,h:120,label:'교실 3'},{x:20,y:160,w:520,h:130,label:'복도 & 도서관'}];
      rooms.forEach(r=>{
        ctx.fillStyle='rgba(204,251,241,0.8)'; ctx.strokeStyle='rgba(13,148,136,0.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(r.x,r.y,r.w,r.h,6);}else{ctx.rect(r.x,r.y,r.w,r.h);}
        ctx.fill(); ctx.stroke();
        ctx.fillStyle='rgba(15,118,110,0.9)'; ctx.font='bold 11px Malgun Gothic';
        ctx.fillText(r.label,r.x+8,r.y+16);
      });
      aps.forEach(ap=>{
        const grad=ctx.createRadialGradient(ap.x,ap.y,0,ap.x,ap.y,ap.range);
        grad.addColorStop(0,'rgba(13,148,136,0.25)');
        grad.addColorStop(1,'rgba(13,148,136,0)');
        ctx.beginPath(); ctx.arc(ap.x,ap.y,ap.range,0,Math.PI*2);
        ctx.fillStyle=grad; ctx.fill();
        ctx.beginPath(); ctx.arc(ap.x,ap.y,ap.range,0,Math.PI*2);
        ctx.strokeStyle='rgba(13,148,136,0.5)'; ctx.lineWidth=1.5;
        ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(ap.x,ap.y,13,0,Math.PI*2);
        ctx.fillStyle='#0d9488'; ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
        ctx.fillText('AP',ap.x,ap.y+4); ctx.textAlign='left';
        ctx.fillStyle='rgba(13,148,136,0.9)'; ctx.font='10px sans-serif';
        ctx.fillText(ap.range+'m',ap.x+ap.range-28,ap.y-4);
      });
      devices.forEach(d=>{
        const ok=aps.some(ap=>Math.hypot(d.x-ap.x,d.y-ap.y)<=ap.range);
        ctx.beginPath(); ctx.arc(d.x,d.y,9,0,Math.PI*2);
        ctx.fillStyle=ok?'#10b981':'#ef4444'; ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.textAlign='center';
        ctx.fillText(ok?'📱':'📵',d.x,d.y+3); ctx.textAlign='left';
      });
      let conn=0;
      devices.forEach(d=>{if(aps.some(ap=>Math.hypot(d.x-ap.x,d.y-ap.y)<=ap.range))conn++;});
      setStats({connected:conn,total:devices.length,coverage:aps.length});
    },[aps,devices]);

    useEffect(()=>{draw();},[draw]);

    const handleClick=(e)=>{
      const cv=canvasRef.current;
      const rect=cv.getBoundingClientRect();
      const x=(e.clientX-rect.left)*(W/rect.width);
      const y=(e.clientY-rect.top)*(H/rect.height);
      idRef.current++;
      if(mode==='ap'){
        if(aps.length>=6){alert('AP는 최대 6개까지!');return;}
        setAps(p=>[...p,{x,y,range:rangeVal,id:idRef.current}]);
      }else{
        if(devices.length>=10){alert('기기는 최대 10개까지!');return;}
        setDevices(p=>[...p,{x,y,id:idRef.current}]);
      }
    };

    const checkScore=()=>{
      if(!aps.length||!devices.length){alert('AP와 기기를 먼저 배치해주세요!');return;}
      let conn=0;
      devices.forEach(d=>{if(aps.some(ap=>Math.hypot(d.x-ap.x,d.y-ap.y)<=ap.range))conn++;});
      const rate=conn/devices.length;
      if(rate>=0.8&&!scored){
        onEarn(30,`AP ${aps.length}개로 기기 ${conn}/${devices.length}대 커버! 80% 이상 성공!`,'');
        setScored(true);
      }else if(rate<0.8){
        onEarn(0,'',`현재 ${conn}/${devices.length}대만 연결됐어요. AP 위치를 조정해서 80% 이상 커버해보세요!`);
      }else{
        alert('이미 포인트를 획득했어요! 초기화 후 다시 도전해보세요.');
      }
    };

    return (
      <div className="bg-white rounded-xl p-5 border border-teal-100 shadow-sm mt-4">
        <h4 className="font-bold text-teal-700 text-base mb-1">🗼 가상 네트워크 빌더 — 학교에 AP를 설치해보세요!</h4>
        <p className="text-sm text-gray-500 mb-3 leading-relaxed">
          📌 AP를 클릭해서 지도에 배치하고, 기기(스마트폰)도 추가해보세요.<br/>
          <span className="text-emerald-600 font-bold">초록 = 연결됨</span> / <span className="text-red-500 font-bold">빨강 = 연결 안됨</span> — 기기의 80% 이상 커버 시 포인트 획득!
        </p>
        <div className="flex flex-wrap gap-2 mb-3 items-center">
          {[['ap','🗼 AP 배치','teal'],['device','📱 기기 배치','emerald']].map(([m,l,c])=>(
            <button key={m} onClick={()=>setMode(m)}
              className={`px-3 py-1.5 rounded-lg font-bold text-sm border-2 transition-all ${mode===m?`border-${c}-500 bg-${c}-50 text-${c}-700`:'border-gray-200 bg-white text-gray-500 hover:border-teal-300'}`}>
              {l}
            </button>
          ))}
          <button onClick={()=>setAps(p=>p.slice(0,-1))}
            className="px-3 py-1.5 rounded-lg font-bold text-sm border-2 border-gray-200 bg-white text-gray-500 hover:border-red-300">↩ AP 취소</button>
          <button onClick={()=>{setAps([]);setDevices([]);setScored(false);}}
            className="px-3 py-1.5 rounded-lg font-bold text-sm border-2 border-gray-200 bg-white text-gray-500 hover:border-gray-400">🔄 초기화</button>
          <div className="ml-auto flex items-center gap-2 bg-teal-50 rounded-lg px-3 py-1.5">
            <span className="text-sm font-bold text-teal-700">범위: {rangeVal}m</span>
            <input type="range" min={40} max={160} value={rangeVal} onChange={e=>setRangeVal(+e.target.value)}
              className="w-20" style={{accentColor:'#0d9488'}}/>
          </div>
        </div>
        <div onClick={handleClick} className="border-2 border-teal-200 rounded-xl overflow-hidden cursor-crosshair">
          <canvas ref={canvasRef} width={W} height={H} style={{display:'block',width:'100%',maxWidth:W}}/>
        </div>
        <div className="mt-3 flex flex-wrap gap-2 items-center">
          <span className="bg-teal-50 border border-teal-200 rounded-lg px-3 py-1.5 text-sm font-bold text-teal-700">📡 AP: {stats.coverage}개</span>
          <span className="bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-1.5 text-sm font-bold text-emerald-700">📱 기기: {stats.total}대 중 {stats.connected}대 연결</span>
          <button onClick={checkScore} className="ml-auto bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-bold px-4 py-1.5 rounded-lg text-sm">✅ 커버리지 확인</button>
        </div>
        <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
          <p className="text-sm font-bold text-yellow-800 mb-1">🏫 오프라인 연계</p>
          <p className="text-sm text-gray-600">학교 복도·교실 천장에 설치된 AP(원반 모양 장치)를 찾아보세요! 스마트폰 Wi-Fi 설정에서 연결된 AP 이름(SSID)을 확인하고, 교실마다 다른지 비교해보세요.</p>
        </div>
      </div>
    );
  }

  /* ─── Wi-Fi 속도 시뮬레이터 ─── */
  function WiFiLab({ onEarn }) {
    const [dist,setDist]=useState(10);
    const [obs,setObs]=useState('없음');
    const [act,setAct]=useState(null);
    const [loading,setLoading]=useState(false);
    const [result,setResult]=useState(null);
    const [scored,setScored]=useState(false);
    const obsMap={'없음':1,'벽 1개':0.6,'벽 2개':0.3,'콘크리트':0.1};
    const calcSpeed=()=>Math.round(Math.max(0.1,100*(1-dist/120))*obsMap[obs]*10)/10;
    const simulate=(a)=>{
      setAct(a);setLoading(true);setResult(null);
      const spd=calcSpeed();
      const sizes={'유튜브 보기':50,'파일 다운로드':500,'사진 업로드':30};
      const t=(sizes[a]/spd).toFixed(1);
      setTimeout(()=>{setLoading(false);setResult({spd,t,a});
        if(!scored){onEarn(20,`Wi-Fi 속도 실험 완료! ${spd}Mbps — 거리와 장애물에 따라 얼마나 달라지는지 느꼈나요?`,'');setScored(true);}
      },1500);
    };
    const spd=calcSpeed();
    const bars=Math.max(1,Math.round((spd/100)*4));
    const barColor=spd>50?'#10b981':spd>15?'#f59e0b':'#ef4444';
    return (
      <div className="bg-white rounded-xl p-5 border border-teal-100 shadow-sm mt-4">
        <h4 className="font-bold text-cyan-600 text-base mb-1">📶 Wi-Fi 속도 테스트 시뮬레이터</h4>
        <p className="text-sm text-gray-500 mb-4 leading-relaxed">거리와 장애물을 바꿔가며 Wi-Fi 속도가 어떻게 변하는지 실험해보세요!</p>
        <div className="grid grid-cols-2 gap-3 mb-4">
          <div className="bg-cyan-50 rounded-xl p-3 border border-cyan-100">
            <p className="font-bold text-cyan-700 mb-2 text-sm">📏 AP와의 거리: <strong>{dist}m</strong></p>
            <input type="range" min={1} max={100} value={dist} onChange={e=>{setDist(+e.target.value);setResult(null);}} className="w-full" style={{accentColor:'#0891b2'}}/>
            <div className="flex justify-between text-xs text-gray-400 mt-1"><span>1m</span><span>100m</span></div>
          </div>
          <div className="bg-amber-50 rounded-xl p-3 border border-amber-100">
            <p className="font-bold text-amber-700 mb-2 text-sm">🧱 장애물</p>
            <div className="flex flex-col gap-1.5">
              {Object.keys(obsMap).map(o=>(
                <button key={o} onClick={()=>{setObs(o);setResult(null);}}
                  className={`px-2 py-1 rounded-lg text-left text-xs font-bold transition-all border ${obs===o?'border-amber-400 bg-amber-100 text-amber-800':'border-gray-200 bg-white text-gray-500'}`}>
                  {obs===o?'✅ ':''}{o}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div className="bg-gray-50 rounded-xl p-4 mb-4 border border-gray-200">
          <p className="font-bold text-gray-700 mb-3 text-sm">📡 현재 예상 속도</p>
          <div className="flex items-end gap-1 h-8 mb-2">
            {[1,2,3,4].map(i=>(
              <div key={i} className="flex-1 rounded" style={{background:i<=bars?barColor:'#e5e7eb',height:`${25+i*10}%`,transition:'all 0.4s'}}/>
            ))}
            <span className="ml-2 font-bold text-lg" style={{color:barColor}}>{spd} Mbps</span>
          </div>
          <p className="text-sm text-gray-500">
            {spd>50?'🟢 빠름 — 4K 영상도 문제없어요!':spd>15?'🟡 보통 — 유튜브는 가능해요':'🔴 느림 — 버퍼링이 생길 수 있어요'}
          </p>
        </div>
        <div className="flex gap-2 flex-wrap mb-3">
          {['유튜브 보기','파일 다운로드','사진 업로드'].map(a=>(
            <button key={a} onClick={()=>simulate(a)} disabled={loading}
              className={`px-3 py-1.5 rounded-lg font-bold text-sm border-2 transition-all ${act===a?'border-cyan-500 bg-cyan-50 text-cyan-700':'border-gray-200 bg-white text-gray-500 hover:border-teal-300'}`}>
              {a==='유튜브 보기'?'▶ ':a==='파일 다운로드'?'⬇ ':'⬆ '}{a}
            </button>
          ))}
        </div>
        {loading&&<div className="text-center py-4"><span className="text-2xl" style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⏳</span><p className="text-gray-400 mt-1 text-sm">로딩 중...</p></div>}
        {result&&!loading&&(
          <div className={`rounded-xl p-4 border ${result.spd>15?'bg-emerald-50 border-emerald-300':'bg-red-50 border-red-300'}`}>
            <p className={`font-bold mb-1 ${result.spd>15?'text-emerald-700':'text-red-600'}`}>📊 {result.a} 결과</p>
            <p className="text-sm text-gray-600">속도 <strong>{result.spd} Mbps</strong> → 소요시간 <strong>{result.t}초</strong></p>
          </div>
        )}
        <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
          <p className="text-sm font-bold text-yellow-800 mb-1">🏫 오프라인 연계</p>
          <p className="text-sm text-gray-600">스마트폰에서 <strong>Speedtest</strong> 앱을 실행하고, 교실 안·복도·교문 밖에서 각각 속도를 측정해 비교해보세요!</p>
        </div>
      </div>
    );
  }

  /* ─── 블루투스 페어링 게임 ─── */
  function BluetoothLab({ onEarn }) {
    const [phase,setPhase]=useState('idle');
    const [dist,setDist]=useState(3);
    const [song,setSong]=useState(null);
    const [scored,setScored]=useState(false);
    const [tooltip,setTooltip]=useState(null);
    const MAX=10;
    const songs=['🎵 아이유 — 좋은 날','🎵 BTS — Dynamite','🎵 NewJeans — Hype Boy'];
    const bars=Math.max(0,Math.round((1-dist/MAX)*4));
    const changeDist=(d)=>{setDist(d);if(phase==='playing'&&d>MAX)setPhase('disconnected');};
    useEffect(()=>{if(phase==='scanning'){const t=setTimeout(()=>setPhase('found'),1500);return()=>clearTimeout(t);}},[phase]);
    const showTooltip=(e)=>{
      setTooltip({x:e.clientX, y:e.clientY});
      setTimeout(()=>setTooltip(null), 1800);
    };
    return (
      <div className="bg-white rounded-xl p-5 border border-teal-100 shadow-sm mt-4">
        {tooltip&&(

  /* ─── RFID 태그 스캐너 ─── */
  function RFIDLab({ onEarn }) {
    const [tags,setTags]=useState([
      {id:1,name:'📚 소설 — 어린왕자',type:'도서',scanned:false},
      {id:2,name:'📖 만화 — 원피스 1권',type:'도서',scanned:false},
      {id:3,name:'🐕 반려동물 칩',type:'동물',scanned:false},
      {id:4,name:'🚗 하이패스 태그',type:'교통',scanned:false},
      {id:5,name:'👕 의류 방범 태그',type:'쇼핑',scanned:false},
    ]);
    const [log,setLog]=useState([]);
    const [active,setActive]=useState(false);
    const [scored,setScored]=useState(false);
    const typeColors={도서:'#0891b2',동물:'#10b981',교통:'#f59e0b',쇼핑:'#ec4899'};
    const scan=(tag)=>{
      if(tag.scanned)return;
      setTags(p=>p.map(t=>t.id===tag.id?{...t,scanned:true}:t));
      setLog(p=>[{name:tag.name,time:new Date().toLocaleTimeString('ko-KR')},...p]);
      setActive(true); setTimeout(()=>setActive(false),600);
      const n=tags.filter(t=>t.scanned).length+1;
      if(!scored&&n>=3){onEarn(20,`RFID 태그 ${n}개 스캔 완료! 전파로 태그를 자동 인식하는 원리를 이해했어요! 💳`,'');setScored(true);}
    };
    const batchScan=()=>{
      const un=tags.filter(t=>!t.scanned);
      un.forEach((t,i)=>setTimeout(()=>{
        setTags(p=>p.map(x=>x.id===t.id?{...x,scanned:true}:x));
        setLog(p=>[{name:t.name,time:new Date().toLocaleTimeString('ko-KR')},...p]);
        setActive(true); setTimeout(()=>setActive(false),400);
      },i*400));
      if(!scored)setTimeout(()=>{onEarn(25,'일괄 스캔 완료! RFID는 여러 태그를 동시에 인식할 수 있어요! ⚡','');setScored(true);},un.length*400+100);
    };
    return (
      <div className="bg-white rounded-xl p-5 border border-teal-100 shadow-sm mt-4">
        <h4 className="font-bold text-emerald-600 text-base mb-1">💳 RFID 태그 스캐너 시뮬레이션</h4>
        <p className="text-sm text-gray-500 mb-4 leading-relaxed">태그를 클릭해서 리더기에 스캔하거나, 일괄 스캔으로 여러 개를 한 번에 인식해보세요!</p>
        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <p className="font-bold text-emerald-700 mb-2 text-sm">📦 태그 목록</p>
            {tags.map(t=>(
              <button key={t.id} onClick={()=>scan(t)} disabled={t.scanned}
                className={`w-full mb-1.5 px-3 py-2 rounded-lg border-2 text-left text-sm font-bold flex items-center gap-2 transition-all ${t.scanned?'border-emerald-200 bg-emerald-50 text-gray-400 cursor-default':'border-gray-200 bg-white text-gray-700 hover:border-emerald-300 cursor-pointer'}`}>
                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:t.scanned?'#10b981':typeColors[t.type]}}/>
                <span className="flex-1 text-xs">{t.name}</span>
                {t.scanned&&<span className="text-emerald-500">✅</span>}
              </button>
            ))}
          </div>
          <div>
            <p className="font-bold text-emerald-700 mb-2 text-sm">📡 리더기</p>
            <div className={`rounded-xl p-4 text-center mb-3 transition-all border-2 ${active?'bg-emerald-50 border-emerald-400':'bg-gray-50 border-gray-200'}`} style={{minHeight:70}}>
              <span className="text-2xl">{active?'📡':'🔲'}</span>
              <p className={`text-xs font-bold mt-1 ${active?'text-emerald-600':'text-gray-400'}`}>
                {active?'인식! ✅':`대기 중 (${tags.filter(t=>t.scanned).length}/${tags.length})`}
              </p>
            </div>
            <div className="bg-gray-50 rounded-xl p-3 max-h-32 overflow-y-auto border border-gray-200">
              <p className="text-xs font-bold text-emerald-700 mb-2">📋 스캔 로그</p>
              {log.length===0&&<p className="text-xs text-gray-400">태그를 스캔하면 기록돼요.</p>}
              {log.map((l,i)=>(
                <div key={i} className="flex justify-between text-xs py-1 border-b border-gray-100">
                  <span className="text-gray-600">{l.name}</span><span className="text-gray-400">{l.time}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="flex gap-2">
          <button onClick={batchScan} className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold py-2.5 rounded-xl text-sm">⚡ 일괄 스캔 (여러 태그 동시 인식)</button>
          <button onClick={()=>{setTags(p=>p.map(t=>({...t,scanned:false})));setLog([]);setScored(false);}} className="bg-gray-100 border border-gray-200 font-bold text-gray-600 px-3 py-2 rounded-xl">🔄</button>
        </div>
        <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
          <p className="text-sm font-bold text-yellow-800 mb-1">🏫 오프라인 연계</p>
          <p className="text-sm text-gray-600">학교 도서관에서 책 대출·반납 시 RFID 리더기를 관찰해보세요! 책 표지 안쪽의 RFID 태그 스티커도 찾아보세요.</p>
        </div>
      </div>
    );
  }

  /* ─── NFC 결제 시뮬레이터 ─── */
  function NFCLab({ onEarn }) {
    const [step,setStep]=useState('idle');
    const [dist,setDist]=useState(2);
    const [balance,setBalance]=useState(50000);
    const [cart,setCart]=useState([]);
    const [history,setHistory]=useState([]);
    const [scored,setScored]=useState(false);
    const products=[{id:1,name:'☕ 아메리카노',price:4500},{id:2,name:'🥤 오렌지 주스',price:3800},{id:3,name:'🍰 케이크',price:6500}];
    const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
    const addCart=(p)=>setCart(prev=>{const e=prev.find(c=>c.id===p.id);return e?prev.map(c=>c.id===p.id?{...c,qty:c.qty+1}:c):[...prev,{...p,qty:1}];});
    const pay=()=>{
      if(!cart.length)return;
      if(dist>10){setStep('tooFar');return;}
      setStep('tapping');
      setTimeout(()=>{
        if(balance>=total){
          setBalance(b=>b-total);
          setHistory(h=>[{items:cart.map(c=>c.name).join(', '),total,time:new Date().toLocaleTimeString('ko-KR')},...h]);
          setCart([]); setStep('success');
          if(!scored){onEarn(20,'NFC 결제 성공! 📱 단말기에 가까이 대기만 했는데 결제가 됐어요!','');setScored(true);}
        }else setStep('fail');
        setTimeout(()=>setStep('idle'),2000);
      },1200);
    };
    return (
      <div className="bg-white rounded-xl p-5 border border-teal-100 shadow-sm mt-4">
        <h4 className="font-bold text-amber-600 text-base mb-1">📱 NFC 결제 시뮬레이터</h4>
        <p className="text-sm text-gray-500 mb-4 leading-relaxed">상품을 담고 단말기에 폰을 가까이 대어 결제해보세요! (10cm 이내)</p>
        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>
            <p className="font-bold text-amber-700 mb-2 text-sm">🛍 상품 선택</p>
            {products.map(p=>(
              <button key={p.id} onClick={()=>addCart(p)}
                className="w-full mb-1.5 px-3 py-2 rounded-lg border-2 border-gray-200 bg-white flex justify-between text-sm font-bold text-gray-700 hover:border-amber-300 transition-all">
                <span>{p.name}</span><span className="text-amber-600">{p.price.toLocaleString()}원</span>
              </button>
            ))}
          </div>
          <div>
            <p className="font-bold text-amber-700 mb-2 text-sm">🧾 장바구니</p>
            <div className="bg-amber-50 rounded-xl p-3 min-h-20 mb-2 border border-amber-100">
              <p className="text-xs text-gray-500 mb-1">잔액: <strong className="text-emerald-600">{balance.toLocaleString()}원</strong></p>
              {cart.length===0&&<p className="text-xs text-gray-400">아직 비어있어요</p>}
              {cart.map(c=>(
                <div key={c.id} className="flex justify-between text-xs mb-1">
                  <span className="text-gray-700">{c.name} ×{c.qty}</span><span className="font-bold">{(c.price*c.qty).toLocaleString()}원</span>
                </div>
              ))}
              {cart.length>0&&<div className="border-t border-amber-200 mt-1 pt-1 flex justify-between font-bold text-sm">
                <span>합계</span><span className="text-amber-600">{total.toLocaleString()}원</span>
              </div>}
            </div>
            <div className="bg-amber-50 rounded-xl p-2 mb-2 border border-amber-100">
              <p className="text-xs font-bold mb-1">📏 단말기 거리: <span className={dist>10?'text-red-500':'text-emerald-600'}>{dist}cm {dist>10?'⚠️':''}</span></p>
              <input type="range" min={1} max={30} value={dist} onChange={e=>setDist(+e.target.value)} className="w-full" style={{accentColor:'#f59e0b'}}/>
            </div>
            {step==='idle'&&<button onClick={pay} disabled={!cart.length} className={`w-full font-bold py-2 rounded-xl text-sm ${cart.length?'bg-gradient-to-r from-amber-400 to-yellow-500 text-white':'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>📱 NFC 결제 (탭!)</button>}
            {step==='tapping'&&<div className="text-center py-2"><span className="text-xl" style={{animation:'pulse 1.2s ease-in-out infinite'}}>📡</span><p className="text-amber-600 font-bold text-xs mt-1">NFC 통신 중...</p></div>}
            {step==='success'&&<div className="bg-emerald-50 border border-emerald-300 rounded-xl p-2 text-center"><p className="font-bold text-emerald-600 text-sm">✅ 결제 완료!</p></div>}
            {step==='fail'&&<div className="bg-red-50 border border-red-300 rounded-xl p-2 text-center"><p className="font-bold text-red-600 text-sm">❌ 잔액 부족!</p></div>}
            {step==='tooFar'&&<div className="bg-amber-50 border border-amber-300 rounded-xl p-2 text-center"><p className="font-bold text-amber-600 text-sm">⚠️ 너무 멀어요! 10cm 이내로!</p></div>}
          </div>
        </div>
        {history.length>0&&<div className="bg-amber-50 rounded-xl p-3 border border-amber-100">
          <p className="font-bold text-amber-700 mb-2 text-sm">📋 결제 내역</p>
          {history.map((h,i)=><div key={i} className="flex justify-between text-xs py-1 border-b border-amber-100">
            <span className="text-gray-600">{h.items}</span><span className="text-amber-600 font-bold">{h.total.toLocaleString()}원</span>
          </div>)}
        </div>}
        <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
          <p className="text-sm font-bold text-yellow-800 mb-1">🏫 오프라인 연계</p>
          <p className="text-sm text-gray-600">NFC가 있는 안드로이드 폰끼리 태그해서 사진이나 연락처를 공유해보세요! (설정 → NFC → 켜기)</p>
        </div>
      </div>
    );
  }

  /* ─── 미러링 시뮬레이터 ─── */

        <p className="text-sm text-gray-500 mb-4 leading-relaxed">스마트폰 화면을 TV로 미러링하거나, 유튜브만 캐스팅해보세요!</p>
        <div className="grid grid-cols-3 gap-2 items-center mb-4">
          <div>
            <p className="font-bold text-gray-500 text-xs mb-2 text-center">📱 스마트폰</p>
            <div className="bg-gray-200 rounded-2xl p-1 border-4 border-gray-300">
              <div className="rounded-xl p-4 text-center" style={{background:cur.bg,minHeight:80}}>
                <p className="font-bold text-gray-800 text-sm m-0">{cur.text}</p>
              </div>
              <div className="grid grid-cols-2 gap-1 mt-1">
                {Object.entries(apps).map(([k,v])=>(
                  <button key={k} onClick={()=>changeApp(k)}
                    className="p-1 rounded text-xs font-bold transition-all" style={{background:phoneApp===k?'#0d9488':'#6b7280',color:'white'}}>
                    {v.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div className="text-center text-2xl" style={{color:(mode==='mirroring'||mode==='casting')?'#ec4899':'#d1d5db'}}>→</div>
          <div>
            <p className="font-bold text-gray-500 text-xs mb-2 text-center">📺 TV</p>
            <div className="bg-gray-900 rounded-lg p-1 border-4 border-gray-700">

  /* ─── 거리 비교 시각화 ─── */
  function DistanceViz() {
    const [active,setActive]=useState('wifi');
    const techs={
      ap:    {label:'🗼 AP',    dist:100, color:'#8b5cf6', unit:'m',  desc:'학교 건물 하나를 통째로 커버할 수 있어요!'},
      wifi:  {label:'📶 Wi-Fi',  dist:100, color:'#0891b2', unit:'m',  desc:'집 전체 + 정원까지 연결 가능해요!'},
      bt:    {label:'🎧 블루투스',dist:10,  color:'#7c3aed', unit:'m',  desc:'방 하나 정도의 거리예요.'},
      rfid:  {label:'💳 RFID',   dist:50,  color:'#10b981', unit:'m',  desc:'종류에 따라 cm~100m까지 다양해요!'},
      nfc:   {label:'📱 NFC',    dist:10,  color:'#f59e0b', unit:'cm', desc:'거의 붙여야 해요. 그래서 결제가 안전해요!'},
      mirror:{label:'🖥️ 미러링',  dist:100, color:'#ec4899', unit:'m',  desc:'Wi-Fi 범위 안이면 어디든 가능해요!'},
    };
    const t=techs[active];
    const maxDist=Math.max(...Object.values(techs).map(x=>x.unit==='m'?x.dist:x.dist/100));
    const relSize=t.unit==='m'?t.dist/maxDist:(t.dist/100)/maxDist;
    return (
      <div className="bg-white rounded-xl p-5 border border-teal-100 shadow-sm mt-4">
        <h4 className="font-bold text-gray-700 text-base mb-1">📏 거리 비교 시각화</h4>
        <p className="text-sm text-gray-500 mb-4">기술을 선택하면 통신 거리를 시각적으로 비교할 수 있어요!</p>
        <div className="flex flex-wrap gap-2 mb-4">
          {Object.entries(techs).map(([k,v])=>(
            <button key={k} onClick={()=>setActive(k)}
              className="px-3 py-1.5 rounded-full text-xs font-bold border-2 transition-all"
              style={{borderColor:active===k?v.color:'#e5e7eb',background:active===k?v.color+'22':'white',color:active===k?v.color:'#9ca3af'}}>
              {v.label}
            </button>
          ))}
        </div>
        <div className="bg-gradient-to-br from-teal-50 to-cyan-50 rounded-xl p-5 text-center relative overflow-hidden border border-teal-100" style={{minHeight:180}}>
          {[0.25,0.5,0.75,1].map(r=>(
            <div key={r} className="absolute rounded-full border border-teal-100"
              style={{width:`${r*90}%`,height:`${r*90}%`,top:'50%',left:'50%',transform:'translate(-50%,-50%)',transition:'all 0.6s'}}/>
          ))}
          <div className="absolute rounded-full border-2 transition-all duration-700"
            style={{width:`${relSize*90}%`,height:`${relSize*90}%`,top:'50%',left:'50%',transform:'translate(-50%,-50%)',borderColor:t.color,background:t.color+'18',boxShadow:`0 0 20px ${t.color}30`}}/>
          <div className="relative z-10 text-center" style={{marginTop:40}}>
            <div className="text-4xl mb-1">{t.label.split(' ')[0]}</div>
            <div className="font-bold text-2xl mb-1" style={{color:t.color}}>{t.dist}{t.unit}</div>
            <div className="text-sm text-gray-700 max-w-xs mx-auto">{t.desc}</div>
          </div>
        </div>
      </div>
    );
  }

      {key:'nfc',label:'📱 NFC'},{key:'mirroring',label:'🖥️ 미러링'},
    ];
    const [idx,setIdx]=useState(0);
    const [selected,setSelected]=useState(null);
    const [result,setResult]=useState(null);
    const [correctCount,setCorrectCount]=useState(0);
    const [done,setDone]=useState(false);
    const [scored,setScored]=useState(false);
    const cur=situations[idx];
    const choose=(key)=>{
      if(selected)return;
      setSelected(key);
      const ok=key===cur.correct;
      setResult(ok);
      if(ok)setCorrectCount(c=>c+1);
    };
    const next=()=>{
      if(idx<situations.length-1){setIdx(i=>i+1);setSelected(null);setResult(null);}
      else{setDone(true);if(!scored){onEarn(correctCount>=6?40:correctCount>=4?25:10,`${situations.length}문제 중 ${correctCount}개 정답! 👏`,'');setScored(true);}}
    };
    const reset=()=>{setIdx(0);setSelected(null);setResult(null);setCorrectCount(0);setDone(false);setScored(false);};
    if(done)return(
      <div className="bg-white rounded-xl p-8 text-center border border-teal-100 shadow-sm">
        <div className="text-5xl mb-3">{correctCount>=6?'🏆':correctCount>=4?'🥈':'🥉'}</div>
        <h3 className="text-xl font-bold text-gray-800 mb-2">{situations.length}문제 완료!</h3>
        <p className="text-gray-500 mb-4">총 <strong className="text-gray-800">{situations.length}</strong>문제 중 <strong className="text-emerald-600">{correctCount}</strong>개 정답</p>
        <div className="bg-gray-50 rounded-xl p-4 mb-5 border border-gray-200">
          <div className="progress-bar-bg mb-2"><div className="progress-bar-fill" style={{width:`${(correctCount/situations.length)*100}%`,background:correctCount>=6?'#10b981':correctCount>=4?'#f59e0b':'#ef4444'}}/></div>
          <p className={`font-bold ${correctCount>=6?'text-emerald-600':correctCount>=4?'text-amber-500':'text-red-500'}`}>
            {correctCount>=6?'완벽해요! 🌟':correctCount>=4?'잘 했어요! 👍':'조금 더 공부해봐요! 💪'}
          </p>
        </div>
        <button onClick={reset} className="bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-bold px-6 py-2.5 rounded-xl">🔄 다시 도전</button>
      </div>
    );
    return(
      <div>
        <div className="flex items-center gap-3 mb-4">
          <div className="flex-1 progress-bar-bg"><div className="progress-bar-fill" style={{width:`${((idx)/situations.length)*100}%`,background:'#0d9488'}}/></div>
          <span className="font-bold text-sm text-gray-500 whitespace-nowrap">{idx+1} / {situations.length}</span>
        </div>
        <div className="bg-white rounded-xl p-6 mb-4 text-center border border-gray-200 shadow-sm">
          <div className="text-5xl mb-3">{cur.emoji}</div>
          <p className="font-bold text-gray-800 text-base leading-relaxed">{cur.situation}</p>
          <p className="text-gray-400 text-sm mt-2">어떤 무선 기술이 필요할까요?</p>
        </div>
        <div className="grid grid-cols-3 gap-2 mb-4">
          {choices.map(c=>{
            let cls='bg-white border-2 border-gray-200 text-gray-700 hover:border-teal-400';
            if(selected){
              if(c.key===cur.correct) cls='bg-emerald-50 border-2 border-emerald-500 text-emerald-700';
              else if(c.key===selected&&c.key!==cur.correct) cls='bg-red-50 border-2 border-red-400 text-red-600';
            }
            return(
              <button key={c.key} onClick={()=>choose(c.key)}
                className={`py-3 px-2 rounded-xl font-bold text-sm transition-all text-center ${cls} ${selected?'cursor-default':''}`}>
                {c.label}
                {selected&&c.key===cur.correct&&<span className="block text-xs mt-1">✅ 정답!</span>}
                {selected&&c.key===selected&&c.key!==cur.correct&&<span className="block text-xs mt-1">❌ 틀렸어요</span>}
              </button>
            );
          })}
        </div>
        {selected&&(
          <div className={`rounded-xl p-4 mb-4 border-2 ${result?'bg-emerald-50 border-emerald-300':'bg-red-50 border-red-300'}`}>
            <p className={`font-bold mb-2 ${result?'text-emerald-700':'text-red-600'}`}>
              {result?'🎉 정답이에요!':'💡 아쉬워요! 정답은 '+choices.find(c=>c.key===cur.correct).label+'이에요.'}
            </p>
            <p className="text-sm text-gray-600 leading-relaxed">{cur.why}</p>
          </div>
        )}
        {selected&&<button onClick={next} className="w-full bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-bold py-3 rounded-xl">
          {idx<situations.length-1?'다음 문제 →':'결과 보기 🏆'}
        </button>}
      </div>
    );
  }

  /* ─── 드래그&드롭 게임 ─── */
  function DragDropGame({ onEarn }) {
    const problems=[
      {id:1,situation:'에어팟을 스마트폰에 연결한다',answer:'bluetooth'},
      {id:2,situation:'카페에서 노트북으로 유튜브를 본다',answer:'wifi'},
      {id:3,situation:'삼성페이로 편의점에서 결제한다',answer:'nfc'},
      {id:4,situation:'마트에서 도난 방지 태그로 물건을 보호한다',answer:'rfid'},
      {id:5,situation:'스마트폰 화면을 수업 프로젝터에 보여준다',answer:'mirroring'},
      {id:6,situation:'학교 교실에 무선 인터넷을 제공하는 장치',answer:'ap'},
    ];
    const cards=[
      {key:'ap',label:'🗼 AP'},{key:'wifi',label:'📶 Wi-Fi'},
      {key:'bluetooth',label:'🎧 블루투스'},{key:'rfid',label:'💳 RFID'},
      {key:'nfc',label:'📱 NFC'},{key:'mirroring',label:'🖥️ 미러링'},
    ];
    const [placements,setPlacements]=useState({});
    const [dragging,setDragging]=useState(null);
    const [checked,setChecked]=useState(false);
    const [scored,setScored]=useState(false);
    const usedKeys=Object.values(placements);
    const availCards=cards.filter(c=>!usedKeys.includes(c.key));
    const onDragStart=(key)=>setDragging(key);
    const onDrop=(probId)=>{
      if(!dragging)return;
      setPlacements(p=>({...p,[probId]:dragging}));
      setDragging(null);setChecked(false);
    };
    const removeFromSlot=(probId)=>{
      setPlacements(p=>{const n={...p};delete n[probId];return n;});
      setChecked(false);
    };
    const checkAll=()=>{
      setChecked(true);
      const correct=problems.filter(p=>placements[p.id]===p.answer).length;
      if(!scored){onEarn(correct*5,`드래그&드롭 완료! ${problems.length}문제 중 ${correct}개 정답! 🎯`,'');setScored(true);}
    };
    const reset=()=>{setPlacements({});setChecked(false);setScored(false);};
    const correctCount=problems.filter(p=>placements[p.id]===p.answer).length;
    return(
      <div>
        <p className="text-sm text-gray-500 mb-4 leading-relaxed">
          아래 기술 카드를 <strong>드래그</strong>해서 알맞은 상황에 놓아보세요! 모바일에서는 카드를 탭하면 선택되고, 빈칸을 탭하면 넣을 수 있어요.
        </p>
        <div className="flex flex-wrap gap-2 mb-5 p-4 bg-teal-50 rounded-xl border border-teal-100">
          <p className="w-full text-xs font-bold text-gray-500 mb-1">📦 기술 카드 (드래그하거나 탭하세요)</p>
          {availCards.map(c=>(
            <div key={c.key} draggable onDragStart={()=>onDragStart(c.key)}
              onClick={()=>setDragging(dragging===c.key?null:c.key)}
              className={`drag-card ${dragging===c.key?'border-teal-500 bg-teal-50 text-teal-700':''}`}>
              {c.label}
            </div>
          ))}
          {availCards.length===0&&<p className="text-xs text-emerald-600 font-bold">모든 카드를 배치했어요! ✅</p>}
        </div>
        <div className="flex flex-col gap-2 mb-4">
          {problems.map(p=>{
            const placed=placements[p.id];
            const card=cards.find(c=>c.key===placed);
            const isCorrect=checked&&placed===p.answer;
            const isWrong=checked&&placed&&placed!==p.answer;
            return(
              <div key={p.id} className="grid gap-2 items-center" style={{gridTemplateColumns:'1fr auto'}}>
                <div className="bg-white border border-gray-200 rounded-xl px-4 py-2.5">
                  <p className="text-sm font-bold text-gray-700">{p.id}. {p.situation}</p>
                </div>
                <div className={`drop-zone${isCorrect?' correct':isWrong?' wrong':''}`} style={{width:110,flexShrink:0}}
                  onDragOver={e=>e.preventDefault()}
                  onDrop={()=>onDrop(p.id)}
                  onClick={()=>{if(dragging&&!placed)onDrop(p.id);}}>
                  {card?(
                    <div className="flex items-center gap-1 w-full justify-center">
                      <span className={`text-xs font-bold ${isCorrect?'text-emerald-700':isWrong?'text-red-600':'text-gray-700'}`}>{card.label}</span>
                      {!checked&&<button onClick={e=>{e.stopPropagation();removeFromSlot(p.id);}} className="text-gray-400 text-xs bg-transparent border-none cursor-pointer p-0">✕</button>}
                      {isCorrect&&<span>✅</span>}
                      {isWrong&&<span>❌</span>}
                    </div>
                  ):(
                    <span className="text-xs text-gray-400">여기에 놓기</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        {checked&&(
          <div className="bg-gray-50 rounded-xl p-4 mb-4 border border-gray-200">
            <p className="font-bold text-gray-800 mb-2">{correctCount}/{problems.length}개 정답!</p>
            {problems.filter(p=>placements[p.id]!==p.answer).map(p=>(
              <p key={p.id} className="text-sm text-gray-500 mb-1">
                ❌ {p.id}번 정답: <strong className="text-amber-600">{cards.find(c=>c.key===p.answer)?.label}</strong>
              </p>
            ))}
          </div>
        )}
        <div className="flex gap-2">
          <button onClick={checkAll} disabled={Object.keys(placements).length<problems.length}
            className={`flex-1 font-bold py-2.5 rounded-xl text-sm ${Object.keys(placements).length>=problems.length?'bg-gradient-to-r from-teal-600 to-cyan-600 text-white':'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>✅ 정답 확인</button>
          <button onClick={reset} className="border-2 border-gray-200 bg-white text-gray-600 font-bold px-4 py-2.5 rounded-xl text-sm hover:border-teal-300">🔄 초기화</button>
        </div>
      </div>
    );
  }

  /* ─── 스마트홈 설계 게임 ─── */
  function SmartHomeGame({ onEarn }) {
    const rooms=[
      {id:'entrance',label:'🚪 현관',icon:'🚪',hint:'어떤 보안 기술이 어울릴까요?'},
      {id:'living',  label:'🛋 거실', icon:'🛋',hint:'TV와 스마트폰을 연결하려면?'},
      {id:'bedroom', label:'🛏 침실', icon:'🛏',hint:'이어폰으로 음악을 듣는 공간'},
      {id:'study',   label:'📚 서재', icon:'📚',hint:'인터넷이 빠르게 필요한 공간'},
      {id:'kitchen', label:'🍳 주방', icon:'🍳',hint:'스마트 가전과 자동 연결'},
    ];
    const techs=[
      {key:'nfc',    label:'📱 NFC',       desc:'현관 도어락에 딱! 폰을 대면 자동으로 잠금 해제!'},
      {key:'mirroring',label:'🖥️ 미러링',  desc:'스마트폰 화면을 TV로! 유튜브, 사진 크게 보기!'},
      {key:'bluetooth',label:'🎧 블루투스', desc:'무선 이어폰, 스피커 연결! 배터리도 오래가요!'},
      {key:'ap',     label:'🗼 AP/Wi-Fi',  desc:'빠른 인터넷이 필요한 곳엔 AP를 설치해요!'},
      {key:'rfid',   label:'💳 RFID',      desc:'가전제품 자동 인식! 스마트홈의 숨은 주역!'},
    ];
    const bestMatch={entrance:'nfc',living:'mirroring',bedroom:'bluetooth',study:'ap',kitchen:'rfid'};
    const [placements,setPlacements]=useState({});
    const [selected,setSelected]=useState(null);
    const [feedback,setFeedback]=useState({});
    const [scored,setScored]=useState(false);
    const placeInRoom=(roomId)=>{
      if(!selected)return;
      const prev={...placements,[roomId]:selected};
      setPlacements(prev);
      const isBest=selected===bestMatch[roomId];
      const tech=techs.find(t=>t.key===selected);
      setFeedback(f=>({...f,[roomId]:{key:selected,label:tech.label,desc:tech.desc,best:isBest}}));
      setSelected(null);
      const correct=Object.entries(prev).filter(([r,k])=>bestMatch[r]===k).length;
      if(!scored&&correct>=3){onEarn(30,`스마트홈 설계 완료! ${Object.keys(prev).length}개 방에 기술을 배치했어요! 🏠`,'');setScored(true);}
    };
    const reset=()=>{setPlacements({});setFeedback({});setSelected(null);setScored(false);};
    return(
      <div>
        <p className="text-sm text-gray-500 mb-4 leading-relaxed">기술 카드를 선택하고 방을 클릭해서 배치하세요! 방마다 가장 잘 어울리는 기술이 있어요.</p>
        <div className="flex flex-wrap gap-2 mb-4 p-4 bg-teal-50 rounded-xl border border-teal-100">
          <p className="w-full text-xs font-bold text-gray-500 mb-1">🔧 기술 선택 (클릭해서 선택 후 방에 배치)</p>
          {techs.map(t=>(
            <button key={t.key} onClick={()=>setSelected(selected===t.key?null:t.key)}
              className={`px-4 py-2 rounded-xl font-bold text-sm border-2 transition-all ${selected===t.key?'border-teal-500 bg-teal-100 text-teal-700':'border-gray-200 bg-white text-gray-600 hover:border-teal-300'}`}>
              {t.label}
            </button>
          ))}
        </div>
        {selected&&<div className="bg-teal-50 border border-teal-300 rounded-xl px-4 py-2 mb-4 text-sm font-bold text-teal-700">
          {techs.find(t=>t.key===selected).label} 선택됨 → 배치할 방을 클릭하세요!
        </div>}
        <div className="grid grid-cols-2 gap-3 mb-4">
          {rooms.map(r=>{
            const fb=feedback[r.id];
            return(
              <div key={r.id} className={`home-room${selected?' selected':''}${fb?' placed':''}`}
                onClick={()=>placeInRoom(r.id)}
                style={{cursor:selected?'pointer':'default'}}>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-2xl">{r.icon}</span>
                  <span className="font-bold text-sm text-gray-800">{r.label}</span>
                  {fb&&<span className="ml-auto text-xs">{fb.best?'⭐ 최적!':'👍 OK'}</span>}
                </div>
                {!fb&&<p className="text-xs text-gray-400">{r.hint}</p>}
                {fb&&(<div>
                  <p className={`font-bold text-xs mb-1 ${fb.best?'text-emerald-600':'text-amber-500'}`}>{fb.label}</p>
                  <p className="text-xs text-gray-500 leading-relaxed">{fb.desc}</p>
                </div>)}
              </div>
            );
          })}
        </div>
        <div className="flex gap-2">
          <button onClick={reset} className="border-2 border-gray-200 bg-white text-gray-600 font-bold px-4 py-2 rounded-xl text-sm hover:border-red-300">🔄 초기화</button>
          {Object.keys(placements).length>0&&(
            <div className="flex-1 bg-teal-50 rounded-xl px-4 py-2 text-sm text-teal-700 flex items-center border border-teal-100">
              ⭐ 최적 배치: {Object.entries(feedback).filter(([,v])=>v.best).length}/{rooms.length}개
            </div>
          )}
        </div>
      </div>
    );
  }

                        {tech:'Bluetooth',color:'text-violet-600',dist:'~10m',speed:'🟡 보통',power:'🟢 적음',use:'기기 간 연결'},
                        {tech:'RFID',color:'text-emerald-600',dist:'0.1~100m',speed:'⚡ 빠름',power:'🟢 거의 없음',use:'자동 인식·태그'},
                        {tech:'NFC',color:'text-amber-600',dist:'~10cm',speed:'⚡ 매우 빠름',power:'🟢 거의 없음',use:'결제·정보 교환'},
                        {tech:'미러링',color:'text-pink-600',dist:'Wi-Fi 범위',speed:'⚡ 빠름',power:'🟡 중간',use:'화면 공유'},
                      ].map((row,i)=>(
                        <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">
                          <td className={`px-4 py-3 font-bold ${row.color}`}>{row.tech}</td>
                          <td className="px-4 py-3 text-center text-gray-600">{row.dist}</td>
                          <td className="px-4 py-3 text-center text-gray-600">{row.speed}</td>
                          <td className="px-4 py-3 text-center text-gray-600">{row.power}</td>
                          <td className="px-4 py-3 text-gray-500">{row.use}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="bg-white rounded-2xl border border-gray-200 shadow-sm">
                <div className="p-5 border-b border-gray-100">
                  <h3 className="font-bold text-gray-800 text-base">🤔 생각해보기</h3>
                </div>
                <div className="grid md:grid-cols-3 gap-0">
                  {[
                    {q:'Q. 왜 기술마다 거리가 다를까요?',a:'목적에 맞게 설계했기 때문이에요. NFC는 결제라서 보안을 위해 아주 가까워야 하고, Wi-Fi는 집 전체를 커버해야 하니 거리가 길어요.',color:'border-teal-400 text-teal-700'},
                    {q:'Q. RFID와 NFC의 차이는?',a:'NFC는 RFID의 한 종류예요! 다만 NFC는 거리가 더 짧고(10cm), 두 기기가 서로 정보를 주고받을 수 있어서 결제나 데이터 교환에 더 안전해요.',color:'border-cyan-400 text-cyan-700'},
                    {q:'Q. 미러링 vs 유튜브 캐스팅 차이?',a:'미러링은 폰 화면 전체를 TV로 복사해요. 캐스팅은 유튜브 같은 특정 앱만 TV로 보내서, 폰으로 다른 작업도 동시에 할 수 있어요!',color:'border-emerald-400 text-emerald-700'},
                  ].map((item,i)=>(
                    <div key={i} className={`p-5 ${i<2?'border-b md:border-b-0 md:border-r border-gray-100':''}`}>
                      <p className={`font-bold mb-2 text-base border-l-4 pl-2 ${item.color}`}>{item.q}</p>
                      <p className="text-sm text-gray-800 leading-relaxed">{item.a}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* 개념 탭 */}
          {activeTab === 'concept' && <ConceptApp/>}

          {/* 게임 탭 */}
          {activeTab === 'game' && <GameApp/>}

          {/* 퀴즈 탭 */}
          {activeTab === 'quiz' && <QuizApp/>}

          <div className="mt-6 text-center p-6">
            <a
              href="index.html"
              className="inline-block bg-gradient-to-r from-teal-700 to-cyan-700 text-white w-64 py-3 rounded-lg font-bold text-lg hover:from-teal-800 hover:to-cyan-800 transition-all shadow-lg hover:shadow-xl"
            >
              🏠 홈으로 돌아가기
            </a>
          </div>

        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
  </script>
</body>
</html>
