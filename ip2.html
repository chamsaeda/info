<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>전화번호와 인터넷 주소 - 네트워크 통신의 기본</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-pulse-custom {
      animation: pulse 2s ease-in-out infinite;
    }
    .animate-slide-in {
      animation: slideIn 0.5s ease-out;
    }
    
    /* 신호 전송 애니메이션 */
    @keyframes signalFlow {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
      100% {
        opacity: 0;
        transform: scale(1);
      }
    }
    
    @keyframes lineGlow {
      0%, 100% {
        stroke-opacity: 0.3;
        stroke-width: 2;
      }
      50% {
        stroke-opacity: 1;
        stroke-width: 4;
      }
    }
    
    @keyframes lineFlash {
      0%, 100% {
        stroke: #10b981;
        stroke-opacity: 0.4;
        stroke-width: 3;
      }
      50% {
        stroke: #3b82f6;
        stroke-opacity: 1;
        stroke-width: 6;
      }
    }
    
    @keyframes bounceOnce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50% { transform: translateY(-10px) translateX(-50%); }
    }

    .signal-dot {
      animation: signalFlow 1.5s ease-in-out;
    }
    
    .line-glow {
      animation: lineGlow 1.5s ease-in-out;
    }
    
    .network-node {
      transition: all 0.3s ease;
      transform-origin: center;
    }
    
    .network-node.active {
      transform: scale(1.2);
      filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.8));
    }
    
    .network-node.receiving {
      animation: pulse 0.5s ease-in-out 3;
    }

  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    /* ══════════════════════════════════════════════════════════
       PhoneExchange — 실제 전화기 UI + 전자 교환기 시스템
       ══════════════════════════════════════════════════════════ */
    const PhoneExchange = () => {
      const { useState: useS, useEffect: useE, useRef: useR } = React;

      /* ── 사용자 디렉토리 ── */
      const USERS = [
        { id: 'minsu',   name: '민수',   emoji: '👦', number: '010-1234-5678', color: '#3B82F6' },
        { id: 'jieun',   name: '지은',   emoji: '👧', number: '010-9876-5432', color: '#10B981' },
        { id: 'teacher', name: '선생님', emoji: '👨‍🏫', number: '010-1004-1004', color: '#A855F7' },
        { id: 'junho',   name: '준호',   emoji: '🧑', number: '010-5555-7777', color: '#F59E0B' },
      ];

      /* ── 전자 교환기 대기열 ── */
      const [queue,       setQueue]       = useS([]);
      const [processing,  setProcessing]  = useS(null);   // 현재 전자 교환기가 처리 중인 통화
      const [callHistory, setCallHistory] = useS([]);
      const [caller,      setCaller]      = useS('minsu'); // 발신자 선택
      const [dialInput,   setDialInput]   = useS('');     // 다이얼 패드 입력
      const [phase,       setPhase]       = useS('idle'); // idle | dialing | queued | routing | connecting | connected | error | busy_wait
      const [errorMsg,    setErrorMsg]    = useS('');
      const [waitSec,     setWaitSec]     = useS(0);
      const [highlight,   setHighlight]   = useS('');
      const timerRef = useR(null);

      /* 통화 이력 최대 6개 */
      const addHistory = (entry) =>
        setCallHistory(prev => [entry, ...prev].slice(0, 6));

      /* 전자 교환기 처리 시뮬레이션 */
      const simulateExchange = (callerUser, targetUser, correct) => {
        const busyChance = queue.length > 0 ? 0.5 : 0.15;
        const isBusy = Math.random() < busyChance;

        if (isBusy) {
          /* 대기열에 추가 */
          const waitId = Date.now();
          setQueue(prev => [...prev, { id: waitId, caller: callerUser, target: targetUser, correct }]);
          setPhase('queued');
          let sec = 3 + queue.length * 2;
          setWaitSec(sec);
          const iv = setInterval(() => {
            sec -= 1;
            setWaitSec(sec);
            if (sec <= 0) {
              clearInterval(iv);
              setQueue(prev => prev.filter(q => q.id !== waitId));
              doRoute(callerUser, targetUser, correct);
            }
          }, 1000);
          return;
        }
        doRoute(callerUser, targetUser, correct);
      };

      const doRoute = (callerUser, targetUser, correct) => {
        setPhase('routing');
        setProcessing({ caller: callerUser, target: targetUser });
        setHighlight('exchange');

        setTimeout(() => {
          setHighlight('target');
          setTimeout(() => {
            if (!correct) {
              /* 번호 오류 → 엉뚱한 곳 */
              const others = USERS.filter(u => u.id !== callerUser.id && u.id !== targetUser.id);
              const wrong = others[Math.floor(Math.random() * others.length)];
              setPhase('error');
              setErrorMsg(`전자 교환기: 📋 번호 ${dialInput} 찾는 중... ❌ 등록된 번호가 없어요! 가장 가까운 번호(${wrong.number})로 잘못 연결됩니다!`);
              addHistory({ type: 'error', from: callerUser, to: wrong, number: dialInput, time: new Date().toLocaleTimeString() });
              setTimeout(() => reset(), 4000);
            } else {
              setPhase('connected');
              addHistory({ type: 'success', from: callerUser, to: targetUser, number: dialInput, time: new Date().toLocaleTimeString() });
              setTimeout(() => reset(), 4000);
            }
            setProcessing(null);
            setHighlight('');
          }, 1200);
        }, 1500);
      };

      const reset = () => {
        setPhase('idle');
        setDialInput('');
        setErrorMsg('');
        setHighlight('');
      };

      /* 다이얼 패드 */
      const KEYS = ['1','2','3','4','5','6','7','8','9','*','0','#'];
      const formatDial = (raw) => {
        const digits = raw.replace(/\D/g, '').slice(0, 11);
        if (digits.length <= 3) return digits;
        if (digits.length <= 7) return digits.slice(0,3) + '-' + digits.slice(3);
        return digits.slice(0,3) + '-' + digits.slice(3,7) + '-' + digits.slice(7);
      };
      const pressKey = (k) => {
        if (phase !== 'idle') return;
        if (k === '#') { handleCall(); return; }
        if (k === '*') { setDialInput(''); return; }
        setDialInput(prev => {
          const digits = prev.replace(/\D/g,'');
          if (digits.length >= 11) return prev;
          return formatDial(digits + k);
        });
      };

      /* 통화 시도 */
      const handleCall = () => {
        if (phase !== 'idle') return;
        if (!dialInput) return;
        const callerUser = USERS.find(u => u.id === caller);
        const target = USERS.find(u => u.number === dialInput);
        const correct = !!target && target.id !== callerUser.id;
        const targetUser = correct ? target : (USERS.find(u => u.id !== callerUser.id));
        setPhase('dialing');
        setTimeout(() => simulateExchange(callerUser, targetUser, correct), 800);
      };

      const callerUser = USERS.find(u => u.id === caller);

      /* 상태별 메시지 */
      const statusInfo = {
        idle:        { bg: 'bg-gray-100',   text: 'text-gray-600',  msg: '📱 전화번호를 누르고 📞 버튼을 눌러보세요!' },
        dialing:     { bg: 'bg-blue-100',   text: 'text-blue-700',  msg: '📡 신호를 교환기로 보내는 중...' },
        queued:      { bg: 'bg-yellow-100', text: 'text-yellow-800',msg: `⏳ 교환기가 처리 중이에요! 대기 중... (${waitSec}초 남음)` },
        routing:     { bg: highlight === 'exchange' ? 'bg-purple-100' : 'bg-indigo-100',
                       text: highlight === 'exchange' ? 'text-purple-800' : 'text-indigo-800',
                       msg: highlight === 'exchange' ? '🔍 전자 교환기: 번호 조회 중...' : '🔀 전자 교환기: 연결 경로 계산 중...' },
        connecting:  { bg: 'bg-green-100',  text: 'text-green-700', msg: '🔔 연결 중...' },
        connected:   { bg: 'bg-green-200',  text: 'text-green-800', msg: `✅ 연결 성공! ${USERS.find(u=>u.number===dialInput)?.name || ''}와 통화 중이에요!` },
        error:       { bg: 'bg-red-100',    text: 'text-red-700',   msg: errorMsg },
        busy_wait:   { bg: 'bg-yellow-100', text: 'text-yellow-800',msg: '⏳ 대기 중...' },
      };
      const status = statusInfo[phase] || statusInfo.idle;

      return (
        <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-6 rounded-xl border-2 border-blue-200 shadow-lg mb-6">
          {/* 헤더 — 기존 섹션과 동일한 스타일 */}
          <h2 className="text-xl font-bold text-blue-700 mb-2 flex items-center gap-2">
            📞 전화 걸기 직접 체험
          </h2>
          <p className="text-base text-gray-700 mb-5">
            번호를 직접 눌러 전화해보세요! <span className="font-bold text-purple-700">전자 교환기</span>가 어떻게 번호를 보고 연결하는지 관찰하세요.
          </p>

          {/* ── 메인 레이아웃 ── */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5">

            {/* ① 발신자 선택 + 전화기 */}
            <div className="bg-white p-5 rounded-xl shadow-lg border-2 border-gray-200 flex flex-col items-center">
              <h4 className="font-bold text-indigo-700 mb-3 flex items-center gap-1">
                <span className="text-lg">👤</span> 발신자 선택
              </h4>
              <div className="grid grid-cols-2 gap-2 w-full mb-5">
                {USERS.map(u => (
                  <button key={u.id}
                    onClick={() => { if(phase==='idle') setCaller(u.id); }}
                    disabled={phase !== 'idle'}
                    style={{ borderColor: caller===u.id ? u.color : '#e5e7eb',
                             background: caller===u.id ? u.color+'22' : 'white' }}
                    className="border-2 rounded-lg p-2 text-center transition-all hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                    <div className="text-2xl">{u.emoji}</div>
                    <div className="text-sm font-bold" style={{color: caller===u.id ? u.color : '#374151'}}>{u.name}</div>
                  </button>
                ))}
              </div>

              {/* 전화기 본체 — 어두운 배경은 전화기 내부에만 적용 */}
              <div className="w-full max-w-xs bg-gray-800 rounded-2xl p-4 shadow-xl border-2 border-gray-600">
                {/* 화면 */}
                <div className="bg-black rounded-xl p-3 mb-4 border border-gray-600">
                  <div className="text-xs text-gray-400 flex justify-between mb-1">
                    <span>{callerUser.emoji} {callerUser.name}</span>
                    <span style={{color: phase==='connected'?'#4ade80': phase==='error'?'#f87171':'#94a3b8'}}>
                      {phase==='idle'?'대기':phase==='connected'?'통화중':phase==='error'?'오류':'처리중'}
                    </span>
                  </div>
                  <div className="text-white font-mono text-lg tracking-widest text-center min-h-7">
                    {dialInput || <span className="text-gray-500 text-sm">번호를 눌러보세요</span>}
                  </div>
                </div>

                {/* 다이얼 패드 */}
                <div className="grid grid-cols-3 gap-2 mb-3">
                  {KEYS.map(k => (
                    <button key={k}
                      onClick={() => pressKey(k)}
                      disabled={phase !== 'idle'}
                      className="bg-gray-600 hover:bg-gray-500 active:bg-gray-400 text-white rounded-lg py-2 text-base font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                    >{k}</button>
                  ))}
                </div>

                {/* 통화/종료 버튼 */}
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={handleCall} disabled={phase !== 'idle' || !dialInput}
                    className="bg-green-500 hover:bg-green-400 text-white rounded-lg py-2 text-xl font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed">📞</button>
                  <button onClick={() => reset()}
                    className="bg-red-500 hover:bg-red-400 text-white rounded-lg py-2 text-xl font-bold transition-all">📵</button>
                </div>
              </div>
            </div>

            {/* ② 교환기 흐름도 */}
            <div className="bg-white p-5 rounded-xl shadow-lg border-2 border-gray-200 flex flex-col">
              <h4 className="font-bold text-indigo-700 mb-3 flex items-center gap-1">
                <span className="text-lg">🔀</span> 교환기 내부 흐름
              </h4>

              {/* 발신자 노드 */}
              <div style={{borderColor: callerUser.color, background: callerUser.color+'18'}}
                   className={`border-2 rounded-lg p-3 text-center mb-1 transition-all ${phase!=='idle'?'scale-105 shadow-md':''}`}>
                <div className="text-2xl">{callerUser.emoji}</div>
                <div className="font-bold text-base" style={{color: callerUser.color}}>{callerUser.name}</div>
                <div className="text-sm text-gray-500 font-mono">{callerUser.number}</div>
              </div>

              <div className="text-center text-xl my-1 transition-all"
                   style={{color: phase==='dialing'?'#3B82F6':'#9CA3AF'}}>↓</div>

              {/* 교환기 노드 */}
              <div className={`border-2 rounded-lg p-3 text-center mb-1 transition-all
                ${highlight==='exchange'
                  ? 'border-purple-500 bg-purple-100 scale-105 shadow-lg'
                  : phase==='queued'
                  ? 'border-yellow-400 bg-yellow-50'
                  : 'border-purple-300 bg-purple-50'}`}>
                <div className="text-2xl">🏛️</div>
                <div className="font-bold text-base text-purple-800">전자 교환기 (자동)</div>
                {phase === 'queued' && (
                  <div className="text-sm text-yellow-700 mt-1 font-bold">⏳ 대기열 {queue.length}건 처리 중...</div>
                )}
                {highlight === 'exchange' && (
                  <div className="text-sm text-purple-700 mt-1 font-bold animate-pulse">🔍 번호 조회 중...</div>
                )}
                {phase === 'routing' && highlight !== 'exchange' && (
                  <div className="text-sm text-indigo-700 mt-1 font-bold">📋 경로 계산 중...</div>
                )}
              </div>

              <div className="text-center text-xl my-1 transition-all"
                   style={{color: highlight==='target'?'#10B981':'#9CA3AF'}}>↓</div>

              {/* 수신자 노드 */}
              {processing ? (() => {
                const t = phase==='error'
                  ? USERS.find(u=>u.id!==processing.caller.id && u.id!==processing.target.id) || processing.target
                  : processing.target;
                return (
                  <div style={{borderColor: t.color, background: t.color+'18'}}
                       className={`border-2 rounded-lg p-3 text-center transition-all ${highlight==='target'?'scale-105 shadow-md':''}`}>
                    <div className="text-2xl">{t.emoji}</div>
                    <div className="font-bold text-base" style={{color: t.color}}>{t.name}</div>
                    <div className="text-sm text-gray-500 font-mono">{t.number}</div>
                    {phase==='connected' && <div className="text-sm text-green-600 font-bold mt-1">📞 통화 중!</div>}
                    {phase==='error' && <div className="text-sm text-red-500 font-bold mt-1">❌ 잘못 연결됨!</div>}
                  </div>
                );
              })() : (
                <div className="border-2 border-dashed border-gray-300 rounded-lg p-3 text-center text-gray-400">
                  <div className="text-2xl">❓</div>
                  <div className="text-base">수신자</div>
                  <div className="text-sm">(번호로 결정됨)</div>
                </div>
              )}

              {/* 대기열 */}
              {queue.length > 0 && (
                <div className="mt-3 bg-yellow-50 border border-yellow-300 rounded-lg p-3">
                  <div className="text-sm font-bold text-yellow-800 mb-1">⏳ 대기열</div>
                  {queue.map((q,i) => (
                    <div key={q.id} className="text-sm text-yellow-700 flex gap-1 items-center">
                      <span>{q.caller.emoji}→{q.target.emoji}</span>
                      <span className="text-gray-400">#{i+1}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ③ 전화번호부 + 상태창 */}
            <div className="flex flex-col gap-4">
              {/* 전화번호부 */}
              <div className="bg-white p-4 rounded-xl shadow-lg border-2 border-gray-200">
                <h4 className="font-bold text-indigo-700 mb-1 flex items-center gap-1">
                  <span className="text-lg">📒</span> 전화번호부
                </h4>
                <p className="text-sm text-gray-500 mb-3">번호를 클릭하면 자동 입력!</p>
                {USERS.map(u => (
                  <button key={u.id}
                    disabled={phase !== 'idle' || u.id === caller}
                    onClick={() => setDialInput(u.number)}
                    style={{borderColor: u.color+'66'}}
                    className="w-full flex items-center gap-2 border rounded-lg p-2 mb-2 hover:opacity-80 transition-all disabled:opacity-40 disabled:cursor-not-allowed text-left">
                    <span className="text-xl">{u.emoji}</span>
                    <div>
                      <div className="font-bold text-base" style={{color: u.color}}>{u.name}</div>
                      <div className="text-sm font-mono text-gray-500">{u.number}</div>
                    </div>
                    {u.id === caller && <span className="ml-auto text-sm text-gray-400">나</span>}
                  </button>
                ))}
              </div>

              {/* 상태창 */}
              <div className={`${status.bg} rounded-xl p-4 border-2 ${
                phase==='connected'?'border-green-400':
                phase==='error'?'border-red-400':
                phase==='queued'?'border-yellow-400':
                'border-gray-200'} transition-all`}>
                <p className={`${status.text} font-bold text-base leading-relaxed`}>{
                  phase==='queued'
                    ? `⏳ 교환기가 처리 중이에요! 대기 중... (${waitSec}초 남음)`
                    : status.msg
                }</p>
              </div>
            </div>
          </div>

          {/* ── 통화 이력 ── */}
          {callHistory.length > 0 && (
            <div className="mt-5 bg-white rounded-xl border-2 border-gray-200 p-4 shadow-lg">
              <h4 className="font-bold text-indigo-700 mb-3 flex items-center gap-1">
                <span className="text-lg">📋</span> 통화 이력
              </h4>
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                {callHistory.map((h, i) => (
                  <div key={i}
                       className={`rounded-lg p-3 text-sm flex items-start gap-2
                         ${h.type==='success'?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
                    <span className="text-lg">{h.type==='success'?'✅':'❌'}</span>
                    <div>
                      <div className="font-bold text-gray-800">{h.from.emoji}{h.from.name} → {h.to.emoji}{h.to.name}</div>
                      <div className="text-sm text-gray-500 font-mono">{h.number}</div>
                      <div className="text-sm text-gray-400">{h.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── 학습 포인트 — 기존 bg-indigo-50 스타일과 통일 ── */}
          <div className="mt-5 bg-indigo-50 p-4 rounded-lg border border-indigo-200">
            <p className="text-base font-bold text-indigo-700 mb-3">💡 관찰해보세요!</p>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              {[
                { emoji: '🔢', title: '정확한 번호가 핵심!', desc: '번호를 하나라도 틀리게 누르면 엉뚱한 곳으로 연결돼요.' },
                { emoji: '🏛️', title: '전자 교환기의 역할', desc: '교환기는 번호를 보고 올바른 수신자를 찾아 연결해줘요.' },
                { emoji: '⏳', title: '교환기가 바쁘면?', desc: '여러 통화가 동시에 들어오면 대기 줄이 생겨요!' },
              ].map((p, i) => (
                <div key={i} className="bg-white rounded-lg p-3 border border-indigo-100 text-center shadow-sm">
                  <div className="text-3xl mb-1">{p.emoji}</div>
                  <div className="font-bold text-base text-gray-800 mb-1">{p.title}</div>
                  <div className="text-sm text-gray-600">{p.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       IPExperience — IP 주소 2단계 체험
       1단계: IP 조립 퍼즐 (슬라이더로 0~255 맞추기)
       2단계: IP 입력 후 패킷 배달 게임 (라우터 경유, 오류 체험)
       ═══════════════════════════════════════════════════════════ */
    const IPExperience = () => {
      const { useState: useS, useEffect: useE, useRef: useR } = React;

      /* ── 네트워크 기기 목록 ── */
      const DEVICES = [
        { id: 'pc',     name: '학교 컴퓨터', emoji: '💻', ip: [192,168,1,10],  color:'#3B82F6' },
        { id: 'phone',  name: '스마트폰',    emoji: '📱', ip: [192,168,1,25],  color:'#10B981' },
        { id: 'tablet', name: '태블릿',      emoji: '📲', ip: [192,168,1,30],  color:'#F59E0B' },
        { id: 'tv',     name: '스마트TV',    emoji: '📺', ip: [192,168,1,50],  color:'#EF4444' },
      ];

      /* ══ 패킷 배달 게임 ══ */
      const [inputOctets, setInputOctets] = useS(['','','','']);
      const [sender, setSender]   = useS('pc');
      const [packetPhase, setPacketPhase] = useS('idle');
        // idle | routing | travelling | arrived | lost
      const [packetTarget, setPacketTarget] = useS(null);
      const [packetPos, setPacketPos]       = useS(0);   // 0→1 진행도
      const [packetMsg, setPacketMsg]       = useS('');
      const [deliveryLog, setDeliveryLog]   = useS([]);
      const animRef = useR(null);

      const ipStr = (arr) => arr.join('.');

      const handleOctet = (idx, val) => {
        const clean = val.replace(/\D/g,'').slice(0,3);
        const num = Math.min(255, Number(clean)||0);
        setInputOctets(prev => { const n=[...prev]; n[idx]=clean===''?'':String(num); return n; });
      };

      const sendPacket = () => {
        const octets = inputOctets.map(v => Number(v)||0);
        const typed  = ipStr(octets);
        const found  = DEVICES.find(d => ipStr(d.ip) === typed && d.id !== sender);
        const senderDev = DEVICES.find(d => d.id === sender);

        if (typed === ipStr(senderDev.ip)) {
          setPacketMsg('⚠️ 자기 자신의 IP로는 보낼 수 없어요!');
          setPacketPhase('idle');
          return;
        }

        setPacketPhase('routing');
        setPacketMsg('🔀 라우터: IP 주소 조회 중...');
        setPacketPos(0);

        setTimeout(() => {
          if (found) {
            setPacketTarget(found);
            setPacketPhase('travelling');
            setPacketMsg(`📦 패킷이 ${found.name}(${typed})으로 이동 중!`);
            let p = 0;
            const iv = setInterval(() => {
              p += 0.05;
              setPacketPos(p);
              if (p >= 1) {
                clearInterval(iv);
                setPacketPhase('arrived');
                setPacketMsg(`✅ 도착! ${found.emoji} ${found.name}이 패킷을 받았어요!`);
                setDeliveryLog(prev => [{type:'ok', from: senderDev.name, to: found.name, ip: typed, time: new Date().toLocaleTimeString()}, ...prev].slice(0,5));
                setTimeout(() => { setPacketPhase('idle'); setPacketMsg(''); setPacketTarget(null); setPacketPos(0); }, 2500);
              }
            }, 80);
          } else {
            setPacketPhase('lost');
            setPacketMsg(`❌ IP ${typed}를 찾을 수 없어요! 패킷이 길을 잃었습니다.`);
            setDeliveryLog(prev => [{type:'err', from: senderDev.name, to:'???', ip: typed, time: new Date().toLocaleTimeString()}, ...prev].slice(0,5));
            setTimeout(() => { setPacketPhase('idle'); setPacketMsg(''); setPacketPos(0); }, 2500);
          }
        }, 1200);
      };

      /* 라우터 위치: 화면 중앙 */
      const ROUTER = { x:300, y:210 };
      const DEV_POS = { pc:{x:90,y:80}, phone:{x:510,y:80}, tablet:{x:90,y:340}, tv:{x:510,y:340} };

      const senderDev = DEVICES.find(d=>d.id===sender);
      const inputIP   = inputOctets.map(v=>Number(v)||0);

      return (
        <div className="space-y-4">
          {/* ══════════════ 패킷 배달 게임 ══════════════ */}
          <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-6 rounded-xl border-2 border-blue-200 shadow-lg">
              <h2 className="text-xl font-bold text-blue-700 mb-1 flex items-center gap-2">
                📦 패킷 배달 게임
              </h2>
              <p className="text-base text-gray-700 mb-4">
                보내는 기기를 선택하고, IP 주소를 입력해서 패킷을 보내보세요.
                <span className="font-bold text-red-600"> IP가 틀리면 패킷이 길을 잃어요!</span>
              </p>

              {/* ── 네트워크 기기 IP 안내 카드 ── */}
              <div className="mb-5">
                <p className="text-sm font-bold text-gray-500 mb-2">📋 이 네트워크의 기기 목록</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  {DEVICES.map(d => (
                    <div key={d.id} style={{borderColor: d.color, background: d.color+'11'}}
                         className="rounded-xl border-2 p-3 text-center shadow-sm">
                      <div className="text-3xl mb-1">{d.emoji}</div>
                      <div className="font-bold text-sm mb-1" style={{color: d.color}}>{d.name}</div>
                      <div className="bg-gray-900 text-green-400 font-mono text-xs rounded-lg py-1 px-1 tracking-widest">
                        {ipStr(d.ip)}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 bg-indigo-50 p-3 rounded-lg border border-indigo-200">
                  <p className="text-sm text-gray-700">
                    💡 모든 기기는 <span className="font-mono font-bold text-indigo-600">192.168.1.</span>로 시작하고, 마지막 숫자로 각 기기를 구별해요. IP 주소의 각 숫자는 <span className="font-bold text-purple-700">0~255(8비트 = 2⁸가지)</span> 범위를 가져요.
                  </p>
                </div>
              </div>

              <div className="grid md:grid-cols-2 gap-5">
                {/* 왼쪽: 컨트롤 패널 */}
                <div className="space-y-4">
                  {/* 발신 기기 선택 */}
                  <div className="bg-white rounded-xl p-4 border-2 border-gray-200 shadow-sm">
                    <h4 className="font-bold text-gray-700 mb-3">📤 보내는 기기 선택</h4>
                    <div className="grid grid-cols-2 gap-2">
                      {DEVICES.map(d => (
                        <button key={d.id} onClick={()=>{ if(packetPhase==='idle') setSender(d.id); }}
                          disabled={packetPhase!=='idle'}
                          style={{borderColor: sender===d.id ? d.color:'#e5e7eb', background: sender===d.id ? d.color+'22':'white'}}
                          className="rounded-lg p-2 border-2 text-center transition-all hover:scale-105 disabled:opacity-50">
                          <div className="text-2xl">{d.emoji}</div>
                          <div className="text-sm font-bold" style={{color:sender===d.id?d.color:'#374151'}}>{d.name}</div>
                          <div className="text-xs font-mono text-gray-400">{ipStr(d.ip)}</div>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* IP 입력 */}
                  <div className="bg-white rounded-xl p-4 border-2 border-gray-200 shadow-sm">
                    <h4 className="font-bold text-gray-700 mb-1">🎯 목적지 IP 주소 입력</h4>
                    <p className="text-sm text-gray-500 mb-3">아래 네트워크 지도를 보고 기기의 IP를 입력하세요</p>
                    <div className="flex items-center gap-1 mb-3">
                      {inputOctets.map((v,i) => (
                        <React.Fragment key={i}>
                          <input type="text" value={v} onChange={e=>handleOctet(i,e.target.value)}
                            disabled={packetPhase!=='idle'}
                            placeholder="0"
                            className="w-14 text-center font-mono text-base font-bold border-2 border-indigo-300 rounded-lg py-2 focus:border-indigo-500 outline-none disabled:opacity-50"
                          />
                          {i<3 && <span className="text-gray-400 font-bold text-lg">.</span>}
                        </React.Fragment>
                      ))}
                    </div>
                    <div className="bg-gray-900 text-green-400 font-mono text-center py-2 rounded-lg text-base mb-3">
                      {inputOctets.map(v=>v||'?').join(' . ')}
                    </div>

                    {/* 기기 IP 힌트 */}
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      {DEVICES.filter(d=>d.id!==sender).map(d => (
                        <button key={d.id}
                          onClick={()=>{ if(packetPhase==='idle') setInputOctets(d.ip.map(String)); }}
                          disabled={packetPhase!=='idle'}
                          style={{borderColor:d.color+'66'}}
                          className="flex items-center gap-2 border rounded-lg p-2 text-left hover:opacity-80 transition-all disabled:opacity-40">
                          <span className="text-xl">{d.emoji}</span>
                          <div>
                            <div className="text-sm font-bold" style={{color:d.color}}>{d.name}</div>
                            <div className="text-xs font-mono text-gray-500">{ipStr(d.ip)}</div>
                          </div>
                        </button>
                      ))}
                    </div>

                    <button onClick={sendPacket} disabled={packetPhase!=='idle'}
                      className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold rounded-lg text-base transition-all shadow-md">
                      📦 패킷 전송!
                    </button>
                  </div>
                </div>

                {/* 오른쪽: 네트워크 지도 */}
                <div className="bg-white rounded-xl p-4 border-2 border-gray-200 shadow-sm">
                  <h4 className="font-bold text-gray-700 mb-3">🗺️ 네트워크 지도</h4>
                  <svg viewBox="0 0 600 420" className="w-full">
                    {/* 라우터-기기 연결선 */}
                    {DEVICES.map(d => {
                      const pos = DEV_POS[d.id];
                      const isInvolved = (packetPhase==='travelling'||packetPhase==='arrived') &&
                        (d.id===sender || d.id===packetTarget?.id);
                      return (
                        <line key={d.id}
                          x1={ROUTER.x} y1={ROUTER.y} x2={pos.x} y2={pos.y}
                          stroke={isInvolved?d.color:'#d1d5db'}
                          strokeWidth={isInvolved?3:2}
                          strokeDasharray="6,4"
                          opacity={isInvolved?1:0.5}
                        >
                          {!isInvolved && <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>}
                        </line>
                      );
                    })}

                    {/* 패킷 이동 애니메이션 */}
                    {(packetPhase==='travelling') && packetTarget && (() => {
                      const sp = DEV_POS[sender];
                      const ep = DEV_POS[packetTarget.id];
                      // 발신 → 라우터 → 수신 두 구간
                      let px, py;
                      if (packetPos < 0.5) {
                        const t = packetPos*2;
                        px = sp.x + (ROUTER.x-sp.x)*t;
                        py = sp.y + (ROUTER.y-sp.y)*t;
                      } else {
                        const t = (packetPos-0.5)*2;
                        px = ROUTER.x + (ep.x-ROUTER.x)*t;
                        py = ROUTER.y + (ep.y-ROUTER.y)*t;
                      }
                      return (
                        <g>
                          <circle cx={px} cy={py} r="10" fill="#F59E0B" stroke="white" strokeWidth="2"/>
                          <text x={px} y={py+4} textAnchor="middle" fontSize="10">📦</text>
                        </g>
                      );
                    })()}

                    {/* 패킷 유실 표시 */}
                    {packetPhase==='lost' && (
                      <g>
                        <circle cx={ROUTER.x} cy={ROUTER.y-10} r="18" fill="#FEE2E2" stroke="#EF4444" strokeWidth="2"/>
                        <text x={ROUTER.x} y={ROUTER.y-4} textAnchor="middle" fontSize="16">❌</text>
                      </g>
                    )}

                    {/* 라우터 */}
                    <circle cx={ROUTER.x} cy={ROUTER.y} r="36"
                      fill={packetPhase==='routing'?'#EDE9FE':'#F3E8FF'}
                      stroke={packetPhase==='routing'?'#7C3AED':'#A855F7'} strokeWidth="3"/>
                    <text x={ROUTER.x} y={ROUTER.y-6} textAnchor="middle" fontSize="20">🔀</text>
                    <text x={ROUTER.x} y={ROUTER.y+12} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#6D28D9">라우터</text>
                    {packetPhase==='routing' && (
                      <text x={ROUTER.x} y={ROUTER.y+28} textAnchor="middle" fontSize="12" fill="#7C3AED">조회중...</text>
                    )}

                    {/* 기기 노드 */}
                    {DEVICES.map(d => {
                      const pos = DEV_POS[d.id];
                      const isSnd  = d.id === sender;
                      const isRcv  = d.id === packetTarget?.id && packetPhase==='arrived';
                      const isTyped = ipStr(inputIP) === ipStr(d.ip);
                      return (
                        <g key={d.id}>
                          <circle cx={pos.x} cy={pos.y} r="32"
                            fill={isSnd?d.color+'33': isRcv?'#D1FAE5':'#F3F4F6'}
                            stroke={isSnd?d.color: isRcv?'#10B981': isTyped&&packetPhase==='idle'?d.color:'#D1D5DB'}
                            strokeWidth={isSnd||isRcv||isTyped?3:2}/>
                          <text x={pos.x} y={pos.y+2} textAnchor="middle" dominantBaseline="middle" fontSize="22">{d.emoji}</text>
                          <text x={pos.x} y={pos.y+42} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#374151">{d.name}</text>
                          <text x={pos.x} y={pos.y+58} textAnchor="middle" fontSize="13" fontFamily="monospace" fill={d.color}>{ipStr(d.ip)}</text>
                          {isRcv && <text x={pos.x} y={pos.y-40} textAnchor="middle" fontSize="18">🎉</text>}
                          {isSnd && <text x={pos.x} y={pos.y-40} textAnchor="middle" fontSize="14" fontWeight="bold" fill={d.color}>발신</text>}
                        </g>
                      );
                    })}
                  </svg>

                  {/* 상태 메시지 */}
                  {packetMsg && (
                    <div className={`mt-3 p-3 rounded-lg border-2 text-base font-bold text-center animate-slide-in
                      ${packetPhase==='arrived'?'bg-green-100 border-green-400 text-green-700':
                        packetPhase==='lost'?'bg-red-100 border-red-400 text-red-700':
                        'bg-indigo-100 border-indigo-300 text-indigo-700'}`}>
                      {packetMsg}
                    </div>
                  )}
                </div>
              </div>

              {/* 배달 로그 */}
              {deliveryLog.length > 0 && (
                <div className="mt-4 bg-white rounded-xl p-4 border-2 border-gray-200 shadow-sm">
                  <h4 className="font-bold text-gray-700 mb-3">📋 배달 기록</h4>
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                    {deliveryLog.map((log, i) => (
                      <div key={i}
                        className={`rounded-lg p-3 flex items-start gap-2 border text-sm
                          ${log.type==='ok'?'bg-green-50 border-green-200':'bg-red-50 border-red-200'}`}>
                        <span className="text-lg">{log.type==='ok'?'✅':'❌'}</span>
                        <div>
                          <div className="font-bold text-gray-800">{log.from} → {log.to}</div>
                          <div className="font-mono text-gray-500 text-xs">{log.ip}</div>
                          <div className="text-gray-400 text-xs">{log.time}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="mt-4 bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                <p className="text-base font-bold text-indigo-700 mb-2">💡 관찰해보세요!</p>
                <div className="grid sm:grid-cols-2 gap-2 text-base text-gray-700">
                  <p>🔀 <span className="font-bold text-purple-600">라우터</span>가 IP를 보고 경로를 찾아요</p>
                  <p>❌ IP가 <span className="font-bold text-red-600">틀리면</span> 패킷이 길을 잃어요</p>
                  <p>📦 패킷은 <span className="font-bold text-blue-600">라우터를 경유</span>해서 이동해요</p>
                  <p>🔢 IP 주소가 <span className="font-bold text-green-600">정확해야</span> 연결이 돼요</p>
                </div>
              </div>
            </div>
        </div>
      );
    };

                        <p className="text-lg text-gray-700">
                          {calculateScore() === quizData.length
                            ? '완벽해요! 모든 문제를 맞히셨네요! 🎊'
                            : calculateScore() >= quizData.length * 0.7
                            ? '잘하셨어요! 조금만 더 복습하면 완벽할 거예요! 👍'
                            : '다시 한 번 복습해보세요! 💪'}
                        </p>
                      </div>

                      <div className="text-left space-y-3 mb-6">
                        {quizData.filter(q => quizAnswers[q.id] !== q.correct).map(q => (
                          <div key={q.id} className="bg-red-50 p-4 rounded-lg border border-red-200">
                            <p className="font-bold text-red-700 text-base mb-1">❌ 틀린 문제: {q.question}</p>
                            <p className="text-base text-gray-700">
                              <span className="font-bold text-green-600">정답: </span>{q.options[q.correct]}
                            </p>
                            <p className="text-base text-gray-600 mt-1">{q.explanation}</p>
                          </div>
                        ))}
                      </div>

                      <button
                        onClick={resetQuiz}
                        className="w-48 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg"
                      >
                        🔄 다시 풀기
                      </button>
                    </div>
                  )}
                </div>

                <div className="mt-6 text-center flex justify-center gap-4">
                  <button
                    onClick={() => setStep(2)}
                    className="inline-block bg-gray-200 text-gray-700 px-8 py-3 rounded-lg font-bold text-lg hover:bg-gray-300 transition-all shadow-lg hover:shadow-xl"
                  >
                    ← 이전 단계로
                  </button>
                  <a 
                    href="index.html" 
                    className="inline-block bg-gradient-to-r from-indigo-600 to-purple-600 text-white w-64 py-3 rounded-lg font-bold text-lg hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg hover:shadow-xl"
                  >
                    🏠 홈으로 돌아가기
                  </a>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NetworkAddressEducation />);
  </script>
</body>
</html>
