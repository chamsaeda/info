    { cat:'🛡️ 데이터 윤리', q:'친구들을 대상으로 설문조사를 할 때 반드시 먼저 해야 하는 것은?', hint:'데이터를 수집하기 전에 상대방의 권리를 존중해야 해요!',
      opts:['최대한 많은 개인정보를 수집한다','이름·연락처를 몰래 기록한다','조사 목적을 알리고 동의를 받는다','수집한 데이터를 SNS에 공유한다'], ans:2,
      ex:'개인정보보호법에 따라 데이터 수집 전 반드시 목적을 알리고 동의를 받아야 해요. 이것이 데이터 윤리의 기본이에요!' },
    { cat:'🏛️ 공공데이터', q:'정부·공공기관이 국민 누구나 무료로 사용할 수 있게 제공하는 데이터 포털은?', hint:'우리나라 대표 공공 오픈데이터 사이트예요!',
      opts:['캐글 (Kaggle)','data.go.kr (공공데이터포털)','유튜브 데이터 랩','인스타그램 인사이트'], ans:1,
      ex:'data.go.kr(공공데이터포털)에서 버스 노선·인구 통계·날씨 등 수만 가지 공공데이터를 무료로 내려받아 활용할 수 있어요!' },
    { cat:'🤖 AI와 빅데이터', q:'ChatGPT 같은 AI가 자연스럽게 대화할 수 있는 근본적인 이유는?', hint:'AI는 스스로 태어날 때부터 알고 있는 게 아니에요!',
      opts:['AI가 태어날 때부터 모든 것을 알고 있어서','수천억 개의 텍스트 데이터를 학습했기 때문에','인터넷 속도가 빠르기 때문에','개발자가 모든 답을 직접 입력했기 때문에'], ans:1,
      ex:'ChatGPT는 인터넷의 수천억 개 문장 데이터를 학습해 만들어졌어요. AI의 성능은 학습 데이터의 양과 질에 직결돼요!' },
  ];

  const q = QUIZ[qi], total = QUIZ.length;
  const pick  = idx => { if(done) return; setSel(idx); setDone(true); if(idx === q.ans) setScore(s => s+1); };
  const next  = () => { if(qi+1 >= total) { setFin(true); } else { setQi(i => i+1); setSel(null); setDone(false); } };
  const retry = () => { setQi(0); setScore(0); setSel(null); setDone(false); setFin(false); };
  const medal = (s, t) => {
    const r = s/t;
    if(r === 1)  return { e:'🏆', m:'완벽해요! 빅데이터 전문가 등극!', c:'text-yellow-600' };

    return { e:'📚', m:'다시 한번 도전해봐요!', c:'text-green-600' };
  };

  return (
    React.createElement('div', { className: "space-y-6 slide-in" ,}
      , React.createElement('div', { className: "bg-gradient-to-r from-yellow-400 to-orange-500 p-6 rounded-2xl text-white text-center shadow-lg"       ,}
        , React.createElement('h2', { className: "text-2xl font-bold mb-1"  ,}, "🏆 빅데이터 퀴즈"  )
        , React.createElement('p', { className: "text-base opacity-90" ,}, "배운 내용을 확인해봐요! 총 "    , total, "문제")
      )

      , !fin ? (
        React.createElement('div', { className: "bg-white rounded-2xl border-2 border-orange-200 shadow-lg overflow-hidden"     ,}
          , React.createElement('div', { className: "bg-gray-100 px-6 pt-5 pb-3"   ,}
            , React.createElement('div', { className: "flex justify-between text-base font-bold text-gray-600 mb-2"     ,}
              , React.createElement('span', null, q.cat), React.createElement('span', null, qi+1, " / "  , total)
            )
            , React.createElement('div', { className: "w-full bg-gray-200 rounded-full h-3"   ,}
              , React.createElement('div', { className: "bg-gradient-to-r from-yellow-400 to-orange-400 h-3 rounded-full transition-all duration-500"      ,
                style: { width:`${((qi+1)/total)*100}%` },})
            )
          )
          , React.createElement('div', { className: "px-6 py-5" ,}
            , React.createElement('p', { className: "text-lg font-bold text-gray-800 mb-2"   ,}, q.q)
            , React.createElement('p', { className: "text-base text-blue-600 bg-blue-50 px-4 py-2 rounded-lg mb-5"      ,}, "💡 힌트: "  , q.hint)
            , React.createElement('div', { className: "space-y-3",}
              , q.opts.map((opt, idx) => {
                let style = 'bg-gray-50 border-gray-200 text-gray-700 hover:bg-orange-50 hover:border-orange-300 cursor-pointer';
                if (done) {
                  if (idx === q.ans)    style = 'bg-green-100 border-green-500 text-green-800 font-bold';
                  else if (idx === sel) style = 'bg-red-100 border-red-400 text-red-700';
                  else                  style = 'bg-gray-50 border-gray-200 text-gray-400';
                }
                return (
                  React.createElement('div', { key: idx, onClick: () => pick(idx),
                    className: `p-4 rounded-xl border-2 transition-all text-base ${style}`,}
                    , React.createElement('span', { className: "font-bold mr-2" ,}, ['①','②','③','④'][idx]), opt
                    , done && idx === q.ans && React.createElement('span', { className: "ml-2",}, "✅")
                    , done && idx === sel && idx !== q.ans && React.createElement('span', { className: "ml-2",}, "❌")
                  )
                );
              })
            )
            , done && (
              React.createElement('div', { className: "mt-5 bg-yellow-50 border-2 border-yellow-300 p-4 rounded-xl"     ,}
                , React.createElement('p', { className: "font-bold text-yellow-800 mb-1"  ,}, sel === q.ans ? '🎉 정답이에요!' : '😅 아쉬워요!')
                , React.createElement('p', { className: "text-base text-gray-700 leading-relaxed"  ,}, q.ex)
              )
            )
          )
          , React.createElement('div', { className: "px-6 pb-6" ,}
            , done
              ? React.createElement('button', { onClick: next, className: "w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-white py-3 rounded-xl font-bold text-base hover:opacity-90 transition-all shadow-md"           ,}
                  , qi+1 >= total ? '🏁 결과 보기' : '다음 문제 →'

              : React.createElement('p', { className: "text-center text-base text-gray-400"  ,}, "보기를 선택해주세요!" )

        React.createElement('div', { className: "bg-white rounded-2xl border-2 border-yellow-300 shadow-lg p-8 text-center"      ,}
          , (() => { const r = medal(score, total); return (React.createElement(React.Fragment, null
            , React.createElement('p', { className: "text-6xl mb-4" ,}, r.e)
            , React.createElement('p', { className: `text-2xl font-bold mb-2 ${r.c}`,}, r.m)
            , React.createElement('p', { className: "text-5xl font-bold text-gray-800 my-6"   ,}, score, " " , React.createElement('span', { className: "text-2xl text-gray-400" ,}, "/ " , total))
            , React.createElement('div', { className: "grid grid-cols-5 gap-2 mb-8"   ,}
              , QUIZ.map((_,i) => React.createElement('div', { key: i, className: `h-3 rounded-full ${i < score ? 'bg-green-400' : 'bg-red-300'}`,}))
            )

            )

      , !fin && (

          , React.createElement('span', { className: "text-base font-bold text-orange-700"  ,}, "🏅 현재 점수"  )
          , React.createElement('span', { className: "text-xl font-bold text-orange-600"  ,}, score, " / "  , qi + (done ? 1 : 0))
        )
      )
    )
  );
};
